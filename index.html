<script>

const BASE_URL = "https://your-backend.onrender.com"; // MUST CHANGE

// ================= LOAD SERVICES =================
async function loadServices() {
  try {
    const res = await fetch(BASE_URL + "/api/services");

    const data = await res.json();

    if (!res.ok || !Array.isArray(data)) {
      throw new Error("Invalid API response");
    }

    const container = document.getElementById("services");
    container.innerHTML = "";

    if (data.length === 0) {
      container.innerHTML = "<p>No services available</p>";
      return;
    }

    data.slice(0, 20).forEach(service => {

      const id = service.serviceId || service.service || service.id;

      const div = document.createElement("div");
      div.className = "service-item";

      div.innerHTML = `
        <strong>${service.name}</strong><br>
        Rate: ${service.rate}<br>
        Min: ${service.min} | Max: ${service.max}<br><br>

        <button onclick="placeOrder('${id}')">
          Order
        </button>
      `;

      container.appendChild(div);
    });

  } catch (err) {
    console.error("Service load error:", err);

    document.getElementById("services").innerHTML =
      "<p style='color:red'>Failed to load services</p>";
  }
}

// ================= PLACE ORDER =================
async function placeOrder(serviceId) {

  const link = prompt("Enter link:");
  const quantity = prompt("Enter quantity:");

  if (!link || !quantity) {
    alert("All fields required");
    return;
  }

  try {
    const token = localStorage.getItem("token");

    if (!token) {
      alert("Please login first");
      return;
    }

    const res = await fetch(BASE_URL + "/api/order", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({
        serviceId,
        link,
        quantity: Number(quantity)
      })
    });

    const data = await res.json();

    if (!res.ok) {
      alert("❌ " + (data.error || "Order failed"));
      return;
    }

    alert("✅ Order placed successfully");

  } catch (err) {
    console.error("Order error:", err);
    alert("❌ Network error");
  }
}

// INIT
loadServices();

</script>
