<script>
function showToast(msg, ok = true) {
  const toast = document.getElementById("toast");
  toast.innerText = msg;
  toast.style.borderColor = ok ? "#22c55e" : "#ef4444";
  toast.classList.add("show");

  setTimeout(() => {
    toast.classList.remove("show");
  }, 3000);
}

function setLoading(btnId, state, text) {
  const btn = document.getElementById(btnId);

  if (state) {
    btn.dataset.old = btn.innerText;
    btn.innerText = text;
    btn.disabled = true;
    btn.classList.add("loading");
  } else {
    btn.innerText = btn.dataset.old;
    btn.disabled = false;
    btn.classList.remove("loading");
  }
}

/* LOGIN */
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!email || !password) {
    showToast("Fill all fields", false);
    return;
  }

  setLoading("loginBtn", true, "Logging in...");

  try {
    const res = await fetch(BASE_URL + "/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      showToast(data.error || "Login failed", false);
      return;
    }

    localStorage.setItem("token", data.token);

    showToast("Login successful ✅");

    setTimeout(() => {
      location.reload();
    }, 1000);

  } catch (err) {
    console.error(err);
    showToast("Server error", false);
  } finally {
    setLoading("loginBtn", false);
  }
}

/* REGISTER */
async function register() {
  const email = document.getElementById("email").value;
  const phone = document.getElementById("phone").value;
  const password = document.getElementById("password").value;

  if (!email || !password) {
    showToast("Fill required fields", false);
    return;
  }

  setLoading("registerBtn", true, "Creating account...");

  try {
    const res = await fetch(BASE_URL + "/api/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, phone, password })
    });

    const data = await res.json();

    if (!res.ok) {
      showToast(data.error || "Registration failed", false);
      return;
    }

    showToast("Account created successfully ✅");

  } catch (err) {
    console.error(err);
    showToast("Server error", false);
  } finally {
    setLoading("registerBtn", false);
  }
}
</script>
