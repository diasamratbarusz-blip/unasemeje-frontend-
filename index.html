<!DOCTYPE html>
<html>
<head>
  <title>unasemeje ø dia smm-panel</title>

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#0f172a;
      color:white;
    }

    .container {
      max-width:400px;
      margin:20px auto;
      background:#1e293b;
      padding:20px;
      border-radius:10px;
      text-align:center;
    }

    input, select {
      width:100%;
      padding:10px;
      margin:8px 0;
      border:none;
      border-radius:5px;
    }

    button {
      width:100%;
      padding:12px;
      margin-top:10px;
      background:#3b82f6;
      border:none;
      color:white;
      font-size:16px;
      border-radius:5px;
      cursor:pointer;
    }

    .section {
      padding:20px;
      text-align:center;
    }

    footer {
      background:#020617;
      padding:20px;
      text-align:center;
      margin-top:30px;
    }

    #dashboard {
      display:none;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<div class="section">
  <h1>unasemeje ø dia smm-panel</h1>
  <p>Best SMM Panel in Africa & Kenya</p>
</div>

<!-- LOGIN -->
<div class="container" id="authBox">
  <h2>Login / Register</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <button onclick="register()">Register</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <!-- SERVICES -->
  <div class="container">
    <h2>Services</h2>
    <select id="serviceList"></select>
  </div>

  <!-- ORDER -->
  <div class="container">
    <h2>Place Order</h2>

    <input id="link" placeholder="Enter Link">
    <input id="quantity" placeholder="Quantity">

    <button onclick="placeOrder()">Submit Order</button>
  </div>

</div>

<!-- FOOTER -->
<footer>
  <p>© 2026 unasemeje ø dia smm-panel</p>
</footer>

<script>
const API = "http://localhost:5000/api";

let token = localStorage.getItem("token");

// ================= LOGIN =================
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch(API + "/auth/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ email, password })
  });

  const data = await res.json();

  if(data.token){
    localStorage.setItem("token", data.token);
    token = data.token;
    showDashboard();
  } else {
    alert(data.message || "Login failed");
  }
}

// ================= REGISTER =================
async function register() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch(API + "/auth/register", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ email, password })
  });

  const data = await res.json();
  alert("Registered! Now login.");
}

// ================= SHOW DASHBOARD =================
function showDashboard(){
  document.getElementById("authBox").style.display="none";
  document.getElementById("dashboard").style.display="block";
  loadServices();
}

// ================= LOAD SERVICES =================
async function loadServices(){
  const res = await fetch(API + "/services");
  const data = await res.json();

  const select = document.getElementById("serviceList");
  select.innerHTML = "";

  data.forEach(s=>{
    const option = document.createElement("option");
    option.value = s.service;
    option.text = `${s.name} ($${s.rate})`;
    select.appendChild(option);
  });
}

// ================= PLACE ORDER =================
async function placeOrder(){
  const service = document.getElementById("serviceList").value;
  const link = document.getElementById("link").value;
  const quantity = document.getElementById("quantity").value;

  const res = await fetch(API + "/order", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer " + token
    },
    body:JSON.stringify({ service, link, quantity })
  });

  const data = await res.json();

  if(data.success){
    alert("Order placed successfully!");
  } else {
    alert("Error placing order");
  }
}

// ================= AUTO LOGIN =================
if(token){
  showDashboard();
}
</script>

</body>
</html>
