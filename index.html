<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMM Panel Login</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.header {
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 420px;
  margin: 20px auto;
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border: none;
  border-radius: 6px;
  background: #0f172a;
  color: white;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: #3b82f6;
  border: none;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #2563eb;
}

.section {
  text-align: center;
  padding: 20px;
}

.service {
  background: #020617;
  padding: 10px;
  margin: 8px 0;
  border-radius: 6px;
}

footer {
  background: #020617;
  padding: 20px;
  text-align: center;
  margin-top: 30px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h1>unasemeje ø dia smm-panel</h1>
  <p>Fast & Reliable SMM Services in Kenya</p>
</div>

<!-- LOGIN / REGISTER -->
<div class="container">
  <h2>Login / Register</h2>

  <input id="email" placeholder="Email">
  <input id="phone" placeholder="Phone Number">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <button onclick="register()">Register</button>

  <p id="msg" style="color:#38bdf8;"></p>
</div>

<!-- SERVICES PREVIEW -->
<div class="section">
  <h2>Our Services</h2>
  <div id="services">Loading services...</div>
</div>

<!-- FOOTER -->
<footer>
  <p>Contact: 0715509440</p>
  <p>Email: support@unasemeje.com</p>
  <p>Nairobi, Kenya</p>
</footer>

<script>
const API = "https://unasemeje-backend-3.onrender.com/api";

/* =========================
   SAFE REDIRECT (FIXED)
========================= */
(function () {
  try {
    const token = localStorage.getItem("token");

    if (token) {
      const payload = JSON.parse(atob(token.split(".")[1]));

      if (payload?.email) {
        window.location.replace("dashboard.html");
      }
    }
  } catch (e) {
    localStorage.removeItem("token");
  }
})();

/* =========================
   LOGIN
========================= */
async function login() {
  setMsg("Logging in...");

  const res = await fetch(API + "/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();

  if (res.ok) {
    localStorage.setItem("token", data.token);
    setMsg("Success! Redirecting...");
    window.location.replace("dashboard.html");
  } else {
    setMsg(data.error || "Login failed");
  }
}

/* =========================
   REGISTER
========================= */
async function register() {
  setMsg("Creating account...");

  const res = await fetch(API + "/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      email: email.value,
      phone: phone.value,
      password: password.value
    })
  });

  const data = await res.json();

  if (res.ok) {
    setMsg("Account created. Now login.");
  } else {
    setMsg(data.error || "Register failed");
  }
}

/* =========================
   LOAD SERVICES
========================= */
async function loadServices() {
  try {
    const res = await fetch(API + "/services");
    const data = await res.json();

    const box = document.getElementById("services");
    box.innerHTML = "";

    if (!data?.data) {
      box.innerHTML = "<p>No services found</p>";
      return;
    }

    Object.keys(data.data).forEach(platform => {
      Object.keys(data.data[platform]).forEach(category => {
        data.data[platform][category].forEach(service => {

          const div = document.createElement("div");
          div.className = "service";

          div.innerHTML = `
            <b>${service.name}</b><br>
            Price: KSH ${service.rate}
          `;

          box.appendChild(div);
        });
      });
    });

  } catch (err) {
    console.log(err);
    document.getElementById("services").innerHTML =
      "<p>Failed to load services</p>";
  }
}

/* =========================
   MESSAGE
========================= */
function setMsg(text) {
  document.getElementById("msg").innerText = text;
}

/* INIT */
loadServices();
</script>

</body>
</html>
