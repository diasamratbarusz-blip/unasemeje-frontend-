<!DOCTYPE html>
<html>
<head>
  <title>unasemeje ø dia smm-panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#0f172a;
      color:white;
    }

    .container {
      max-width:420px;
      margin:40px auto;
      background:#1e293b;
      padding:20px;
      border-radius:10px;
      text-align:center;
    }

    input {
      width:100%;
      padding:10px;
      margin:8px 0;
      border:none;
      border-radius:5px;
      background:#0f172a;
      color:white;
    }

    button {
      width:100%;
      padding:10px;
      margin-top:10px;
      background:#3b82f6;
      border:none;
      color:white;
      font-size:14px;
      border-radius:5px;
      cursor:pointer;
    }

    button:disabled {
      opacity:0.6;
      cursor:not-allowed;
    }

    .section {
      padding:20px;
      text-align:center;
    }

    .services-box {
      max-width:800px;
      margin:auto;
      text-align:left;
    }

    .service-item {
      background:#020617;
      padding:12px;
      margin:10px 0;
      border-radius:6px;
    }

    footer {
      background:#020617;
      padding:20px;
      text-align:center;
      margin-top:30px;
    }

    .loader {
      border: 2px solid white;
      border-top: 2px solid transparent;
      border-radius: 50%;
      width: 14px;
      height: 14px;
      display:inline-block;
      animation: spin 0.7s linear infinite;
      margin-left:6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

<script>
/* ================================
   AUTO LOGIN REDIRECT
================================ */
const token = localStorage.getItem("token");

if (token) {
  window.location.replace("dashboard.html");
}
</script>

<!-- HEADER -->
<div class="section">
  <h1>unasemeje ø dia smm-panel</h1>
  <p>Best SMM Panel in Kenya & Africa</p>
</div>

<!-- LOGIN -->
<div class="container">
  <h2>Login / Register</h2>

  <input id="email" placeholder="Email">
  <input id="phone" placeholder="Phone">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Sign In</button>
  <button onclick="register()">Sign Up</button>

  <p id="status" style="color:#38bdf8;"></p>
</div>

<!-- SERVICES PREVIEW -->
<div class="section">
  <h2>Our Services</h2>
  <div id="services" class="services-box">
    <p>Loading services...</p>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <h3>unasemeje ø dia smm-panel</h3>

  <p><b>Phone:</b> 0715509440</p>
  <p><b>Email:</b> support@unasemeje-dia.com</p>
  <p><b>Location:</b> Nairobi, Kenya</p>

  <p>© 2026 All Rights Reserved</p>
</footer>

<script>
const BASE_URL = "https://your-backend.onrender.com"; // CHANGE THIS

/* ================================
   LOAD SERVICES
================================ */
async function loadServices() {
  try {
    const res = await fetch(BASE_URL + "/api/services");
    const data = await res.json();

    const box = document.getElementById("services");
    box.innerHTML = "";

    if (!data?.data) {
      box.innerHTML = "<p>No services available</p>";
      return;
    }

    Object.keys(data.data).forEach(platform => {
      Object.keys(data.data[platform]).forEach(category => {
        data.data[platform][category].forEach(service => {

          const div = document.createElement("div");
          div.className = "service-item";

          div.innerHTML = `
            <b>${service.name}</b><br>
            Price: KSH ${service.rate}
          `;

          box.appendChild(div);
        });
      });
    });

  } catch (err) {
    console.error(err);
    document.getElementById("services").innerHTML =
      "<p>Failed to load services</p>";
  }
}

/* ================================
   LOGIN
================================ */
async function login() {
  setStatus("Logging in...");

  const res = await fetch(BASE_URL + "/api/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();

  if (res.ok) {
    localStorage.setItem("token", data.token);
    setStatus("Success! Redirecting...");
    window.location.replace("dashboard.html");
  } else {
    setStatus(data.error || "Login failed");
  }
}

/* ================================
   REGISTER
================================ */
async function register() {
  setStatus("Creating account...");

  const res = await fetch(BASE_URL + "/api/register", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      email: email.value,
      phone: phone.value,
      password: password.value
    })
  });

  const data = await res.json();

  if (res.ok) {
    setStatus("Account created! Now login.");
  } else {
    setStatus(data.error || "Register failed");
  }
}

/* ================================
   STATUS
================================ */
function setStatus(text) {
  document.getElementById("status").innerText = text;
}

/* INIT */
loadServices();
</script>

</body>
</html>
