<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Referrals | UNASEMEJE ø DIA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* Reusing common dashboard styles */
        :root { --primary: #7c3aed; --secondary: #10b981; --bg-dark: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc; --text-dim: #94a3b8; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background: var(--bg-dark); color: var(--text-main); display: flex; }
        
        .sidebar { width: 260px; background: #111827; height: 100vh; padding: 20px; position: fixed; border-right: 1px solid #1f2937; }
        .sidebar h2 { color: var(--primary); text-align: center; font-weight: 800; margin-bottom: 30px; }
        .sidebar a { display: flex; align-items: center; padding: 12px 15px; color: var(--text-dim); text-decoration: none; border-radius: 10px; margin-bottom: 5px; }
        .sidebar a.active { background: var(--primary); color: white; }

        .main { margin-left: 260px; padding: 40px; width: calc(100% - 260px); }
        .card { background: var(--card-bg); padding: 30px; border-radius: 20px; border: 1px solid #334155; text-align: center; }
        
        .ref-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; border: 1px dashed var(--primary); margin: 25px 0; }
        #refLink { color: var(--primary); font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 10px; }
        
        .btn-copy { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .stat-item { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>unasemeje ø dia</h2>
        <a href="home.html"><i class="fas fa-home"></i> Home</a>
        <a href="new-order.html"><i class="fas fa-plus-circle"></i> New Order</a>
        <a href="my-orders.html"><i class="fas fa-history"></i> My Orders</a>
        <a href="add-funds.html"><i class="fas fa-wallet"></i> Add Funds</a>
        <a href="referrals.html" class="active"><i class="fas fa-users"></i> Referrals</a>
    </div>

    <div class="main">
        <div class="card">
            <h1 style="margin-top: 0;">Invite Friends & Earn KES</h1>
            <p style="color: var(--text-dim); max-width: 500px; margin: 0 auto;">Share your link with other Kenyan entrepreneurs. When they fund their account, you get <b>10%</b> of their deposit instantly into your balance.</p>
            
            <div class="ref-box">
                <span id="refLink">Loading your link...</span>
                <button class="btn-copy" onclick="copyRef()">COPY LINK</button>
            </div>

            <div class="stats-grid">
                <div class="stat-item">
                    <small style="color: var(--text-dim);">Total Earnings</small>
                    <h2 style="color: var(--secondary); margin: 10px 0;">KES <span id="refEarnings">0.00</span></h2>
                </div>
                <div class="stat-item">
                    <small style="color: var(--text-dim);">People Invited</small>
                    <h2 style="margin: 10px 0;" id="refCount">0</h2>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadRefData() {
            const res = await fetch("/api/me", { headers: { "Authorization": `Bearer ${localStorage.getItem("token")}` } });
            const user = await res.json();
            
            const link = `${window.location.origin}/register.html?ref=${user.referralCode}`;
            document.getElementById("refLink").innerText = link;
            document.getElementById("refEarnings").innerText = (user.referralEarnings || 0).toFixed(2);
            document.getElementById("refCount").innerText = user.referralCount || 0;
        }

        function copyRef() {
            const link = document.getElementById("refLink").innerText;
            navigator.clipboard.writeText(link);
            alert("Referral Link Copied to clipboard!");
        }

        loadRefData();
    </script>
</body>
</html>
