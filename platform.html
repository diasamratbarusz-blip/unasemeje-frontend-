<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Select Platform | UNASEMEJE ø DIA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7c3aed;
            --secondary: #10b981;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; 
            background: var(--bg-dark); 
            color: var(--text-main); 
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
        }

        /* SIDEBAR */
        .sidebar { 
            width: 260px; background: #111827; padding: 25px; border-right: 1px solid #1f2937; 
            position: fixed; height: 100vh; display: flex; flex-direction: column; 
        }
        .sidebar h2 { color: var(--primary); font-size: 20px; margin-bottom: 30px; text-align: center; font-weight: 800; }
        .sidebar a { 
            display: flex; align-items: center; padding: 12px 15px; color: var(--text-dim); 
            text-decoration: none; border-radius: 10px; margin-bottom: 5px; transition: 0.2s; 
        }
        .sidebar a:hover, .sidebar a.active { background: var(--primary); color: white; }

        /* MAIN CONTENT */
        .main { margin-left: 260px; padding: 40px; width: calc(100% - 260px); min-height: 100vh; }
        
        .header-section { margin-bottom: 40px; }
        .header-section h1 { font-weight: 800; font-size: 32px; margin: 0; background: linear-gradient(to right, #fff, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-section p { color: var(--text-dim); margin-top: 10px; font-size: 16px; }

        /* PLATFORM GRID */
        .platform-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .platform-card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .platform-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, transparent, rgba(124, 58, 237, 0.05));
            z-index: 0;
        }

        .platform-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .platform-card i {
            font-size: 48px;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .platform-card span {
            font-weight: 800;
            font-size: 18px;
            position: relative;
            z-index: 1;
            letter-spacing: 0.5px;
        }

        /* PLATFORM COLORS */
        .fa-tiktok { color: #ff0050; filter: drop-shadow(0 0 10px rgba(255, 0, 80, 0.3)); }
        .fa-instagram { color: #e1306c; filter: drop-shadow(0 0 10px rgba(225, 48, 108, 0.3)); }
        .fa-facebook { color: #1877f2; filter: drop-shadow(0 0 10px rgba(24, 119, 242, 0.3)); }
        .fa-youtube { color: #ff0000; filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.3)); }
        .fa-telegram { color: #0088cc; filter: drop-shadow(0 0 10px rgba(0, 136, 204, 0.3)); }
        .fa-twitter { color: #1da1f2; filter: drop-shadow(0 0 10px rgba(29, 161, 242, 0.3)); }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { margin-left: 0; padding: 25px; }
            .platform-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .header-section h1 { font-size: 24px; }
            .platform-card { padding: 30px 15px; }
            .platform-card i { font-size: 36px; }
            .platform-card span { font-size: 15px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>unasemeje ø dia</h2>
        <a href="home.html"><i class="fas fa-home"></i> Home</a>
        <a href="platform.html" class="active"><i class="fas fa-plus-circle"></i> New Order</a>
        <a href="my-orders.html"><i class="fas fa-history"></i> My Orders</a>
        <a href="add-funds.html"><i class="fas fa-wallet"></i> Add Funds</a>
        <a href="referrals.html"><i class="fas fa-users"></i> Referrals</a>
    </div>

    <div class="main">
        <div class="header-section">
            <h1>Select Platform</h1>
            <p>Step 1: Choose a platform to start your growth journey.</p>
        </div>

        <div class="platform-grid">
            <a href="new-order.html?platform=TikTok" class="platform-card">
                <i class="fab fa-tiktok"></i>
                <span>TikTok</span>
            </a>

            <a href="new-order.html?platform=Instagram" class="platform-card">
                <i class="fab fa-instagram"></i>
                <span>Instagram</span>
            </a>

            <a href="new-order.html?platform=Facebook" class="platform-card">
                <i class="fab fa-facebook"></i>
                <span>Facebook</span>
            </a>

            <a href="new-order.html?platform=YouTube" class="platform-card">
                <i class="fab fa-youtube"></i>
                <span>YouTube</span>
            </a>

            <a href="new-order.html?platform=Telegram" class="platform-card">
                <i class="fab fa-telegram"></i>
                <span>Telegram</span>
            </a>

            <a href="new-order.html?platform=Twitter" class="platform-card">
                <i class="fab fa-twitter"></i>
                <span>Twitter / X</span>
            </a>
        </div>
    </div>

    <script>
        // Redirect if not logged in
        if (!localStorage.getItem("token")) {
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
