<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMM Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.dashboard { display: flex; }

.sidebar {
  width: 230px;
  background: #111827;
  min-height: 100vh;
  padding: 20px;
}

.sidebar a {
  display: block;
  padding: 10px;
  color: #cbd5e1;
  cursor: pointer;
  margin-top: 5px;
  border-radius: 6px;
}
.sidebar a:hover { background: #1f2937; }

.main { flex: 1; padding: 20px; }

.navbar {
  display: flex;
  justify-content: space-between;
  background: #1e293b;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

.list-item {
  background: #334155;
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 8px;
  cursor: pointer;
}

.service {
  background: #334155;
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 8px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 6px;
  border: none;
  background: #0f172a;
  color: white;
}

button {
  margin-top: 10px;
  padding: 10px;
  background: #7c3aed;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.cancel { background: #ef4444; }
</style>
</head>

<body>

<div class="dashboard">

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>SMM PANEL</h2>

  <a onclick="showPage('home')">Dashboard</a>
  <a onclick="showPage('services')">Services</a>
  <a onclick="showPage('orders')">Orders</a>
  <a onclick="showPage('deposit')">Add Funds</a>
  <a onclick="logout()">Logout</a>
</div>

<!-- MAIN -->
<div class="main">

<div class="navbar">
  <div>👤 <b id="userEmail">Loading...</b></div>
  <div>💰 Balance: <span id="balance">0</span></div>
</div>

<!-- HOME -->
<div id="home" class="page">
<div class="card">
<h3>Quick Order</h3>

<div id="step-1">
  <h4>Select Platform</h4>
  <div id="platformList"></div>
</div>

<div id="step-2" style="display:none;">
  <button onclick="showStep(1)">Back</button>
  <h4>Select Type</h4>
  <div id="typeList"></div>
</div>

<div id="step-3" style="display:none;">
  <button onclick="showStep(2)">Back</button>
  <h4>Select Service</h4>
  <div id="serviceList"></div>
</div>

<div id="step-4" style="display:none;">
  <button onclick="showStep(3)">Back</button>

  <input id="serviceId" readonly>
  <input id="link" placeholder="Enter link">
  <input id="quantity" type="number" placeholder="Quantity" oninput="calcPrice()">

  <p>Total: <b id="total">0</b></p>

  <button onclick="placeOrder()">Create Order</button>
</div>

</div>
</div>

<!-- SERVICES PAGE -->
<div id="services" class="page" style="display:none;">
<div class="card">
<h3>All Services (Grouped)</h3>
<div id="allServices"></div>
</div>
</div>

<!-- ORDERS -->
<div id="orders" class="page" style="display:none;">
<div class="card">
<h3>Orders</h3>
<ul id="ordersList"></ul>
</div>
</div>

<!-- DEPOSIT -->
<div id="deposit" class="page" style="display:none;">
<div class="card">

<h3>Add Funds</h3>

<p>
Send to:<br>
<b>0715509440</b><br>
Name: <b>FAITH CHERUIYOT</b>
</p>

<input id="depMessage" placeholder="Paste full M-Pesa message">

<button onclick="submitDeposit()">Add Funds</button>
<button class="cancel" onclick="clearDeposit()">Cancel</button>

</div>
</div>

</div>
</div>

<script>
const API = "https://unasemeje-backend-3.onrender.com/api";
const token = localStorage.getItem("token");

let servicesData = {};
let selectedRate = 0;

if (!token) location.href = "index.html";

/* USER */
function loadUser(){
  const decoded = JSON.parse(atob(token.split(".")[1]));
  document.getElementById("userEmail").innerText = decoded.email;
}

/* BALANCE */
async function loadBalance(){
  const res = await fetch(API+"/me",{headers:{Authorization:"Bearer "+token}});
  const data = await res.json();
  document.getElementById("balance").innerText = data.balance||0;
}

/* LOAD SERVICES */
async function loadServices(){
  const res = await fetch(API+"/services");
  const json = await res.json();

  servicesData = json.data || {};

  renderPlatforms();
  renderAllServices();
}

/* STEP 1 */
function renderPlatforms(){
  const container = document.getElementById("platformList");
  container.innerHTML="";

  Object.keys(servicesData).forEach(p=>{
    const div=document.createElement("div");
    div.className="list-item";
    div.innerText=p;
    div.onclick=()=>selectPlatform(p);
    container.appendChild(div);
  });
}

/* STEP 2 */
function selectPlatform(platform){
  showStep(2);

  const types = servicesData[platform];
  const container=document.getElementById("typeList");
  container.innerHTML="";

  Object.keys(types).forEach(t=>{
    const div=document.createElement("div");
    div.className="list-item";
    div.innerText=t;
    div.onclick=()=>selectType(platform,t);
    container.appendChild(div);
  });
}

/* STEP 3 */
function selectType(platform,type){
  showStep(3);

  const services = servicesData[platform][type];
  const container=document.getElementById("serviceList");
  container.innerHTML="";

  services.forEach(s=>{
    const div=document.createElement("div");
    div.className="service";
    div.innerText=`${s.name} (KSH ${s.rate})`;

    div.onclick=()=>{
      document.getElementById("serviceId").value=s.serviceId;
      selectedRate=s.rate;
      showStep(4);
    };

    container.appendChild(div);
  });
}

/* ALL SERVICES PAGE */
function renderAllServices(){
  const container=document.getElementById("allServices");
  container.innerHTML="";

  Object.keys(servicesData).forEach(platform=>{
    const pDiv=document.createElement("div");
    pDiv.innerHTML=`<h4>${platform}</h4>`;

    Object.keys(servicesData[platform]).forEach(type=>{
      const tDiv=document.createElement("div");
      tDiv.innerHTML=`<b>${type}</b>`;

      servicesData[platform][type].forEach(s=>{
        const item=document.createElement("div");
        item.className="service";
        item.innerText=`${s.name} - KSH ${s.rate}`;
        tDiv.appendChild(item);
      });

      pDiv.appendChild(tDiv);
    });

    container.appendChild(pDiv);
  });
}

/* STEP */
function showStep(step){
  ["step-1","step-2","step-3","step-4"].forEach(id=>{
    document.getElementById(id).style.display="none";
  });
  document.getElementById("step-"+step).style.display="block";
}

/* PRICE */
function calcPrice(){
  const qty=document.getElementById("quantity").value||0;
  document.getElementById("total").innerText=((selectedRate/1000)*qty).toFixed(2);
}

/* ORDER */
async function placeOrder(){
  const serviceId=document.getElementById("serviceId").value;
  const link=document.getElementById("link").value;
  const quantity=document.getElementById("quantity").value;

  const res=await fetch(API+"/order",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+token
    },
    body:JSON.stringify({serviceId,link,quantity})
  });

  const data=await res.json();
  alert(data.message||data.error);
  loadBalance();
}

/* DEPOSIT */
async function submitDeposit(){
  const message=document.getElementById("depMessage").value;

  const res=await fetch(API+"/deposit",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+token
    },
    body:JSON.stringify({message})
  });

  const data=await res.json();
  alert(data.message||data.error);
}

function clearDeposit(){
  document.getElementById("depMessage").value="";
}

/* ORDERS */
async function loadOrders(){
  const res=await fetch(API+"/orders",{headers:{Authorization:"Bearer "+token}});
  const data=await res.json();

  const list=document.getElementById("ordersList");
  list.innerHTML="";

  data.forEach(o=>{
    const li=document.createElement("li");
    li.innerText=`${o.service} | ${o.quantity}`;
    list.appendChild(li);
  });
}

/* NAV */
function showPage(page){
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById(page).style.display="block";
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("token");
  location.href="index.html";
}

/* INIT */
loadUser();
loadBalance();
loadServices();
loadOrders();
</script>

</body>
</html>
