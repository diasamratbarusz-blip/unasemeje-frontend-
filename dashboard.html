<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚀 SMM Panel Pro Dashboard</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

<div class="dashboard">

  <!-- ================= SIDEBAR ================= -->
  <div class="sidebar">
    <h2>SMM PANEL</h2>

    <a onclick="showPage('home')">Dashboard</a>
    <a onclick="showPage('services')">Services</a>
    <a onclick="showPage('orders')">Orders</a>
    <a onclick="showPage('deposit')">Deposit</a>
    <a onclick="logout()">Logout</a>
  </div>

  <!-- ================= MAIN ================= -->
  <div class="main">

    <!-- NAVBAR -->
    <div class="navbar">
      <div>👤 <b id="userEmail">Loading...</b></div>
      <div>💰 Balance: <span class="badge" id="balance">0</span></div>
    </div>

    <!-- ================= HOME ================= -->
    <div id="home" class="page card">
      <h3>Select Social Platform</h3>

      <div class="social-list">

        <div class="social-item" onclick="selectPlatform('Instagram')">
          <div class="icon-box"><i class="fab fa-instagram"></i></div>
          <span class="platform-name">Instagram</span>
        </div>

        <div class="social-item" onclick="selectPlatform('TikTok')">
          <div class="icon-box"><i class="fab fa-tiktok"></i></div>
          <span class="platform-name">TikTok</span>
        </div>

        <div class="social-item" onclick="selectPlatform('YouTube')">
          <div class="icon-box"><i class="fab fa-youtube"></i></div>
          <span class="platform-name">YouTube</span>
        </div>

        <div class="social-item" onclick="selectPlatform('Facebook')">
          <div class="icon-box"><i class="fab fa-facebook"></i></div>
          <span class="platform-name">Facebook</span>
        </div>

        <div class="social-item" onclick="selectPlatform('Twitter')">
          <div class="icon-box"><i class="fab fa-twitter"></i></div>
          <span class="platform-name">Twitter / X</span>
        </div>

      </div>
    </div>

    <!-- ================= SERVICES ================= -->
    <div id="servicesPage" class="page card" style="display:none;">
      <h3>Services</h3>

      <input id="search" placeholder="Search services..." onkeyup="renderServices()">

      <div id="services" class="grid"></div>
    </div>

    <!-- ================= ORDER ================= -->
    <div class="card">
      <h3>Place Order</h3>

      <input id="serviceId" placeholder="Service ID" readonly>
      <input id="link" placeholder="Target Link">
      <input id="quantity" type="number" placeholder="Quantity" oninput="calcPrice()">

      <p>Total Price: <b id="total">0</b></p>

      <button onclick="placeOrder()">Place Order</button>
    </div>

    <!-- ================= DEPOSIT ================= -->
    <div id="depositPage" class="page card" style="display:none;">
      <h3>M-Pesa Deposit</h3>

      <input id="phone" placeholder="2547XXXXXXXX">
      <input id="amount" placeholder="Amount">

      <button onclick="deposit()">Send STK Push</button>
    </div>

    <!-- ================= ORDERS ================= -->
    <div id="ordersPage" class="page card" style="display:none;">
      <h3>My Orders</h3>
      <ul id="orders"></ul>
    </div>

  </div>
</div>

<!-- ================= TOAST ================= -->
<div id="toast"></div>

<!-- ================= SCRIPT ================= -->
<script>

const API_URL = "https://unasemeje-backend-3.onrender.com/api";

let servicesData = [];
let selectedRate = 0;
let currentPlatform = "";

/* ================= AUTH ================= */
const token = localStorage.getItem("token");

if (!token) {
  window.location.href = "index.html";
}

/* ================= TOAST ================= */
function showToast(msg) {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";

  setTimeout(() => {
    t.style.display = "none";
  }, 3000);
}

/* ================= USER ================= */
function loadUser() {
  try {
    const decoded = JSON.parse(atob(token.split(".")[1]));
    document.getElementById("userEmail").innerText = decoded.email;
  } catch {
    showToast("Session error");
  }
}

/* ================= BALANCE ================= */
async function loadBalance() {
  try {
    const res = await fetch(API_URL + "/me", {
      headers: { Authorization: "Bearer " + token }
    });

    const data = await res.json();
    document.getElementById("balance").innerText = data.balance || 0;

  } catch {
    showToast("Failed to load balance");
  }
}

/* ================= SERVICES ================= */
async function loadServices() {
  try {
    const res = await fetch(API_URL + "/services");
    const json = await res.json();

    if (!json.success) throw new Error();

    servicesData = Object.values(json.data).flat();
    renderServices();

  } catch {
    showToast("Failed to load services");
  }
}

/* ================= SELECT PLATFORM ================= */
function selectPlatform(platform) {
  currentPlatform = platform;
  showPage("services");
  renderServices();
}

/* ================= RENDER SERVICES ================= */
function renderServices() {
  const container = document.getElementById("services");
  const search = document.getElementById("search").value.toLowerCase();

  container.innerHTML = "";

  servicesData.forEach(s => {

    if (currentPlatform && !s.category.toLowerCase().includes(currentPlatform.toLowerCase())) return;
    if (!s.name.toLowerCase().includes(search)) return;

    const div = document.createElement("div");
    div.className = "service";

    div.innerHTML = `
      <b>${s.name}</b><br>
      ID: ${s.serviceId}<br>
      Rate: ${s.rate}
    `;

    div.onclick = () => {
      document.getElementById("serviceId").value = s.serviceId;
      selectedRate = s.rate;
      calcPrice();
    };

    container.appendChild(div);
  });
}

/* ================= PRICE ================= */
function calcPrice() {
  const qty = document.getElementById("quantity").value || 0;
  const total = (selectedRate / 1000) * qty;

  document.getElementById("total").innerText = total.toFixed(2);
}

/* ================= ORDER ================= */
async function placeOrder() {
  const serviceId = document.getElementById("serviceId").value;
  const link = document.getElementById("link").value;
  const quantity = document.getElementById("quantity").value;

  if (!serviceId || !link || !quantity) {
    return showToast("Fill all fields");
  }

  try {
    const res = await fetch(API_URL + "/order", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + token
      },
      body: JSON.stringify({ serviceId, link, quantity })
    });

    const data = await res.json();

    if (!res.ok) return showToast(data.error);

    showToast("Order placed successfully");
    loadOrders();
    loadBalance();

  } catch {
    showToast("Order failed");
  }
}

/* ================= ORDERS ================= */
async function loadOrders() {
  try {
    const res = await fetch(API_URL + "/orders", {
      headers: { Authorization: "Bearer " + token }
    });

    const data = await res.json();

    const list = document.getElementById("orders");
    list.innerHTML = "";

    data.forEach(o => {
      const li = document.createElement("li");
      li.innerText = `${o.service} | ${o.quantity} | ${o.cost}`;
      list.appendChild(li);
    });

  } catch {
    showToast("Failed to load orders");
  }
}

/* ================= DEPOSIT ================= */
async function deposit() {
  const phone = document.getElementById("phone").value;
  const amount = document.getElementById("amount").value;

  if (!phone || !amount) {
    return showToast("Enter phone & amount");
  }

  try {
    const res = await fetch(API_URL + "/mpesa/stk", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + token
      },
      body: JSON.stringify({ phone, amount })
    });

    const data = await res.json();
    showToast(data.message || "STK sent");

  } catch {
    showToast("Deposit failed");
  }
}

/* ================= NAVIGATION ================= */
function showPage(page) {
  document.querySelectorAll(".page").forEach(p => p.style.display = "none");

  if (page === "home") document.getElementById("home").style.display = "block";
  if (page === "services") document.getElementById("servicesPage").style.display = "block";
  if (page === "orders") document.getElementById("ordersPage").style.display = "block";
  if (page === "deposit") document.getElementById("depositPage").style.display = "block";
}

/* ================= LOGOUT ================= */
function logout() {
  localStorage.removeItem("token");
  window.location.href = "index.html";
}

/* ================= INIT ================= */
loadUser();
loadBalance();
loadServices();
loadOrders();

</script>

</body>
</html>
