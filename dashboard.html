<script>
const API_URL = "https://unasemeje-backend-3.onrender.com/api";

/* TOAST */
function showToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(()=>t.style.display="none",3000);
}

/* TOKEN */
function getToken(){ return localStorage.getItem("token"); }

/* LOGOUT */
function logout(){
  localStorage.removeItem("token");
  location.href="index.html";
}

/* SECTION SWITCH */
function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.style.display='none');
  document.getElementById(id+"Section").style.display='block';
}

/* LOAD USER */
async function loadUser(){
  try {
    const res = await fetch(API_URL+"/balance",{
      headers:{Authorization:"Bearer "+getToken()}
    });

    const data = await res.json();

    document.getElementById("balance").innerText = data.balance || 0;
    document.getElementById("balance2").innerText = data.balance || 0;

  } catch {
    showToast("Failed to load user");
  }
}

/* LOAD SERVICES */
let allServices = [];

async function loadServices(){
  try {
    const res = await fetch(API_URL+"/services");
    allServices = await res.json();
  } catch {
    showToast("Failed to load services");
  }
}

/* FILTER SERVICES */
function filterServices(){
  const category = document.getElementById("category").value;
  const serviceEl = document.getElementById("service");

  serviceEl.innerHTML = "";

  const filtered = allServices.filter(s =>
    s.category?.toLowerCase().includes(category)
  );

  filtered.forEach(s=>{
    serviceEl.innerHTML += `
      <option value="${s.serviceId}">
        ${s.name} - KES ${s.rate}
      </option>
    `;
  });
}

/* CREATE ORDER */
async function createOrder(){
  try {
    const res = await fetch(API_URL+"/order",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        Authorization:"Bearer "+getToken()
      },
      body: JSON.stringify({
        service: document.getElementById("service").value,
        link: document.getElementById("link").value,
        quantity: document.getElementById("quantity").value
      })
    });

    const data = await res.json();

    if(data.error){
      showToast(data.error);
    } else {
      showToast("Order placed successfully");
      loadOrders();
    }

  } catch {
    showToast("Order failed");
  }
}

/* LOAD ORDERS */
async function loadOrders(){
  try {
    const res = await fetch(API_URL+"/orders",{
      headers:{Authorization:"Bearer "+getToken()}
    });

    const data = await res.json();

    const table = document.getElementById("ordersTable");
    table.innerHTML = "";

    document.getElementById("totalOrders").innerText = data.length;

    data.forEach(o=>{
      table.innerHTML += `
        <tr>
          <td>${o._id}</td>
          <td>${o.service}</td>
          <td>${o.quantity}</td>
          <td>${o.status}</td>
        </tr>
      `;
    });

  } catch {
    showToast("Failed to load orders");
  }
}

/* DEPOSIT (STK PUSH) */
async function deposit(){
  try {
    const res = await fetch(API_URL+"/mpesa/stk",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        Authorization:"Bearer "+getToken()
      },
      body: JSON.stringify({
        phone: document.getElementById("phone").value,
        amount: document.getElementById("amount").value
      })
    });

    const data = await res.json();

    if(data.error){
      showToast(data.error);
    } else {
      showToast("STK sent to your phone 📲");
    }

  } catch {
    showToast("Deposit failed");
  }
}

/* INIT */
window.onload = ()=>{
  if(!getToken()){
    location.href="index.html";
    return;
  }

  loadUser();
  loadServices();
  loadOrders();
};
    </script>
