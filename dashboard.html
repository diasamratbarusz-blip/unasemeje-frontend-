<script>

const API = "https://unasemeje-backend-3.onrender.com/api";

let services = [];

// ================= TOKEN =================
function getToken(){
  return localStorage.getItem("token");
}

// ================= LOGOUT =================
function logout(){
  localStorage.removeItem("token");
  location.href = "index.html";
}

// ================= NAV =================
function show(id){
  document.querySelectorAll(".main > div").forEach(d => d.style.display="none");
  document.getElementById(id).style.display="block";
}

// ================= SAFE FETCH =================
async function safeFetch(url, options = {}) {
  try {
    const res = await fetch(url, options);
    if (!res.ok) throw new Error("Request failed");
    return await res.json();
  } catch (err) {
    console.error("API Error:", err);
    return null;
  }
}

// ================= USER =================
async function loadUser(){
  const data = await safeFetch(API + "/me", {
    headers:{ Authorization:"Bearer "+getToken() }
  });

  if(!data) return;

  document.getElementById("email").innerText = data.email || "User";
  document.getElementById("balance").innerText = data.balance || 0;
}

// ================= SERVICES =================
async function loadServices(){
  const data = await safeFetch(API + "/services");

  if(!data){
    document.getElementById("serviceList").innerHTML =
      "<p style='color:red'>Failed to load services</p>";
    return;
  }

  services = data;

  document.getElementById("serviceCount").innerText = services.length;

  const list = document.getElementById("serviceList");
  list.innerHTML = "";

  services.forEach(s => {
    list.innerHTML += `
      <div class="service">
        <b>${s.name}</b><br>
        Rate: ${s.rate}<br>
        Min: ${s.min} | Max: ${s.max}<br><br>

        <button onclick="order('${s.serviceId}')">
          Order Now
        </button>
      </div>
    `;
  });
}

// ================= ORDER =================
async function order(serviceId){
  const link = prompt("Enter link:");
  const qty = prompt("Enter quantity:");

  if(!link || !qty) return;

  const data = await safeFetch(API + "/order", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+getToken()
    },
    body:JSON.stringify({
      serviceId,
      link,
      quantity:Number(qty)
    })
  });

  if(!data){
    alert("❌ Order failed");
    return;
  }

  alert("✅ Order placed successfully");

  loadOrders();
  loadUser();
}

// ================= ORDERS =================
async function loadOrders(){
  const data = await safeFetch(API + "/orders", {
    headers:{ Authorization:"Bearer "+getToken() }
  });

  if(!data) return;

  document.getElementById("orderCount").innerText = data.length;

  const table = document.getElementById("orderTable");
  table.innerHTML = "";

  data.forEach(o => {
    table.innerHTML += `
      <tr>
        <td>${o._id}</td>
        <td>${o.service}</td>
        <td>${o.quantity}</td>
        <td>${o.status || "pending"}</td>
      </tr>
    `;
  });
}

// ================= INIT =================
window.onload = () => {
  if(!getToken()){
    location.href = "index.html";
    return;
  }

  loadUser();
  loadServices();
  loadOrders();
};

  </script>
