<!DOCTYPE html>
<html>
<head>
  <title>SMM Dashboard Pro</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1220;
      color: #e5e7eb;
    }

    /* LAYOUT */
    .app {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100vh;
    }

    /* SIDEBAR */
    .sidebar {
      background: #0f172a;
      padding: 20px;
    }

    .brand {
      font-size: 20px;
      font-weight: bold;
      color: #38bdf8;
      margin-bottom: 30px;
    }

    .nav a {
      display: block;
      color: #94a3b8;
      padding: 10px;
      margin: 5px 0;
      cursor: pointer;
      border-radius: 6px;
      text-decoration: none;
    }

    .nav a:hover {
      background: #1e293b;
      color: white;
    }

    /* MAIN */
    .main {
      padding: 20px;
    }

    /* TOP BAR */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #111827;
      padding: 15px;
      border-radius: 10px;
    }

    .balance {
      font-size: 18px;
      color: #22c55e;
      font-weight: bold;
    }

    /* CARDS */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
      gap: 12px;
      margin-top: 20px;
    }

    .card {
      background: #111827;
      padding: 15px;
      border-radius: 10px;
    }

    /* SERVICE GRID */
    .services {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
      gap: 12px;
    }

    .service {
      background: #0f172a;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #1e293b;
    }

    .service b {
      color: #38bdf8;
    }

    .service button {
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #38bdf8;
      cursor: pointer;
    }

    /* ORDER PANEL */
    .panel {
      margin-top: 20px;
      background: #111827;
      padding: 15px;
      border-radius: 10px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      background: #1f2937;
      border: none;
      color: white;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    /* TABLE */
    table {
      width: 100%;
      margin-top: 10px;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #1f2937;
      text-align: left;
    }

    /* MOBILE */
    @media(max-width: 768px){
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
      }
    }

  </style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="brand">SMM PRO</div>

    <div class="nav">
      <a onclick="show('home')">Dashboard</a>
      <a onclick="show('services')">Services</a>
      <a onclick="show('orders')">Orders</a>
      <a onclick="logout()">Logout</a>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- TOP -->
    <div class="topbar">
      <div id="email">User</div>
      <div class="balance">KES <span id="balance">0</span></div>
    </div>

    <!-- DASHBOARD -->
    <div id="home">

      <div class="cards">
        <div class="card">Total Services: <span id="serviceCount">0</span></div>
        <div class="card">Total Orders: <span id="orderCount">0</span></div>
      </div>

    </div>

    <!-- SERVICES -->
    <div id="services" style="display:none;">
      <h3>Marketplace Services</h3>
      <div class="services" id="serviceList"></div>
    </div>

    <!-- ORDERS -->
    <div id="orders" style="display:none;">
      <h3>My Orders</h3>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Service</th>
            <th>Qty</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="orderTable"></tbody>
      </table>
    </div>

  </div>
</div>

<script>

const API = "https://unasemeje-backend-3.onrender.com/api";

let services = [];

function getToken(){
  return localStorage.getItem("token");
}

function logout(){
  localStorage.removeItem("token");
  location.href = "index.html";
}

function show(id){
  document.querySelectorAll(".main > div").forEach(d => d.style.display="none");
  document.getElementById(id).style.display="block";
}

/* USER */
async function loadUser(){
  const res = await fetch(API+"/me",{
    headers:{Authorization:"Bearer "+getToken()}
  });

  const data = await res.json();
  email.innerText = data.email;
  balance.innerText = data.balance;
}

/* SERVICES */
async function loadServices(){
  const res = await fetch(API+"/services");
  services = await res.json();

  serviceCount.innerText = services.length;

  const list = document.getElementById("serviceList");
  list.innerHTML = "";

  services.forEach(s=>{
    list.innerHTML += `
      <div class="service">
        <b>${s.name}</b><br>
        Rate: ${s.rate}<br>
        Min: ${s.min} | Max: ${s.max}
        <button onclick="order('${s.serviceId}')">Order</button>
      </div>
    `;
  });
}

/* ORDER QUICK */
function order(serviceId){
  const link = prompt("Enter link:");
  const qty = prompt("Enter quantity:");

  fetch(API+"/order",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+getToken()
    },
    body:JSON.stringify({serviceId, link, quantity:qty})
  });

  alert("Order sent");
  loadOrders();
}

/* ORDERS */
async function loadOrders(){
  const res = await fetch(API+"/orders",{
    headers:{Authorization:"Bearer "+getToken()}
  });

  const data = await res.json();
  orderCount.innerText = data.length;

  const table = document.getElementById("orderTable");
  table.innerHTML = "";

  data.forEach(o=>{
    table.innerHTML += `
      <tr>
        <td>${o._id}</td>
        <td>${o.service}</td>
        <td>${o.quantity}</td>
        <td>${o.status}</td>
      </tr>
    `;
  });
}

/* INIT */
window.onload = ()=>{
  if(!getToken()){
    location.href="index.html";
    return;
  }

  loadUser();
  loadServices();
  loadOrders();
};

</script>

</body>
</html>
