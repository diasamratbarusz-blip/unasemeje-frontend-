<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMM Panel Dashboard</title>
  <style>
    body { margin: 0; font-family: Arial; background:#0f172a; color:#e2e8f0; }
    .container { display:flex; height:100vh; }
    .sidebar { width:220px; background:#020617; padding:20px; }
    .sidebar button { width:100%; margin-bottom:10px; padding:10px; background:#1e293b; border:none; color:white; cursor:pointer; border-radius:5px; }
    .main { flex:1; padding:20px; overflow-y:auto; }
    .card { background:#1e293b; padding:20px; border-radius:10px; margin-bottom:20px; }
    input, select { width:100%; padding:10px; margin:5px 0 10px; border-radius:5px; border:none; }
    button.action { padding:10px; background:#22c55e; border:none; color:white; cursor:pointer; border-radius:5px; }
    table { width:100%; border-collapse: collapse; }
    th, td { padding:10px; border-bottom:1px solid #334155; }
    .hidden { display:none; }
  </style>
</head>
<body>
<div class="container">
  <div class="sidebar">
    <h2>SMM Panel</h2>
    <button onclick="showSection('dashboard')">Dashboard</button>
    <button onclick="showSection('order')">Place Order</button>
    <button onclick="showSection('orders')">My Orders</button>
    <button onclick="showSection('deposit')">Deposit</button>
    <button onclick="logout()">Logout</button>
  </div>  <div class="main"><div id="dashboard" class="card">
  <h2>Dashboard</h2>
  <p>Email: <span id="userEmail"></span></p>
  <p>Balance: <span id="balance">0</span></p>
</div>

<div id="order" class="card hidden">
  <h2>Place Order</h2>
  <select id="service"></select>
  <input id="link" placeholder="Link" />
  <input id="quantity" type="number" placeholder="Quantity" />
  <button class="action" onclick="createOrder()">Submit</button>
</div>

<div id="orders" class="card hidden">
  <h2>My Orders</h2>
  <table>
    <thead>
      <tr><th>ID</th><th>Service</th><th>Qty</th><th>Status</th></tr>
    </thead>
    <tbody id="ordersTable"></tbody>
  </table>
</div>

<div id="deposit" class="card hidden">
  <h2>Deposit</h2>
  <input id="amount" type="number" placeholder="Amount" />
  <button class="action" onclick="submitDeposit()">Submit</button>
</div>

  </div>
</div><script>
const API_URL = "https://unasemeje-backend-3.onrender.com/api";

function getToken(){ return localStorage.getItem("token"); }
function logout(){ localStorage.removeItem("token"); location.href="index.html"; }

function showSection(id){ document.querySelectorAll('.card').forEach(el=>el.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }

// LOAD USER
async function loadUser(){
  const res = await fetch(API_URL+"/me",{headers:{Authorization:"Bearer "+getToken()}});
  const data = await res.json();
  document.getElementById("userEmail").innerText = data.email;
  document.getElementById("balance").innerText = data.balance;
}

// LOAD SERVICES (upgrade)
async function loadServices(){
  const res = await fetch(API_URL+"/services");
  const services = await res.json();

  const select = document.getElementById("service");
  select.innerHTML = "";

  services.forEach(s=>{
    select.innerHTML += `<option value="${s.externalServiceId}">${s.name} - ${s.rate}</option>`;
  });
}

// CREATE ORDER
async function createOrder(){
  const service = document.getElementById("service").value;
  const link = document.getElementById("link").value;
  const quantity = document.getElementById("quantity").value;

  const res = await fetch(API_URL+"/orders",{
    method:"POST",
    headers:{"Content-Type":"application/json", Authorization:"Bearer "+getToken()},
    body: JSON.stringify({service,link,quantity})
  });

  alert("Order placed");
  loadOrders();
}

// LOAD ORDERS (auto refresh)
async function loadOrders(){
  const res = await fetch(API_URL+"/orders",{headers:{Authorization:"Bearer "+getToken()}});
  const orders = await res.json();

  const table = document.getElementById("ordersTable");
  table.innerHTML = "";

  orders.forEach(o=>{
    table.innerHTML += `<tr><td>${o._id}</td><td>${o.service}</td><td>${o.quantity}</td><td>${o.status}</td></tr>`;
  });
}

// AUTO REFRESH ORDERS EVERY 10s
setInterval(loadOrders,10000);

// DEPOSIT
async function submitDeposit(){
  const amount = document.getElementById("amount").value;

  await fetch(API_URL+"/deposits/request",{
    method:"POST",
    headers:{"Content-Type":"application/json", Authorization:"Bearer "+getToken()},
    body: JSON.stringify({amount})
  });

  alert("Deposit requested");
}

// INIT
window.onload = ()=>{
  if(!getToken()){ location.href="index.html"; return; }
  loadUser();
  loadOrders();
  loadServices();
};
</script></body>
</html>
