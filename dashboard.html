<!DOCTYPE html>
<html>
<head>
  <title>SMM Panel Pro Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ICONS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 15px;
      background: #111827;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      padding: 15px;
      max-width: 1100px;
      margin: auto;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-top: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 10px;
    }

    input, select {
      padding: 10px;
      border-radius: 8px;
      border: none;
      width: 100%;
      margin-top: 8px;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      cursor: pointer;
      margin-top: 10px;
      width: 100%;
    }

    button:hover {
      background: #16a34a;
    }

    .service {
      background: #0f172a;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid #334155;
    }

    .service:hover {
      background: #334155;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .badge {
      background: #22c55e;
      padding: 5px 10px;
      border-radius: 6px;
    }

    #toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #111827;
      padding: 10px 15px;
      border-radius: 8px;
      display: none;
      z-index: 999;
    }

    .social-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .social-item {
      background: #0f172a;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      border: 1px solid #334155;
      transition: 0.2s;
    }

    .social-item:hover {
      background: #334155;
    }

    .icon-box {
      font-size: 20px;
      margin-bottom: 5px;
    }
  </style>
</head>

<body>

<header>
  🚀 FULL SMM DASHBOARD PRO
</header>

<div class="container">

  <!-- USER -->
  <div class="card topbar">
    <div>
      User: <b id="userEmail">Loading...</b>
    </div>

    <div>
      Balance: <span class="badge" id="balance">0</span>
      <button onclick="logout()" style="background:red;width:auto;">Logout</button>
    </div>
  </div>

  <!-- SOCIAL SELECTOR -->
  <div class="card">
    <h3>Choose Platform</h3>

    <div class="social-list">
      <div class="social-item" onclick="setPlatform('instagram')"><i class="fab fa-instagram"></i><br>Instagram</div>
      <div class="social-item" onclick="setPlatform('tiktok')"><i class="fab fa-tiktok"></i><br>TikTok</div>
      <div class="social-item" onclick="setPlatform('facebook')"><i class="fab fa-facebook"></i><br>Facebook</div>
      <div class="social-item" onclick="setPlatform('youtube')"><i class="fab fa-youtube"></i><br>YouTube</div>
      <div class="social-item" onclick="setPlatform('twitter')"><i class="fab fa-twitter"></i><br>Twitter/X</div>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="card">
    <input id="search" placeholder="Search services..." onkeyup="renderServices()">
  </div>

  <!-- SERVICES -->
  <div class="card">
    <h3>Services</h3>
    <div id="services" class="grid"></div>
  </div>

  <!-- ORDER -->
  <div class="card">
    <h3>Place Order</h3>

    <input id="serviceId" placeholder="Service ID" readonly>
    <input id="link" placeholder="Target Link">
    <input id="quantity" type="number" placeholder="Quantity" oninput="calcPrice()">

    <p>Total Price: <b id="total">0</b></p>

    <button onclick="placeOrder()">Place Order</button>
  </div>

  <!-- DEPOSIT -->
  <div class="card">
    <h3>Deposit via M-Pesa</h3>
    <input id="phone" placeholder="2547XXXXXXXX">
    <input id="amount" placeholder="Amount">

    <button onclick="deposit()">Send STK Push</button>
  </div>

  <!-- ORDERS -->
  <div class="card">
    <h3>My Orders</h3>
    <ul id="orders"></ul>
  </div>

</div>

<div id="toast"></div>

<script>
const API_URL = "https://unasemeje-backend-3.onrender.com/api";

let allServices = [];
let selectedRate = 0;
let currentPlatform = "all";

/* AUTH */
function getToken(){
  return localStorage.getItem("token");
}

if(!getToken()){
  window.location.href = "index.html";
}

/* TOAST */
function toast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(()=>t.style.display="none",3000);
}

/* USER */
function loadUser(){
  try {
    const p = JSON.parse(atob(getToken().split(".")[1]));
    document.getElementById("userEmail").innerText = p.email;
  } catch {}
}

/* BALANCE */
async function loadBalance(){
  const res = await fetch(API_URL+"/me",{
    headers:{Authorization:"Bearer "+getToken()}
  });
  const data = await res.json();
  document.getElementById("balance").innerText = data.balance || 0;
}

/* LOAD SERVICES */
async function loadServices(){
  const res = await fetch(API_URL+"/services");
  const json = await res.json();

  allServices = Object.values(json.data).flat();
  renderServices();
}

/* FILTER PLATFORM */
function setPlatform(p){
  currentPlatform = p;
  renderServices();
}

/* RENDER */
function renderServices(){
  const box = document.getElementById("services");
  box.innerHTML = "";

  const search = document.getElementById("search").value.toLowerCase();

  allServices.forEach(s=>{
    const cat = (s.category||"").toLowerCase();

    if(currentPlatform !== "all" && !cat.includes(currentPlatform)) return;
    if(!s.name.toLowerCase().includes(search)) return;

    const div = document.createElement("div");
    div.className="service";

    div.innerHTML = `
      <b>${s.name}</b><br>
      ID: ${s.serviceId}<br>
      Rate: ${s.rate}
    `;

    div.onclick = ()=>{
      document.getElementById("serviceId").value = s.serviceId;
      selectedRate = s.rate;
      calcPrice();
    };

    box.appendChild(div);
  });
}

/* PRICE */
function calcPrice(){
  const q = document.getElementById("quantity").value || 0;
  document.getElementById("total").innerText = ((selectedRate/1000)*q).toFixed(2);
}

/* ORDER */
async function placeOrder(){
  const serviceId = document.getElementById("serviceId").value;
  const link = document.getElementById("link").value;
  const quantity = document.getElementById("quantity").value;

  if(!serviceId || !link || !quantity){
    return toast("Fill all fields");
  }

  const res = await fetch(API_URL+"/order",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+getToken()
    },
    body: JSON.stringify({serviceId,link,quantity})
  });

  const data = await res.json();

  if(!res.ok) return toast(data.error);

  toast("Order placed");
  loadOrders();
  loadBalance();
}

/* ORDERS */
async function loadOrders(){
  const res = await fetch(API_URL+"/orders",{
    headers:{Authorization:"Bearer "+getToken()}
  });

  const data = await res.json();

  const list = document.getElementById("orders");
  list.innerHTML="";

  data.forEach(o=>{
    const li = document.createElement("li");
    li.textContent = `${o.service} | ${o.quantity} | ${o.cost}`;
    list.appendChild(li);
  });
}

/* MPESA */
async function deposit(){
  const phone = document.getElementById("phone").value;
  const amount = document.getElementById("amount").value;

  const res = await fetch(API_URL+"/mpesa/stk",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+getToken()
    },
    body: JSON.stringify({phone,amount})
  });

  const data = await res.json();
  toast(data.message || "STK sent");
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("token");
  window.location.href="index.html";
}

/* INIT */
loadUser();
loadServices();
loadBalance();
loadOrders();
</script>

</body>
</html>
