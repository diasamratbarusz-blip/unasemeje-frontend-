<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - unasemeje</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .dashboard {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 220px;
      background: #020617;
      padding: 20px;
    }

    .sidebar h2 {
      color: #38bdf8;
      margin-bottom: 20px;
    }

    .sidebar a {
      display: block;
      color: #cbd5f5;
      margin: 12px 0;
      text-decoration: none;
      cursor: pointer;
    }

    .sidebar a:hover {
      color: #38bdf8;
      padding-left: 5px;
    }

    .main {
      flex: 1;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      background: rgba(17,24,39,0.85);
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
      gap: 15px;
    }

    .card {
      background: rgba(17,24,39,0.85);
      padding: 15px;
      border-radius: 12px;
    }

    .section {
      margin-top: 20px;
      background: rgba(17,24,39,0.85);
      padding: 20px;
      border-radius: 12px;
    }

    select, input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
      background: #1e293b;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg,#38bdf8,#22c55e);
      cursor: pointer;
      font-weight: bold;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #1e293b;
      text-align: left;
    }

    #toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #22c55e;
      padding: 10px 15px;
      border-radius: 8px;
      display: none;
    }
  </style>
</head>

<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>unasemeje</h2>
    <a onclick="showSection('dashboard')">Dashboard</a>
    <a onclick="showSection('order')">New Order</a>
    <a onclick="showSection('orders')">Orders</a>
    <a onclick="showSection('deposit')">Add Funds</a>
    <a onclick="logout()">Logout</a>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="topbar">
      <div id="userEmail">User</div>
      <div>Balance: KES <span id="balance">0</span></div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboardSection">
      <div class="cards">
        <div class="card">Total Orders: <span id="totalOrders">0</span></div>
        <div class="card">Balance: <span id="balance2">0</span></div>
      </div>
    </div>

    <!-- ORDER -->
    <div id="orderSection" class="section" style="display:none;">
      <h3>New Order</h3>

      <select id="category" onchange="filterServices()">
        <option value="">Select Category</option>
        <option value="facebook">Facebook</option>
        <option value="instagram">Instagram</option>
        <option value="tiktok">TikTok</option>
        <option value="youtube">YouTube</option>
      </select>

      <select id="service"></select>

      <input id="link" placeholder="Enter Link">
      <input id="quantity" type="number" placeholder="Quantity">

      <button onclick="createOrder()">Place Order</button>
    </div>

    <!-- ORDERS -->
    <div id="ordersSection" class="section" style="display:none;">
      <h3>Orders</h3>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Service</th>
            <th>Qty</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="ordersTable"></tbody>
      </table>
    </div>

    <!-- DEPOSIT -->
    <div id="depositSection" class="section" style="display:none;">
      <h3>Add Funds (M-Pesa)</h3>

      <p><b>Send to: 0715509440</b></p>

      <input id="phone" placeholder="Your Phone">
      <input id="amount" placeholder="Amount">
      <input id="code" placeholder="Transaction Code">

      <button onclick="deposit()">Submit Deposit</button>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
const API_URL = "https://unasemeje-backend-3.onrender.com/api";

let allServices = [];

function showToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(()=>t.style.display="none",3000);
}

function getToken(){
  return localStorage.getItem("token");
}

function logout(){
  localStorage.removeItem("token");
  location.href="index.html";
}

function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.style.display='none');
  document.getElementById(id+"Section").style.display='block';
}

/* USER */
async function loadUser(){
  const res = await fetch(API_URL+"/me", {
    headers: { Authorization: "Bearer " + getToken() }
  });

  const data = await res.json();

  document.getElementById("userEmail").innerText = data.email;
  document.getElementById("balance").innerText = data.balance;
  document.getElementById("balance2").innerText = data.balance;
}

/* SERVICES */
async function loadServices(){
  const res = await fetch(API_URL+"/services");
  allServices = await res.json();

  filterServices();
}

function filterServices(){
  const category = document.getElementById("category").value;
  const service = document.getElementById("service");

  service.innerHTML = "";

  const filtered = allServices.filter(s =>
    (s.category || "").toLowerCase().includes(category)
  );

  filtered.forEach(s=>{
    service.innerHTML += `
      <option value="${s.serviceId}">
        ${s.name} - ${s.rate}
      </option>
    `;
  });
}

/* ORDERS */
async function loadOrders(){
  const res = await fetch(API_URL+"/orders", {
    headers: { Authorization: "Bearer " + getToken() }
  });

  const data = await res.json();

  document.getElementById("ordersTable").innerHTML = "";
  document.getElementById("totalOrders").innerText = data.length;

  data.forEach(o=>{
    document.getElementById("ordersTable").innerHTML += `
      <tr>
        <td>${o._id}</td>
        <td>${o.service}</td>
        <td>${o.quantity}</td>
        <td>${o.status}</td>
      </tr>
    `;
  });
}

/* ORDER */
async function createOrder(){
  const service = document.getElementById("service").value;
  const link = document.getElementById("link").value;
  const quantity = document.getElementById("quantity").value;

  await fetch(API_URL+"/order", {
    method: "POST",
    headers: {
      "Content-Type":"application/json",
      Authorization: "Bearer " + getToken()
    },
    body: JSON.stringify({ serviceId: service, link, quantity })
  });

  showToast("Order placed");
  loadOrders();
}

/* DEPOSIT */
async function deposit(){
  await fetch(API_URL+"/deposits/request", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+getToken()
    },
    body: JSON.stringify({
      phone: document.getElementById("phone").value,
      amount: document.getElementById("amount").value,
      code: document.getElementById("code").value
    })
  });

  showToast("Deposit submitted");
}

/* INIT */
window.onload = ()=>{
  if(!getToken()){
    location.href="index.html";
    return;
  }

  loadUser();
  loadServices();
  loadOrders();
};
</script>

</body>
</html>
