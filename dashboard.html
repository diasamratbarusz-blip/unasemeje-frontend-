<!DOCTYPE html>
<html>
<head>
  <title>SMM Panel Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 15px;
      background: #111827;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      padding: 15px;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input, select {
      padding: 10px;
      border-radius: 8px;
      border: none;
      width: 100%;
      max-width: 300px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-top: 10px;
    }

    .service {
      background: #111827;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
      cursor: pointer;
    }

    .service:hover {
      background: #334155;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 10px;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #16a34a;
    }
  </style>
</head>

<body>

<header>
  SMM PANEL DASHBOARD
</header>

<div class="container">

  <!-- FILTERS -->
  <div class="row">
    <input id="search" placeholder="Search services..." onkeyup="renderServices()">

    <select id="platformFilter" onchange="renderServices()">
      <option value="all">All Platforms</option>
      <option value="Instagram">Instagram</option>
      <option value="TikTok">TikTok</option>
      <option value="Facebook">Facebook</option>
      <option value="YouTube">YouTube</option>
      <option value="Twitter/X">Twitter/X</option>
    </select>
  </div>

  <!-- SERVICES -->
  <div class="card">
    <h3>Services</h3>
    <div id="services" class="grid"></div>
  </div>

  <!-- ORDER BOX -->
  <div class="card">
    <h3>Place Order</h3>

    <input id="serviceId" placeholder="Service ID" readonly>
    <input id="link" placeholder="Target Link">
    <input id="quantity" placeholder="Quantity" type="number" oninput="calcPrice()">

    <p>Total Price: <b id="total">0</b></p>

    <button onclick="placeOrder()">Place Order</button>
  </div>

</div>

<script>

let servicesData = [];
let selectedRate = 0;

/**
 * =========================
 * LOAD SERVICES
 * =========================
 */
async function loadServices() {
  try {
    let res = await fetch("/api/services");
    let json = await res.json();

    servicesData = json.data || [];
    renderServices();

  } catch (err) {
    console.error(err);
    alert("Failed to load services");
  }
}

/**
 * =========================
 * RENDER SERVICES
 * =========================
 */
function renderServices() {
  let container = document.getElementById("services");
  container.innerHTML = "";

  let search = document.getElementById("search").value.toLowerCase();
  let filter = document.getElementById("platformFilter").value;

  servicesData.forEach(s => {

    let platform = detectPlatform(s.category || "");

    if (filter !== "all" && platform !== filter) return;
    if (!s.name.toLowerCase().includes(search)) return;

    let div = document.createElement("div");
    div.className = "service";

    div.innerHTML = `
      <b>${s.name}</b><br>
      ID: ${s.serviceId}<br>
      Price: ${s.rate}
    `;

    div.onclick = () => selectService(s);

    container.appendChild(div);
  });
}

/**
 * =========================
 * PLATFORM DETECTOR
 * =========================
 */
function detectPlatform(cat) {
  cat = cat.toLowerCase();

  if (cat.includes("instagram")) return "Instagram";
  if (cat.includes("tiktok")) return "TikTok";
  if (cat.includes("facebook")) return "Facebook";
  if (cat.includes("youtube")) return "YouTube";
  if (cat.includes("twitter") || cat.includes("x")) return "Twitter/X";

  return "Other";
}

/**
 * =========================
 * SELECT SERVICE
 * =========================
 */
function selectService(service) {
  document.getElementById("serviceId").value = service.serviceId;
  selectedRate = Number(service.rate || 0);
  calcPrice();
}

/**
 * =========================
 * PRICE CALCULATOR
 * =========================
 */
function calcPrice() {
  let qty = Number(document.getElementById("quantity").value);
  let total = (qty * selectedRate) / 1000;

  document.getElementById("total").innerText =
    isNaN(total) ? "0" : total.toFixed(2);
}

/**
 * =========================
 * PLACE ORDER (FIXED AUTH)
 * =========================
 */
async function placeOrder() {

  let token = localStorage.getItem("token");

  let data = {
    serviceId: document.getElementById("serviceId").value,
    link: document.getElementById("link").value,
    quantity: Number(document.getElementById("quantity").value)
  };

  if (!data.serviceId || !data.link || !data.quantity) {
    alert("Fill all fields");
    return;
  }

  try {
    let res = await fetch("/api/order", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify(data)
    });

    let json = await res.json();

    alert(json.message || json.error || "Done");

  } catch (err) {
    alert("Order failed");
  }
}

/**
 * INIT
 */
loadServices();

</script>

</body>
  </html>
