<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMM Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.dashboard {
  display: flex;
}

.sidebar {
  width: 230px;
  background: #111827;
  min-height: 100vh;
  padding: 20px;
}

.sidebar a {
  display: block;
  padding: 10px;
  color: #cbd5e1;
  cursor: pointer;
  margin-top: 5px;
  border-radius: 6px;
}

.sidebar a:hover {
  background: #1f2937;
}

.main {
  flex: 1;
  padding: 20px;
}

.navbar {
  display: flex;
  justify-content: space-between;
  background: #1e293b;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

.list-item, .service {
  background: #334155;
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 8px;
  cursor: pointer;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 6px;
  border: none;
  background: #0f172a;
  color: white;
}

button {
  margin-top: 10px;
  padding: 10px;
  background: #7c3aed;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

/* ================= POPUP ================= */
#orderModal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  justify-content: center;
  align-items: center;
}

.modal-box {
  background: #1e293b;
  padding: 20px;
  width: 350px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="dashboard">

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>SMM PANEL</h2>

  <a onclick="showPage('home')">Dashboard</a>
  <a onclick="showPage('services')">Services</a>
  <a onclick="showPage('orders')">Orders</a>
  <a onclick="showPage('deposit')">Add Funds</a>
</div>

<!-- MAIN -->
<div class="main">

<div class="navbar">
  <div>👤 <b id="userEmail">Loading...</b></div>
  <div>💰 Balance: <span id="balance">0</span></div>
</div>

<!-- SERVICES PAGE -->
<div id="services" class="page">
  <div class="card">
    <h3>Services</h3>
    <div id="servicesList"></div>
  </div>
</div>

<!-- ORDERS PAGE -->
<div id="orders" class="page" style="display:none;">
  <div class="card">
    <h3>Orders</h3>
    <ul id="ordersList"></ul>
  </div>
</div>

<!-- DEPOSIT -->
<div id="deposit" class="page" style="display:none;">
  <div class="card">
    <h3>Add Funds</h3>

    <p>
      Send money to: <b>0715509440</b><br>
      Name: <b>FAITH CHERUIYOT</b>
    </p>

    <input id="depPhone" placeholder="Your phone">
    <input id="depAmount" placeholder="Amount">
    <textarea id="depMessage" placeholder="Paste M-Pesa message"></textarea>

    <button onclick="submitDeposit()">Add Funds</button>
  </div>
</div>

</div>
</div>

<!-- ================= ORDER POPUP ================= -->
<div id="orderModal">
  <div class="modal-box">
    <h3>Place Order</h3>

    <p><b>Service:</b> <span id="mService"></span></p>

    <input id="mLink" placeholder="Enter Link">
    <input id="mQty" type="number" placeholder="Quantity">

    <p>Total: <b id="mTotal">0</b></p>

    <button onclick="placeOrder()">Confirm Order</button>
    <button onclick="closeModal()" style="background:red;">Cancel</button>
  </div>
</div>

<script>

const API = "https://unasemeje-backend-3.onrender.com/api";
const token = localStorage.getItem("token");

let selectedService = null;

/* AUTH */
if (!token) location.href = "index.html";

/* USER */
function loadUser(){
  const d = JSON.parse(atob(token.split(".")[1]));
  document.getElementById("userEmail").innerText = d.email;
}

/* BALANCE */
async function loadBalance(){
  const res = await fetch(API+"/me",{
    headers:{Authorization:"Bearer "+token}
  });

  const data = await res.json();
  document.getElementById("balance").innerText = data.balance || 0;
}

/* SERVICES */
async function loadServices(){
  const res = await fetch(API+"/services");
  const json = await res.json();

  const services = json.data || {};

  const container = document.getElementById("servicesList");
  container.innerHTML = "";

  Object.keys(services).forEach(platform => {

    const title = document.createElement("h4");
    title.innerText = platform;
    container.appendChild(title);

    services[platform].forEach(s => {
      const div = document.createElement("div");
      div.className = "service";

      div.innerHTML = `
        <b>${s.name}</b><br>
        KSH ${s.rate}
      `;

      // ✅ CLICK = OPEN ORDER POPUP
      div.onclick = () => openOrder(s);

      container.appendChild(div);
    });
  });
}

/* ================= OPEN ORDER MODAL ================= */
function openOrder(service){
  selectedService = service;

  document.getElementById("mService").innerText = service.name;

  document.getElementById("mLink").value = "";
  document.getElementById("mQty").value = "";
  document.getElementById("mTotal").innerText = "0";

  document.getElementById("orderModal").style.display = "flex";
}

/* CLOSE MODAL */
function closeModal(){
  document.getElementById("orderModal").style.display = "none";
}

/* PRICE CALC */
document.addEventListener("input", function(e){
  if(e.target.id === "mQty"){
    const qty = e.target.value || 0;
    const rate = selectedService?.rate || 0;

    document.getElementById("mTotal").innerText =
      ((rate/1000) * qty).toFixed(2);
  }
});

/* PLACE ORDER */
async function placeOrder(){

  const link = document.getElementById("mLink").value;
  const quantity = document.getElementById("mQty").value;

  const res = await fetch(API+"/order",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+token
    },
    body:JSON.stringify({
      serviceId: selectedService.serviceId,
      link,
      quantity
    })
  });

  const data = await res.json();
  alert(data.message || data.error);

  closeModal();
  loadBalance();
}

/* DEPOSIT */
async function submitDeposit(){
  const phone = document.getElementById("depPhone").value;
  const amount = document.getElementById("depAmount").value;
  const message = document.getElementById("depMessage").value;

  const res = await fetch(API+"/deposit",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+token
    },
    body:JSON.stringify({ phone, amount, message })
  });

  const data = await res.json();
  alert(data.message || data.error);
}

/* NAV */
function showPage(page){
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById(page).style.display="block";
}

/* INIT */
loadUser();
loadBalance();
loadServices();

</script>

</body>
</html>
