<script>
const API_URL = "https://unasemeje-backend-3.onrender.com/api";

/* ERROR HANDLER (prevents white screen) */
window.onerror = function(message) {
  console.log("JS ERROR:", message);
};

/* TOAST */
function showToast(msg){
  const t = document.getElementById("toast");
  if(!t) return alert(msg);

  t.innerText = msg;
  t.style.display = "block";
  setTimeout(()=>t.style.display="none",3000);
}

/* TOKEN */
function getToken(){ 
  return localStorage.getItem("token"); 
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("token");
  location.href="index.html";
}

/* SECTION SWITCH */
function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.style.display='none');
  const el = document.getElementById(id+"Section");
  if(el) el.style.display = 'block';
}

/* LOAD USER */
async function loadUser(){
  try {
    const res = await fetch(API_URL+"/balance",{
      headers:{ Authorization:"Bearer "+getToken() }
    });

    const data = await res.json();

    document.getElementById("balance").innerText = data.balance || 0;
    document.getElementById("balance2").innerText = data.balance || 0;

  } catch(err){
    console.error(err);
    showToast("Failed to load user");
  }
}

/* SERVICES */
let allServices = [];

async function loadServices(){
  try {
    const res = await fetch(API_URL+"/services");
    allServices = await res.json();
  } catch(err){
    console.error(err);
  }
}

/* FILTER SERVICES */
function filterServices(){
  const category = document.getElementById("category").value;
  const serviceEl = document.getElementById("service");

  serviceEl.innerHTML = "";

  const filtered = allServices.filter(s =>
    s.name.toLowerCase().includes(category)
  );

  filtered.forEach(s=>{
    serviceEl.innerHTML += `<option value="${s.externalServiceId}">${s.name}</option>`;
  });
}

/* CREATE ORDER */
async function createOrder(){
  try {
    const service = document.getElementById("service").value;
    const link = document.getElementById("link").value;
    const quantity = document.getElementById("quantity").value;

    await fetch(API_URL+"/order",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        Authorization:"Bearer "+getToken()
      },
      body: JSON.stringify({ service, link, quantity })
    });

    showToast("Order placed");
    loadOrders();

  } catch(err){
    console.error(err);
    showToast("Order failed");
  }
}

/* LOAD ORDERS */
async function loadOrders(){
  try {
    const res = await fetch(API_URL+"/orders",{
      headers:{ Authorization:"Bearer "+getToken() }
    });

    const data = await res.json();

    const table = document.getElementById("ordersTable");
    const total = document.getElementById("totalOrders");

    table.innerHTML = "";
    total.innerText = data.length;

    data.forEach(o=>{
      table.innerHTML += `
        <tr>
          <td>${o._id}</td>
          <td>${o.service}</td>
          <td>${o.quantity}</td>
          <td>${o.status}</td>
        </tr>
      `;
    });

  } catch(err){
    console.error(err);
  }
}

/* DEPOSIT */
async function deposit(){
  try {
    const phone = document.getElementById("phone").value;
    const amount = document.getElementById("amount").value;
    const code = document.getElementById("code").value;

    await fetch(API_URL+"/deposits/request",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        Authorization:"Bearer "+getToken()
      },
      body: JSON.stringify({ phone, amount, code })
    });

    showToast("Deposit submitted");

  } catch(err){
    console.error(err);
    showToast("Deposit failed");
  }
}

/* INIT */
window.onload = ()=>{
  if(!getToken()){
    location.href="index.html";
    return;
  }

  loadUser();
  loadServices();
  loadOrders();
};
  </script>
