<!DOCTYPE html>
<html>
<head>
  <title>unasemeje Panel</title>

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#0f172a;
      color:white;
    }

    .layout { display:flex; }

    .sidebar {
      width:230px;
      height:100vh;
      background:#020617;
      padding:20px;
    }

    .sidebar h2 { margin-bottom:20px; }

    .sidebar button {
      width:100%;
      padding:12px;
      margin-bottom:10px;
      background:#1e293b;
      border:none;
      color:white;
      cursor:pointer;
      border-radius:6px;
      text-align:left;
    }

    .main { flex:1; padding:20px; }

    .topbar {
      display:flex;
      justify-content:space-between;
      background:#1e293b;
      padding:12px;
      border-radius:10px;
      margin-bottom:20px;
    }

    .stats {
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
      gap:15px;
      margin-bottom:20px;
    }

    .stat-card {
      background:#1e293b;
      padding:15px;
      border-radius:10px;
    }

    .card {
      background:#1e293b;
      padding:20px;
      border-radius:10px;
      margin-bottom:20px;
    }

    select, input {
      width:100%;
      padding:12px;
      margin:10px 0;
      border:none;
      border-radius:6px;
    }

    button.action {
      width:100%;
      padding:12px;
      background:#3b82f6;
      border:none;
      color:white;
      border-radius:6px;
      cursor:pointer;
    }

    table {
      width:100%;
      border-collapse:collapse;
    }

    th, td {
      padding:10px;
      border-bottom:1px solid #334155;
    }

    #toast {
      position:fixed;
      bottom:20px;
      right:20px;
      background:#22c55e;
      padding:10px 15px;
      border-radius:5px;
      display:none;
    }

    @media(max-width:768px){
      .layout { flex-direction:column; }
      .sidebar { width:100%; height:auto; }
    }

  </style>
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>unasemeje</h2>

    <button onclick="show('dashboard')">Dashboard</button>
    <button onclick="show('order')">New Order</button>
    <button onclick="show('orders')">Orders</button>
    <button onclick="show('deposit')">Add Funds</button>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <div id="userEmail"></div>
      <div>Balance: KES <span id="balance">0</span></div>
    </div>

    <!-- STATS -->
    <div class="stats">
      <div class="stat-card">Total Orders: <span id="totalOrders">0</span></div>
      <div class="stat-card">Balance: KES <span id="statBalance">0</span></div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="card">
      <h2>Dashboard</h2>
      <p>Welcome to unasemeje premium panel</p>
    </div>

    <!-- ORDER -->
    <div id="order" class="card">
      <h2>New Order</h2>

      <select id="service"></select>
      <input id="link" placeholder="Enter Link">
      <input id="quantity" type="number" placeholder="Quantity">

      <button class="action" onclick="createOrder()">Submit Order</button>
    </div>

    <!-- ORDERS -->
    <div id="orders" class="card">
      <h2>Order History</h2>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Service</th>
            <th>Qty</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="ordersTable"></tbody>
      </table>
    </div>

    <!-- DEPOSIT -->
    <div id="deposit" class="card">
      <h2>Add Funds</h2>

      <input id="amount" placeholder="Enter Amount">
      <button class="action" onclick="deposit()">Deposit</button>
    </div>

  </div>

</div>

<div id="toast"></div>

<script>
const API_URL = "https://unasemeje-backend-3.onrender.com/api";

function showToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",3000);
}

function getToken(){ return localStorage.getItem("token"); }

function logout(){
  localStorage.removeItem("token");
  location.href="index.html";
}

function show(id){
  document.querySelectorAll('.card').forEach(el=>el.style.display='none');
  document.getElementById(id).style.display='block';
}

// USER
async function loadUser(){
  const res = await fetch(API_URL+"/me",{headers:{Authorization:"Bearer "+getToken()}});
  const data = await res.json();
  userEmail.innerText = data.email;
  balance.innerText = data.balance;
  statBalance.innerText = data.balance;
}

// SERVICES
async function loadServices(){
  const res = await fetch(API_URL+"/services");
  const data = await res.json();

  service.innerHTML="";
  data.forEach(x=>{
    service.innerHTML += `<option value="${x.externalServiceId}">${x.name}</option>`;
  });
}

// CREATE ORDER
async function createOrder(){
  const res = await fetch(API_URL+"/orders",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+getToken()
    },
    body: JSON.stringify({
      service: service.value,
      link: link.value,
      quantity: quantity.value
    })
  });

  showToast("Order placed");
  loadOrders();
}

// LOAD ORDERS
async function loadOrders(){
  const res = await fetch(API_URL+"/orders",{headers:{Authorization:"Bearer "+getToken()}});
  const data = await res.json();

  ordersTable.innerHTML="";
  totalOrders.innerText = data.length;

  data.forEach(o=>{
    ordersTable.innerHTML += `<tr>
      <td>${o._id}</td>
      <td>${o.service}</td>
      <td>${o.quantity}</td>
      <td>${o.status}</td>
    </tr>`;
  });
}

// DEPOSIT
async function deposit(){
  await fetch(API_URL+"/deposits/request",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+getToken()
    },
    body: JSON.stringify({amount: amount.value})
  });

  showToast("Deposit requested");
}

// INIT
window.onload = ()=>{
  if(!getToken()){ location.href="index.html"; return; }

  loadUser();
  loadServices();
  loadOrders();
};
</script>

</body>
</html>
