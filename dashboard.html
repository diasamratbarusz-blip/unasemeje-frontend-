<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMM Dashboard</title>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; }
.dashboard { display:flex; }

.sidebar {
  width:230px; background:#111827; min-height:100vh; padding:20px;
}
.sidebar a {
  display:block; padding:10px; color:#cbd5e1; cursor:pointer;
  margin-top:5px; border-radius:6px;
}
.sidebar a:hover { background:#1f2937; }

.main { flex:1; padding:20px; }

.navbar {
  display:flex; justify-content:space-between;
  background:#1e293b; padding:10px; border-radius:10px;
  margin-bottom:20px;
}

.card {
  background:#1e293b; padding:20px;
  border-radius:12px; margin-bottom:20px;
}

.list-item, .service {
  background:#334155; padding:10px;
  margin-bottom:8px; border-radius:8px; cursor:pointer;
}

input, textarea {
  width:100%; padding:10px; margin-top:10px;
  border-radius:6px; border:none;
  background:#0f172a; color:white;
}

button {
  margin-top:10px; padding:10px;
  background:#7c3aed; color:white;
  border:none; border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="dashboard">

<!-- SIDEBAR -->
<div class="sidebar">
<h2>SMM PANEL</h2>

<a onclick="showPage('home')">Dashboard</a>
<a onclick="showPage('services')">Services</a>
<a onclick="showPage('order')">Place Order</a>
<a onclick="showPage('orders')">Orders</a>
<a onclick="showPage('deposit')">Add Funds</a>
<a onclick="showPage('referral')">Referral</a>
<a onclick="showPage('profile')">Profile</a>

<!-- ADMIN BUTTON -->
<a id="adminBtn" onclick="showPage('admin')" style="display:none;">Admin Panel</a>

<a onclick="openWhatsApp()">WhatsApp</a>
<a onclick="callSupport()">Call</a>
<a onclick="logout()">Logout</a>
</div>

<!-- MAIN -->
<div class="main">

<div class="navbar">
<div><b id="userEmail"></b></div>
<div>Balance: KSH <span id="balance">0</span></div>
</div>

<!-- HOME -->
<div id="home" class="page">
<div class="card">Welcome to your dashboard</div>
</div>

<!-- SERVICES -->
<div id="services" class="page" style="display:none;">
<div class="card">
<div id="platformList"></div>
<div id="categoryList"></div>
<div id="serviceList"></div>
</div>
</div>

<!-- ORDER -->
<div id="order" class="page" style="display:none;">
<div class="card">
<input id="orderServiceId" readonly>
<input id="orderLink" placeholder="Link">
<input id="orderQty" type="number" placeholder="Quantity" oninput="calcTotal()">
<p>Total: KSH <b id="orderTotal">0</b></p>
<button onclick="submitOrder()">Order</button>
</div>
</div>

<!-- ORDERS -->
<div id="orders" class="page" style="display:none;">
<div class="card">
<ul id="ordersList"></ul>
</div>
</div>

<!-- DEPOSIT -->
<div id="deposit" class="page" style="display:none;">
<div class="card">
<p>Send to 0715509440</p>
<textarea id="depMessage"></textarea>
<button onclick="submitDeposit()">Submit</button>
</div>
</div>

<!-- REFERRAL -->
<div id="referral" class="page" style="display:none;">
<div class="card">
Code: <b id="refCode"></b><br>
Earnings: <span id="refEarnings"></span>
</div>
</div>

<!-- PROFILE -->
<div id="profile" class="page" style="display:none;">
<div class="card">
<p>Email: <span id="profileEmail"></span></p>

<input id="newPhone" placeholder="New Phone">
<button onclick="updatePhone()">Update Phone</button>

<input id="oldPass" placeholder="Old Password">
<input id="newPass" placeholder="New Password">
<button onclick="changePassword()">Change Password</button>
</div>
</div>

<!-- ADMIN -->
<div id="admin" class="page" style="display:none;">
<div class="card">

<h3>Deposits</h3>
<div id="adminDeposits"></div>

<h3>Users</h3>
<div id="adminUsers"></div>

</div>
</div>

</div>
</div>

<script>
const API="https://unasemeje-backend-3.onrender.com/api";
const token=localStorage.getItem("token");

let servicesData={},selectedRate=0;

if(!token) location.href="index.html";

/* USER */
function loadUser(){
  const d=JSON.parse(atob(token.split(".")[1]));
  userEmail.innerText=d.email;
  profileEmail.innerText=d.email;

  // ADMIN CHECK
  if(d.email==="diasamratbarusz@gmail.com"){
    adminBtn.style.display="block";
    loadAdmin();
  }
}

/* BALANCE */
async function loadBalance(){
  const r=await fetch(API+"/me",{headers:{Authorization:"Bearer "+token}});
  const d=await r.json();
  balance.innerText=d.balance||0;
}

/* SERVICES */
async function loadServices(){
  const r=await fetch(API+"/services");
  const d=await r.json();
  servicesData=d.data||{};
  renderPlatforms();
}

function renderPlatforms(){
  platformList.innerHTML="";
  Object.keys(servicesData).forEach(p=>{
    let div=document.createElement("div");
    div.className="list-item";
    div.innerText=p;
    div.onclick=()=>renderCategories(p);
    platformList.appendChild(div);
  });
}

function renderCategories(p){
  categoryList.innerHTML="";
  Object.keys(servicesData[p]||{}).forEach(c=>{
    let div=document.createElement("div");
    div.className="list-item";
    div.innerText=c;
    div.onclick=()=>renderServices(p,c);
    categoryList.appendChild(div);
  });
}

function renderServices(p,c){
  serviceList.innerHTML="";
  servicesData[p][c].forEach(s=>{
    let div=document.createElement("div");
    div.className="service";
    div.innerHTML=s.name+"<br>KSH "+s.rate;
    div.onclick=()=>{
      orderServiceId.value=s.serviceId;
      selectedRate=s.rate;
      showPage("order");
    };
    serviceList.appendChild(div);
  });
}

/* ORDER */
function calcTotal(){
  orderTotal.innerText=((selectedRate/1000)*(orderQty.value||0)).toFixed(2);
}

async function submitOrder(){
  const r=await fetch(API+"/order",{
    method:"POST",
    headers:{'Content-Type':'application/json',Authorization:"Bearer "+token},
    body:JSON.stringify({
      serviceId:orderServiceId.value,
      link:orderLink.value,
      quantity:orderQty.value
    })
  });
  alert((await r.json()).message);
  loadBalance();
}

/* ORDERS */
async function loadOrders(){
  const r=await fetch(API+"/orders",{headers:{Authorization:"Bearer "+token}});
  const d=await r.json();
  ordersList.innerHTML="";
  d.forEach(o=>{
    let li=document.createElement("li");
    li.innerText=o.service+" - "+o.quantity+" - "+o.cost;
    ordersList.appendChild(li);
  });
}

/* DEPOSIT */
async function submitDeposit(){
  await fetch(API+"/deposit",{
    method:"POST",
    headers:{'Content-Type':'application/json',Authorization:"Bearer "+token},
    body:JSON.stringify({message:depMessage.value})
  });
  alert("Submitted");
}

/* PROFILE */
async function changePassword(){
  await fetch(API+"/change-password",{
    method:"POST",
    headers:{'Content-Type':'application/json',Authorization:"Bearer "+token},
    body:JSON.stringify({oldPassword:oldPass.value,newPassword:newPass.value})
  });
  alert("Updated");
}

async function updatePhone(){
  await fetch(API+"/update-phone",{
    method:"POST",
    headers:{'Content-Type':'application/json',Authorization:"Bearer "+token},
    body:JSON.stringify({phone:newPhone.value})
  });
  alert("Phone Updated");
}

/* ADMIN */
async function loadAdmin(){
  const r=await fetch(API+"/admin/deposits",{headers:{Authorization:"Bearer "+token}});
  const d=await r.json();

  adminDeposits.innerHTML="";
  d.forEach(dep=>{
    let div=document.createElement("div");
    div.innerHTML=dep.message+" <button onclick='approve(\""+dep._id+"\")'>Approve</button>";
    adminDeposits.appendChild(div);
  });
}

async function approve(id){
  await fetch(API+"/admin/approve",{
    method:"POST",
    headers:{'Content-Type':'application/json',Authorization:"Bearer "+token},
    body:JSON.stringify({id})
  });
  loadAdmin();
}

/* NAV */
function showPage(p){
  document.querySelectorAll(".page").forEach(x=>x.style.display="none");
  document.getElementById(p).style.display="block";
  if(p==="orders") loadOrders();
}

/* SUPPORT */
function openWhatsApp(){ window.open("https://wa.me/254715509440"); }
function callSupport(){ window.location="tel:+254715509440"; }

/* LOGOUT */
function logout(){
  localStorage.removeItem("token");
  location.href="index.html";
}

/* INIT */
loadUser();
loadBalance();
loadServices();
</script>

</body>
</html>
