<!DOCTYPE html>
<html>
<head>
  <title>SMM Panel Pro System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Segoe UI;
    }

    body{
      background:#050b18;
      color:#e5e7eb;
    }

    .app{
      display:grid;
      grid-template-columns:260px 1fr;
      min-height:100vh;
    }

    /* SIDEBAR */
    .sidebar{
      background:#0f172a;
      padding:20px;
      border-right:1px solid #1f2937;
    }

    .brand{
      font-size:22px;
      font-weight:bold;
      color:#38bdf8;
      margin-bottom:20px;
    }

    .role{
      font-size:12px;
      color:#94a3b8;
      margin-bottom:15px;
    }

    .nav a{
      display:block;
      padding:12px;
      margin:6px 0;
      color:#94a3b8;
      border-radius:8px;
      cursor:pointer;
      text-decoration:none;
      transition:0.2s;
    }

    .nav a:hover{
      background:#1e293b;
      color:#fff;
    }

    .nav a.active{
      background:#38bdf8;
      color:#000;
      font-weight:bold;
    }

    /* MAIN */
    .main{
      padding:20px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:#0f172a;
      padding:15px;
      border-radius:12px;
      border:1px solid #1f2937;
    }

    .balance{
      color:#22c55e;
      font-weight:bold;
    }

    /* CARDS */
    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:12px;
      margin-top:20px;
    }

    .card{
      background:#0f172a;
      padding:15px;
      border-radius:12px;
      border:1px solid #1f2937;
    }

    .card h3{
      color:#38bdf8;
      margin-bottom:5px;
    }

    /* SERVICES */
    .services{
      margin-top:20px;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:12px;
    }

    .service{
      background:#0f172a;
      padding:15px;
      border-radius:12px;
      border:1px solid #1f2937;
    }

    .badge{
      font-size:12px;
      background:#1e293b;
      padding:4px 8px;
      border-radius:6px;
      color:#38bdf8;
      display:inline-block;
      margin:5px 0;
    }

    button{
      width:100%;
      padding:10px;
      border:none;
      border-radius:8px;
      background:#38bdf8;
      font-weight:bold;
      cursor:pointer;
      margin-top:10px;
    }

    button:hover{
      opacity:0.9;
    }

    table{
      width:100%;
      margin-top:15px;
      border-collapse:collapse;
    }

    th,td{
      padding:10px;
      border-bottom:1px solid #1f2937;
      font-size:14px;
    }

    th{
      color:#38bdf8;
    }

    .chartBox{
      margin-top:20px;
      background:#0f172a;
      padding:15px;
      border-radius:12px;
      border:1px solid #1f2937;
    }

    .hidden{display:none;}

    @media(max-width:768px){
      .app{grid-template-columns:1fr;}
      .sidebar{display:none;}
    }
  </style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="brand">SMM PANEL</div>
    <div class="role" id="roleText">User</div>

    <div class="nav">
      <a class="active" onclick="show('dashboard')">Dashboard</a>
      <a onclick="show('services')">Services</a>
      <a onclick="show('orders')">Orders</a>
      <a onclick="show('wallet')">Wallet</a>
      <a id="adminTab" onclick="show('admin')">Admin</a>
      <a onclick="logout()">Logout</a>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <div id="email">Loading...</div>
      <div class="balance">KES <span id="balance">0</span></div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard">

      <div class="cards">
        <div class="card"><h3>Services</h3><div id="serviceCount">0</div></div>
        <div class="card"><h3>Orders</h3><div id="orderCount">0</div></div>
        <div class="card"><h3>Users</h3><div id="userCount">0</div></div>
        <div class="card"><h3>Revenue</h3>KES <span id="revenue">0</span></div>
      </div>

      <div class="chartBox">
        <canvas id="chart"></canvas>
      </div>
    </div>

    <!-- SERVICES -->
    <div id="services" class="hidden">
      <h3>Services</h3>
      <div id="serviceList" class="services"></div>
    </div>

    <!-- ORDERS -->
    <div id="orders" class="hidden">
      <h3>Orders</h3>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Service</th>
            <th>Qty</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="orderTable"></tbody>
      </table>
    </div>

    <!-- WALLET -->
    <div id="wallet" class="hidden">
      <h3>Wallet Topup</h3>
      <input id="phone" placeholder="Phone 2547..." style="padding:10px;width:100%;margin-top:10px;">
      <input id="amount" placeholder="Amount" style="padding:10px;width:100%;margin-top:10px;">
      <button onclick="topup()">Send STK Push</button>
    </div>

    <!-- ADMIN -->
    <div id="admin" class="hidden">
      <h3>Admin Panel</h3>
      <table>
        <thead>
          <tr>
            <th>User</th>
            <th>Balance</th>
          </tr>
        </thead>
        <tbody id="userTable"></tbody>
      </table>
    </div>

  </div>
</div>

<script>
const API = "https://unasemeje-backend-3.onrender.com/api";

function getToken(){ return localStorage.getItem("token"); }

function logout(){
  localStorage.removeItem("token");
  location.href="index.html";
}

function show(id){
  document.querySelectorAll(".main > div").forEach(d=>d.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

/* FETCH */
async function fetchAPI(url,opt={}){
  try{
    const res=await fetch(url,opt);
    return await res.json();
  }catch(e){return null;}
}

/* USER */
async function loadUser(){
  const data=await fetchAPI(API+"/me",{headers:{Authorization:"Bearer "+getToken()}});
  if(!data) return;

  document.getElementById("email").innerText=data.email;
  document.getElementById("balance").innerText=data.balance;

  if(data.role==="admin"){
    document.getElementById("roleText").innerText="Admin";
  } else {
    document.getElementById("adminTab").style.display="none";
  }
}

/* SERVICES */
async function loadServices(){
  const data=await fetchAPI(API+"/services");
  const list=document.getElementById("serviceList");

  if(!data) return;

  document.getElementById("serviceCount").innerText=data.length;

  list.innerHTML="";

  data.forEach(s=>{
    list.innerHTML+=`
      <div class="service">
        <b>${s.name}</b><br>
        <span class="badge">${s.category||"General"}</span><br>
        Rate: ${s.rate}<br>

        <button onclick="order('${s.serviceId}')">Order</button>
      </div>
    `;
  });
}

/* ORDER */
async function order(id){
  const link=prompt("Link:");
  const qty=prompt("Quantity:");

  const res=await fetchAPI(API+"/orders",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+getToken()
    },
    body:JSON.stringify({serviceId:id,link,quantity:Number(qty)})
  });

  alert(res? "Order placed":"Failed");
  loadOrders();
}

/* ORDERS */
async function loadOrders(){
  const data=await fetchAPI(API+"/orders",{headers:{Authorization:"Bearer "+getToken()}});
  if(!data) return;

  document.getElementById("orderCount").innerText=data.length;

  const table=document.getElementById("orderTable");
  table.innerHTML="";

  let revenue=0;

  data.forEach(o=>{
    revenue+=10;

    table.innerHTML+=`
      <tr>
        <td>${o._id}</td>
        <td>${o.service}</td>
        <td>${o.quantity}</td>
        <td>${o.status||"pending"}</td>
      </tr>
    `;
  });

  document.getElementById("revenue").innerText=revenue;
}

/* USERS (ADMIN) */
async function loadUsers(){
  const data=await fetchAPI(API+"/users",{headers:{Authorization:"Bearer "+getToken()}});
  if(!data) return;

  document.getElementById("userCount").innerText=data.length;

  const table=document.getElementById("userTable");
  table.innerHTML="";

  data.forEach(u=>{
    table.innerHTML+=`
      <tr>
        <td>${u.email}</td>
        <td>KES ${u.balance}</td>
      </tr>
    `;
  });
}

/* M-PESA TOPUP (UI ONLY HOOK) */
async function topup(){
  const phone=document.getElementById("phone").value;
  const amount=document.getElementById("amount").value;

  alert("STK Push sent to "+phone+" (backend required)");
}

/* CHART */
function loadChart(){
  new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],
      datasets:[{
        label:"Orders",
        data:[5,12,8,15,20,25,18],
        borderColor:"#38bdf8"
      }]
    }
  });
}

/* INIT */
window.onload=()=>{
  if(!getToken()){
    location.href="index.html";
    return;
  }

  loadUser();
  loadServices();
  loadOrders();
  loadUsers();
  loadChart();
};
</script>

</body>
  </html>
