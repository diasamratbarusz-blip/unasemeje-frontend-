<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMM Panel Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

/* ================= GLOBAL ================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
}

/* ================= DASHBOARD LAYOUT ================= */
.dashboard {
  display: flex;
  min-height: 100vh;
}

/* ================= SIDEBAR ================= */
.sidebar {
  width: 240px;
  background: #020617;
  padding: 20px;
  border-right: 1px solid #1e293b;
}

.sidebar h2 {
  color: #38bdf8;
  margin-bottom: 20px;
}

.sidebar a {
  display: block;
  padding: 10px;
  margin: 8px 0;
  cursor: pointer;
  color: #cbd5e1;
  border-radius: 8px;
}

.sidebar a:hover {
  background: rgba(56,189,248,0.1);
  color: #38bdf8;
}

/* ================= MAIN ================= */
.main {
  flex: 1;
  padding: 20px;
}

/* ================= NAVBAR ================= */
.navbar {
  display: flex;
  justify-content: space-between;
  background: rgba(17,24,39,0.7);
  padding: 12px;
  border-radius: 10px;
}

/* ================= CARD ================= */
.card {
  background: rgba(17,24,39,0.7);
  padding: 20px;
  margin-top: 20px;
  border-radius: 14px;
}

/* ================= GRID ================= */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
}

/* ================= SERVICE ================= */
.service {
  background: #020617;
  padding: 12px;
  border-radius: 10px;
  cursor: pointer;
  border: 1px solid #1e293b;
}

.service:hover {
  border-color: #38bdf8;
}

/* ================= INPUT ================= */
input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: #0f172a;
  border: 1px solid #334155;
  color: white;
  border-radius: 8px;
}

/* ================= BUTTON ================= */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: linear-gradient(135deg, #38bdf8, #22c55e);
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

/* ================= STEP ORDER FLOW ================= */
.container {
  max-width: 500px;
  margin-top: 20px;
}

.step {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  margin-top: 15px;
}

.list-item {
  background: #334155;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  cursor: pointer;
}

.amount-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.amount-grid button {
  background: #334155;
  border: 1px solid #475569;
}

/* ================= TOAST ================= */
#toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #22c55e;
  color: black;
  padding: 12px;
  border-radius: 10px;
  display: none;
}

</style>
</head>

<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>SMM PANEL</h2>
    <a onclick="showPage('home')">Dashboard</a>
    <a onclick="showPage('services')">Services</a>
    <a onclick="showPage('orders')">Orders</a>
    <a onclick="showPage('deposit')">Deposit</a>
    <a onclick="logout()">Logout</a>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="navbar">
      <div id="userEmail">Loading...</div>
      <div>Balance: <span id="balance">0</span></div>
    </div>

    <!-- HOME -->
    <div id="home" class="card">
      <h3>Select Platform</h3>
      <div class="list-item" onclick="selectPlatform('Instagram')">Instagram</div>
      <div class="list-item" onclick="selectPlatform('TikTok')">TikTok</div>
      <div class="list-item" onclick="selectPlatform('YouTube')">YouTube</div>
      <div class="list-item" onclick="selectPlatform('Facebook')">Facebook</div>
    </div>

    <!-- SERVICES -->
    <div id="servicesPage" class="card" style="display:none;">
      <h3>Services</h3>
      <input id="search" placeholder="Search..." onkeyup="renderServices()">
      <div id="services" class="grid"></div>
    </div>

    <!-- ORDER -->
    <div class="card">
      <h3>Place Order</h3>

      <input id="serviceId" placeholder="Service ID" readonly>
      <input id="link" placeholder="Link">
      <input id="quantity" type="number" placeholder="Quantity" oninput="calcPrice()">

      <p>Total: <b id="total">0</b></p>

      <button onclick="placeOrder()">Create Order</button>
    </div>

    <!-- STEP FLOW (ORDER FLOW UI) -->
    <div class="container">

      <div id="step1" class="step">
        <h3>Choose Platform</h3>
        <div class="list-item" onclick="showStep(2)">Instagram</div>
        <div class="list-item" onclick="showStep(2)">TikTok</div>
        <div class="list-item" onclick="showStep(2)">Facebook</div>
      </div>

      <div id="step2" class="step" style="display:none;">
        <button onclick="showStep(1)">← Back</button>
        <h3>Services</h3>
        <div class="list-item" onclick="showStep(3)">Likes</div>
        <div class="list-item" onclick="showStep(3)">Followers</div>
      </div>

      <div id="step3" class="step" style="display:none;">
        <button onclick="showStep(2)">← Back</button>

        <h3>Quick Order</h3>

        <div class="amount-grid">
          <button onclick="setAmount(100)">100</button>
          <button onclick="setAmount(500)">500</button>
          <button onclick="setAmount(1000)">1000</button>
        </div>

        <input id="link2" placeholder="Paste link">

        <p>Price: <b id="price">0</b> Ksh</p>

        <button onclick="alert('Order Created (demo)')">Create Order</button>
      </div>

    </div>

  </div>
</div>

<div id="toast"></div>

<script>

const API_URL = "https://unasemeje-backend-3.onrender.com/api";
const token = localStorage.getItem("token");

let servicesData = [];
let selectedRate = 0;
let currentPlatform = "";

if(!token) window.location.href = "index.html";

/* ================= TOAST ================= */
function showToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(()=>t.style.display="none",3000);
}

/* ================= USER ================= */
function loadUser(){
  try{
    const d = JSON.parse(atob(token.split(".")[1]));
    document.getElementById("userEmail").innerText = d.email;
  }catch{}
}

/* ================= SERVICES ================= */
async function loadServices(){
  const res = await fetch(API_URL+"/services");
  const json = await res.json();

  servicesData = [];
  Object.values(json.data || {}).forEach(g=>{
    g.forEach(s=>servicesData.push(s));
  });

  renderServices();
}

function renderServices(){
  const box = document.getElementById("services");
  const search = document.getElementById("search").value?.toLowerCase() || "";

  box.innerHTML = "";

  servicesData.forEach(s=>{
    if(currentPlatform && !s.category?.toLowerCase().includes(currentPlatform.toLowerCase())) return;
    if(search && !s.name.toLowerCase().includes(search)) return;

    const div = document.createElement("div");
    div.className = "service";
    div.innerHTML = `<b>${s.name}</b><br>${s.serviceId}<br>${s.rate}`;

    div.onclick = ()=>{
      document.getElementById("serviceId").value = s.serviceId;
      selectedRate = Number(s.rate);
      calcPrice();
    };

    box.appendChild(div);
  });
}

/* ================= ORDER ================= */
function calcPrice(){
  const q = document.getElementById("quantity").value || 0;
  document.getElementById("total").innerText = ((selectedRate/1000)*q).toFixed(2);
}

async function placeOrder(){
  const serviceId = document.getElementById("serviceId").value;
  const link = document.getElementById("link").value;
  const quantity = document.getElementById("quantity").value;

  const res = await fetch(API_URL+"/order",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+token
    },
    body:JSON.stringify({serviceId,link,quantity})
  });

  const data = await res.json();
  showToast(data.message || data.error);
}

/* ================= STEP FLOW ================= */
function showStep(n){
  document.querySelectorAll(".step").forEach(s=>s.style.display="none");
  document.getElementById("step"+n).style.display="block";
}

function setAmount(v){
  document.getElementById("price").innerText = (v*0.02).toFixed(2);
}

/* ================= NAV ================= */
function showPage(p){
  document.getElementById("home").style.display = p==="home"?"block":"none";
  document.getElementById("servicesPage").style.display = p==="services"?"block":"none";
}

/* ================= INIT ================= */
loadUser();
loadServices();

</script>

</body>
</html>
