<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMM Panel Dashboard</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* layout */
.dashboard {
  display: flex;
}

/* sidebar */
.sidebar {
  width: 220px;
  background: #111827;
  min-height: 100vh;
  padding: 20px;
}

.sidebar h2 {
  color: #fff;
}

.sidebar a {
  display: block;
  padding: 10px;
  color: #cbd5e1;
  cursor: pointer;
  margin-top: 5px;
  border-radius: 6px;
}

.sidebar a:hover {
  background: #1f2937;
}

/* main */
.main {
  flex: 1;
  padding: 20px;
}

.navbar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
  background: #1e293b;
  padding: 10px;
  border-radius: 10px;
}

/* cards */
.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

/* grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
}

.service {
  background: #334155;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

/* step flow */
.container {
  max-width: 500px;
  margin-top: 20px;
}

.step-container {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

.list-item {
  background: #334155;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 8px;
  cursor: pointer;
}

.amount-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.amount-grid button {
  padding: 10px;
  background: #334155;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 6px;
  border: none;
  background: #0f172a;
  color: white;
}

button {
  margin-top: 10px;
  padding: 10px;
  background: #7c3aed;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

</style>

</head>

<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>SMM PANEL</h2>

    <a onclick="showPage('home')">Dashboard</a>
    <a onclick="showPage('services')">Services</a>
    <a onclick="showPage('orders')">Orders</a>
    <a onclick="showPage('deposit')">Deposit</a>

    <a onclick="logout()">Logout</a>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="navbar">
      <div>👤 <b id="userEmail">Loading...</b></div>
      <div>💰 Balance: <span id="balance">0</span></div>
    </div>

    <!-- HOME + STEP ORDER FLOW -->
    <div id="home" class="page">

      <div class="card">
        <h3>Quick Order Flow</h3>

        <!-- STEP 1 -->
        <div id="step-1" class="step-container">
          <h4>Choose Platform</h4>
          <div class="list-item" onclick="selectPlatform('Instagram')">Instagram</div>
          <div class="list-item" onclick="selectPlatform('TikTok')">TikTok</div>
          <div class="list-item" onclick="selectPlatform('YouTube')">YouTube</div>
          <div class="list-item" onclick="selectPlatform('Facebook')">Facebook</div>
        </div>

        <!-- STEP 2 -->
        <div id="step-2" class="step-container" style="display:none;">
          <button onclick="showStep(1)">← Back</button>
          <h4>Services</h4>
          <div id="stepServices"></div>
        </div>

        <!-- STEP 3 -->
        <div id="step-3" class="step-container" style="display:none;">
          <button onclick="showStep(2)">← Back</button>

          <h4>Place Order</h4>

          <input id="serviceId" placeholder="Service ID" readonly>
          <input id="link" placeholder="Paste link">

          <input id="quantity" type="number" placeholder="Quantity" oninput="calcPrice()">

          <p>Total: <b id="total">0</b></p>

          <button onclick="placeOrder()">Create Order</button>
        </div>

      </div>
    </div>

    <!-- SERVICES PAGE -->
    <div id="servicesPage" class="page" style="display:none;">
      <div class="card">
        <h3>All Services</h3>
        <input id="search" placeholder="Search..." onkeyup="renderServices()">
        <div id="services" class="grid"></div>
      </div>
    </div>

    <!-- ORDERS -->
    <div id="ordersPage" class="page" style="display:none;">
      <div class="card">
        <h3>Orders</h3>
        <ul id="orders"></ul>
      </div>
    </div>

    <!-- DEPOSIT -->
    <div id="depositPage" class="page" style="display:none;">
      <div class="card">
        <h3>Deposit via M-Pesa</h3>

        <input id="phone" placeholder="2547XXXXXXXX">
        <input id="amount" placeholder="Amount">

        <button onclick="deposit()">Send STK</button>
      </div>
    </div>

  </div>
</div>

<script>

const API = "https://unasemeje-backend-3.onrender.com/api";
const token = localStorage.getItem("token");

let servicesData = [];
let selectedRate = 0;
let selectedService = "";

if (!token) window.location.href = "index.html";

/* ================= USER ================= */
function loadUser() {
  try {
    const decoded = JSON.parse(atob(token.split(".")[1]));
    document.getElementById("userEmail").innerText = decoded.email;
  } catch {}
}

/* ================= BALANCE ================= */
async function loadBalance() {
  const res = await fetch(API + "/me", {
    headers: { Authorization: "Bearer " + token }
  });
  const data = await res.json();
  document.getElementById("balance").innerText = data.balance || 0;
}

/* ================= SERVICES ================= */
async function loadServices() {
  const res = await fetch(API + "/services");
  const json = await res.json();

  servicesData = [];

  Object.values(json.data || {}).forEach(group => {
    group.forEach(s => servicesData.push(s));
  });

  renderServices();
}

/* ================= RENDER SERVICES ================= */
function renderServices() {
  const container = document.getElementById("services");
  const search = document.getElementById("search")?.value?.toLowerCase() || "";

  container.innerHTML = "";

  servicesData.forEach(s => {
    if (search && !s.name.toLowerCase().includes(search)) return;

    const div = document.createElement("div");
    div.className = "service";

    div.innerHTML = `
      <b>${s.name}</b><br>
      ID: ${s.serviceId}<br>
      Rate: ${s.rate}
    `;

    div.onclick = () => {
      selectedService = s.serviceId;
      selectedRate = Number(s.rate);

      document.getElementById("serviceId").value = s.serviceId;
      showStep(3);
    };

    container.appendChild(div);
  });
}

/* ================= STEP FLOW ================= */
function showStep(step) {
  document.getElementById("step-1").style.display = step === 1 ? "block" : "none";
  document.getElementById("step-2").style.display = step === 2 ? "block" : "none";
  document.getElementById("step-3").style.display = step === 3 ? "block" : "none";
}

function selectPlatform(platform) {
  showStep(2);

  const filtered = servicesData.filter(s =>
    (s.category || "").toLowerCase().includes(platform.toLowerCase())
  );

  const container = document.getElementById("stepServices");
  container.innerHTML = "";

  filtered.forEach(s => {
    const div = document.createElement("div");
    div.className = "list-item";
    div.innerText = s.name;

    div.onclick = () => {
      selectedService = s.serviceId;
      selectedRate = Number(s.rate);

      document.getElementById("serviceId").value = s.serviceId;
      showStep(3);
    };

    container.appendChild(div);
  });
}

/* ================= PRICE ================= */
function calcPrice() {
  const qty = document.getElementById("quantity").value || 0;
  const total = (selectedRate / 1000) * qty;
  document.getElementById("total").innerText = total.toFixed(2);
}

/* ================= ORDER ================= */
async function placeOrder() {
  const serviceId = document.getElementById("serviceId").value;
  const link = document.getElementById("link").value;
  const quantity = document.getElementById("quantity").value;

  const res = await fetch(API + "/order", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + token
    },
    body: JSON.stringify({ serviceId, link, quantity })
  });

  const data = await res.json();
  alert(data.message || data.error);

  loadBalance();
  loadOrders();
}

/* ================= ORDERS ================= */
async function loadOrders() {
  const res = await fetch(API + "/orders", {
    headers: { Authorization: "Bearer " + token }
  });

  const data = await res.json();

  const list = document.getElementById("orders");
  list.innerHTML = "";

  data.forEach(o => {
    const li = document.createElement("li");
    li.innerText = `${o.service} | ${o.quantity} | ${o.cost}`;
    list.appendChild(li);
  });
}

/* ================= DEPOSIT ================= */
async function deposit() {
  const phone = document.getElementById("phone").value;
  const amount = document.getElementById("amount").value;

  const res = await fetch(API + "/mpesa/stk", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + token
    },
    body: JSON.stringify({ phone, amount })
  });

  const data = await res.json();
  alert(data.message || "Sent");
}

/* ================= NAV ================= */
function showPage(page) {
  document.querySelectorAll(".page").forEach(p => p.style.display = "none");

  if (page === "home") document.getElementById("home").style.display = "block";
  if (page === "services") document.getElementById("servicesPage").style.display = "block";
  if (page === "orders") document.getElementById("ordersPage").style.display = "block";
  if (page === "deposit") document.getElementById("depositPage").style.display = "block";
}

/* ================= LOGOUT ================= */
function logout() {
  localStorage.removeItem("token");
  window.location.href = "index.html";
}

/* ================= INIT ================= */
loadUser();
loadBalance();
loadServices();
loadOrders();

</script>

</body>
</html>
