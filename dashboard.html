<!DOCTYPE html>
<html>
<head>
  <title>SMM Panel Pro System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Segoe UI;
    }

    body{
      background:#050b18;
      color:#e5e7eb;
    }

    .app{
      display:grid;
      grid-template-columns:260px 1fr;
      min-height:100vh;
    }

    .sidebar{
      background:#0f172a;
      padding:20px;
      border-right:1px solid #1f2937;
    }

    .brand{
      font-size:22px;
      font-weight:bold;
      color:#38bdf8;
      margin-bottom:20px;
    }

    .nav a{
      display:block;
      padding:12px;
      margin:6px 0;
      color:#94a3b8;
      border-radius:8px;
      cursor:pointer;
      text-decoration:none;
    }

    .nav a:hover{
      background:#1e293b;
      color:#fff;
    }

    .hidden{display:none;}

    .main{
      padding:20px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:#0f172a;
      padding:15px;
      border-radius:12px;
      border:1px solid #1f2937;
    }

    .balance{
      color:#22c55e;
      font-weight:bold;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:12px;
      margin-top:20px;
    }

    .card{
      background:#0f172a;
      padding:15px;
      border-radius:12px;
      border:1px solid #1f2937;
    }

    button{
      width:100%;
      padding:10px;
      border:none;
      border-radius:8px;
      background:#38bdf8;
      font-weight:bold;
      cursor:pointer;
      margin-top:10px;
    }

    table{
      width:100%;
      margin-top:10px;
      border-collapse:collapse;
    }

    th,td{
      padding:10px;
      border-bottom:1px solid #1f2937;
      font-size:14px;
    }

    th{
      color:#38bdf8;
    }
  </style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="brand">SMM PANEL</div>

    <div class="nav">
      <a onclick="show('dashboard')">Dashboard</a>
      <a onclick="show('services')">Services</a>
      <a onclick="show('orders')">Orders</a>
      <a onclick="show('wallet')">Wallet</a>
      <a id="adminTab" onclick="show('admin')">Admin</a>
      <a onclick="logout()">Logout</a>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="topbar">
      <div id="email">Loading...</div>
      <div class="balance">KES <span id="balance">0</span></div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard">

      <div class="cards">
        <div class="card">Services <div id="serviceCount">0</div></div>
        <div class="card">Orders <div id="orderCount">0</div></div>
        <div class="card">Revenue KES <div id="revenue">0</div></div>
      </div>

    </div>

    <!-- SERVICES -->
    <div id="services" class="hidden">
      <h3>Services</h3>
      <div id="serviceList"></div>
    </div>

    <!-- ORDERS -->
    <div id="orders" class="hidden">
      <h3>Orders</h3>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Service</th>
            <th>Qty</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="orderTable"></tbody>
      </table>
    </div>

    <!-- WALLET -->
    <div id="wallet" class="hidden">
      <h3>Top Up</h3>

      <input id="phone" placeholder="2547..." style="padding:10px;width:100%;margin-top:10px">
      <input id="amount" placeholder="Amount" style="padding:10px;width:100%;margin-top:10px">

      <button onclick="topup()">Send STK Push</button>
    </div>

    <!-- ADMIN -->
    <div id="admin" class="hidden">
      <h3>Admin Panel</h3>
      <p>Access backend admin routes for service management</p>
    </div>

  </div>
</div>

<script>

const API = "https://unasemeje-backend-3.onrender.com/api";

function getToken(){
  return localStorage.getItem("token");
}

function logout(){
  localStorage.removeItem("token");
  location.href="index.html";
}

function show(id){
  document.querySelectorAll(".main > div").forEach(d=>{
    d.classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
}

/* ================= USER ================= */
async function loadUser(){
  const res = await fetch(API+"/me",{
    headers:{Authorization:"Bearer "+getToken()}
  });

  const data = await res.json().catch(()=>null);
  if(!data) return;

  document.getElementById("email").innerText = data.email;
  document.getElementById("balance").innerText = data.balance;

  if(data.role !== "admin"){
    document.getElementById("adminTab").style.display="none";
  }
}

/* ================= SERVICES ================= */
async function loadServices(){
  const res = await fetch(API+"/services");
  const data = await res.json().catch(()=>null);

  if(!data) return;

  document.getElementById("serviceCount").innerText = data.length;

  const list = document.getElementById("serviceList");
  list.innerHTML = "";

  data.forEach(s=>{
    list.innerHTML += `
      <div style="background:#0f172a;padding:10px;margin:10px;border-radius:10px">
        <b>${s.name}</b><br>
        Rate: ${s.rate}<br>
        <button onclick="order('${s.serviceId}')">Order</button>
      </div>
    `;
  });
}

/* ================= ORDER ================= */
async function order(id){
  const link = prompt("Enter link:");
  const qty = prompt("Enter quantity:");

  const res = await fetch(API+"/order",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+getToken()
    },
    body:JSON.stringify({
      serviceId:id,
      link,
      quantity:Number(qty)
    })
  });

  const data = await res.json().catch(()=>null);

  alert(data?.message || "Order placed");

  loadOrders();
  loadUser();
}

/* ================= ORDERS ================= */
async function loadOrders(){
  const res = await fetch(API+"/orders",{
    headers:{Authorization:"Bearer "+getToken()}
  });

  const data = await res.json().catch(()=>null);
  if(!data) return;

  document.getElementById("orderCount").innerText = data.length;

  const table = document.getElementById("orderTable");
  table.innerHTML = "";

  let revenue = 0;

  data.forEach(o=>{
    revenue += Number(o.cost || 0);

    table.innerHTML += `
      <tr>
        <td>${o._id}</td>
        <td>${o.service}</td>
        <td>${o.quantity}</td>
        <td>${o.status || "pending"}</td>
      </tr>
    `;
  });

  document.getElementById("revenue").innerText = revenue;
}

/* ================= TOPUP ================= */
async function topup(){
  alert("Use /api/mpesa/stk backend endpoint");
}

/* ================= INIT ================= */
window.onload = () => {
  if(!getToken()){
    location.href="index.html";
    return;
  }

  loadUser();
  loadServices();
  loadOrders();
};

</script>

</body>
</html>
