<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMM Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.dashboard { display: flex; }

.sidebar {
  width: 230px;
  background: #111827;
  min-height: 100vh;
  padding: 20px;
}

.sidebar a {
  display: block;
  padding: 10px;
  color: #cbd5e1;
  cursor: pointer;
  margin-top: 5px;
  border-radius: 6px;
}

.sidebar a:hover { background: #1f2937; }

.main { flex: 1; padding: 20px; }

.navbar {
  display: flex;
  justify-content: space-between;
  background: #1e293b;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

.list-item, .service {
  background: #334155;
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 8px;
  cursor: pointer;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 6px;
  border: none;
  background: #0f172a;
  color: white;
}

button {
  margin-top: 10px;
  padding: 10px;
  background: #7c3aed;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

small { color: #94a3b8; }

.support-box {
  background:#0f172a;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="dashboard">

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>SMM PANEL</h2>

  <a onclick="showPage('home')">Dashboard</a>
  <a onclick="showPage('services')">Services</a>
  <a onclick="showPage('orders')">Orders</a>
  <a onclick="showPage('deposit')">Add Funds</a>

  <a onclick="openWhatsApp()">💬 Support WhatsApp</a>
  <a onclick="callAdmin()">📞 Call Support</a>

  <a onclick="logout()">Logout</a>
</div>

<!-- MAIN -->
<div class="main">

<div class="navbar">
  <div>👤 <b id="userEmail">Loading...</b></div>
  <div>💰 Balance: <span id="balance">0</span></div>
</div>

<!-- HOME -->
<div id="home" class="page">
<div class="card">

<h3>Quick Order</h3>

<div id="platformList"></div>
<div id="categoryList"></div>
<div id="serviceList"></div>

<input id="serviceId" placeholder="Service ID" readonly>
<input id="link" placeholder="Link">
<input id="quantity" type="number" placeholder="Quantity" oninput="calcPrice()">

<p>Total: <b id="total">0</b></p>

<button onclick="placeOrder()">Create Order</button>

<!-- SUPPORT BOX -->
<div class="support-box">
  <h4>Need Help?</h4>
  <button onclick="openWhatsApp()">Chat on WhatsApp</button>
  <button onclick="callAdmin()">Call Now</button>
</div>

</div>
</div>

<!-- SERVICES -->
<div id="services" class="page" style="display:none;">
<div class="card">
<h3>All Services</h3>
<div id="allServices"></div>
</div>
</div>

<!-- ORDERS -->
<div id="orders" class="page" style="display:none;">
<div class="card">
<h3>Orders</h3>
<ul id="ordersList"></ul>
</div>
</div>

<!-- ADD FUNDS -->
<div id="deposit" class="page" style="display:none;">
<div class="card">

<h3>💰 Add Funds</h3>

<p><b>STEP 1:</b> Send money to:</p>
<p style="color:#22c55e;font-size:18px;">0715509440</p>

<p><b>Name:</b> FAITH CHERUIYOT</p>

<hr>

<input id="depPhone" placeholder="Your Phone (2547...)">
<input id="depAmount" placeholder="Amount">

<textarea id="depMessage" rows="5"
placeholder="Paste FULL M-Pesa message"></textarea>

<button onclick="submitDeposit()">Add Funds</button>

<br><br>
<small id="depositStatus">⚠️ Paste FULL SMS message</small>

</div>
</div>

</div>
</div>

<script>

const API = "https://unasemeje-backend-3.onrender.com/api";
const token = localStorage.getItem("token");

const ADMIN_EMAIL = "diasamratbarusz@gmail.com";
const ADMIN_PHONE = "0715509440";

let servicesData = {};
let selectedRate = 0;

/* AUTH */
if (!token) location.href = "index.html";

/* USER */
function loadUser(){
  try {
    const decoded = JSON.parse(atob(token.split(".")[1]));
    document.getElementById("userEmail").innerText = decoded.email;

    // ADMIN CHECK
    if(decoded.email === ADMIN_EMAIL){
      console.log("ADMIN LOGGED IN");
    }

  } catch {}
}

/* BALANCE */
async function loadBalance(){
  const res = await fetch(API+"/me",{
    headers:{Authorization:"Bearer "+token}
  });
  const data = await res.json();
  document.getElementById("balance").innerText = data.balance || 0;
}

/* SERVICES */
async function loadServices(){
  const res = await fetch(API+"/services");
  const json = await res.json();

  servicesData = json.data || {};

  renderPlatforms();
  renderAllServices();
}

/* PLATFORM */
function renderPlatforms(){
  const c = document.getElementById("platformList");
  c.innerHTML = "";

  Object.keys(servicesData).forEach(p=>{
    const div = document.createElement("div");
    div.className = "list-item";
    div.innerText = p;
    div.onclick = ()=>selectPlatform(p);
    c.appendChild(div);
  });
}

/* CATEGORY */
function selectPlatform(p){
  const c = document.getElementById("categoryList");
  c.innerHTML = "";

  Object.keys(servicesData[p] || {}).forEach(t=>{
    const div = document.createElement("div");
    div.className = "list-item";
    div.innerText = t;
    div.onclick = ()=>showServices(p,t);
    c.appendChild(div);
  });
}

/* SERVICES */
function showServices(p,t){
  const c = document.getElementById("serviceList");
  c.innerHTML = "";

  (servicesData[p][t] || []).forEach(s=>{
    const price = Number(s.rate || 0);

    const div = document.createElement("div");
    div.className = "service";

    div.innerHTML = `
      <b>${s.name}</b><br>
      KSH ${price}
    `;

    div.onclick = ()=>{
      document.getElementById("serviceId").value = s.serviceId;
      selectedRate = price;
    };

    c.appendChild(div);
  });
}

/* ALL SERVICES */
function renderAllServices(){
  const c = document.getElementById("allServices");
  c.innerHTML = "";

  Object.keys(servicesData).forEach(p=>{
    const block = document.createElement("div");
    block.innerHTML = `<h4>${p}</h4>`;

    Object.keys(servicesData[p]).forEach(t=>{
      const sub = document.createElement("div");
      sub.innerHTML = `<b>${t}</b>`;

      (servicesData[p][t] || []).forEach(s=>{
        const item = document.createElement("div");
        item.className = "service";
        item.innerText = `${s.name} - KSH ${s.rate}`;
        sub.appendChild(item);
      });

      block.appendChild(sub);
    });

    c.appendChild(block);
  });
}

/* PRICE */
function calcPrice(){
  const qty = document.getElementById("quantity").value || 0;
  document.getElementById("total").innerText =
    ((selectedRate/1000)*qty).toFixed(2);
}

/* ORDER */
async function placeOrder(){
  const serviceId = document.getElementById("serviceId").value;
  const link = document.getElementById("link").value;
  const quantity = document.getElementById("quantity").value;

  const res = await fetch(API+"/order",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+token
    },
    body:JSON.stringify({serviceId,link,quantity})
  });

  const data = await res.json();
  alert(data.message || data.error);
  loadBalance();
}

/* DEPOSIT STATUS */
async function submitDeposit(){
  document.getElementById("depositStatus").innerText =
    "⏳ Your request is in progress. You will get results shortly...";

  const phone = document.getElementById("depPhone").value;
  const amount = document.getElementById("depAmount").value;
  const message = document.getElementById("depMessage").value;

  const res = await fetch(API+"/deposit",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+token
    },
    body:JSON.stringify({phone,amount,message})
  });

  const data = await res.json();

  document.getElementById("depositStatus").innerText =
    data.message || data.error;
}

/* SUPPORT */
function openWhatsApp(){
  window.open("https://wa.me/254715509440","_blank");
}

function callAdmin(){
  window.location.href = "tel:+254715509440";
}

/* NAV */
function showPage(page){
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById(page).style.display="block";
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("token");
  location.href="index.html";
}

/* INIT */
loadUser();
loadBalance();
loadServices();

</script>

</body>
</html>
