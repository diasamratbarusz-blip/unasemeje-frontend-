<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="dashboard">

<div class="sidebar">
  <h2>Unasemeje</h2>
  <a href="#">Dashboard</a>
  <a href="#" onclick="logoutUser()">Logout</a>
</div>

<div class="main">

  <div class="navbar">
    <h3>Dashboard</h3>
    <button onclick="logoutUser()">Logout</button>
  </div>

  <div class="cards">
    <div class="card">
      <h4>Balance</h4>
      <p id="balance">0</p>
    </div>

    <div class="card">
      <h4>Total Orders</h4>
      <p id="totalOrders">0</p>
    </div>
  </div>

  <div class="card">
    <h3>Create Order</h3>
    <input id="service" placeholder="Service">
    <input id="link" placeholder="Link">
    <input id="quantity" placeholder="Quantity">
    <button onclick="placeOrder()">Submit</button>
  </div>

  <div class="card">
    <h3>Deposit (Phone)</h3>
    <input id="phone" placeholder="2547XXXXXXXX">
    <input id="amount" placeholder="Amount">
    <button onclick="deposit()">Submit</button>
  </div>

  <div class="card">
    <h3>Orders</h3>
    <ul id="ordersList"></ul>
  </div>

</div>

<div id="toast"></div>

<script src="config.js"></script>
<script src="auth.js"></script>
<script src="dashboard.js"></script>

</body>
</html>
