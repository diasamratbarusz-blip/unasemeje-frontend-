<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module" src="dashboard.js"></script>
</head>

<body class="dashboard">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Unasemeje</h2>
    <a href="#">Dashboard</a>
    <a href="#">Orders</a>
    <a href="#">Deposit</a>
    <a href="#" onclick="logout()">Logout</a>
  </div>

  <!-- Main -->
  <div class="main">

    <div class="navbar">
      <h3>Dashboard</h3>
      <button onclick="logout()">Logout</button>
    </div>

    <div class="cards">
      <div class="card">
        <h4>Balance</h4>
        <p id="balance">0</p>
      </div>

      <div class="card">
        <h4>Total Orders</h4>
        <p id="totalOrders">0</p>
      </div>
    </div>

    <div class="card">
      <h3>Create Order</h3>
      <input id="service" placeholder="Service">
      <input id="link" placeholder="Link">
      <input id="quantity" placeholder="Quantity">
      <button onclick="createOrder()">Submit</button>
    </div>

    <div class="card">
      <h3>Deposit</h3>
      <input id="amount" placeholder="Amount">
      <input id="code" placeholder="M-Pesa Code">
      <button onclick="deposit()">Deposit</button>
    </div>

    <div class="card">
      <h3>Orders Chart</h3>
      <canvas id="chart"></canvas>
    </div>

    <div class="card">
      <h3>My Orders</h3>
      <ul id="orders"></ul>
    </div>

  </div>

  <div id="toast"></div>

</body>
</html>
