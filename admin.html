<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard | Unasemeje SMM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #0f172a;
  color: white;
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  height: 100vh;
  position: fixed;
  background: #020617;
  padding: 25px;
  box-sizing: border-box;
  border-right: 1px solid #1e293b;
}

.sidebar h2 {
  color: #38bdf8;
  font-size: 1.1rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 30px;
}

.sidebar a {
  display: block;
  margin: 18px 0;
  cursor: pointer;
  color: #94a3b8;
  text-decoration: none;
  font-weight: 500;
  transition: 0.3s;
}

.sidebar a:hover { color: #38bdf8; transform: translateX(5px); }

/* MAIN CONTENT */
.main {
  margin-left: 240px;
  padding: 30px;
}

.card {
  background: #111827;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
  border: 1px solid #1e293b;
}

h1 { font-size: 1.5rem; margin-bottom: 25px; color: #f8fafc; }

/* TABLE STYLING */
.table-container {
  overflow-x: auto;
  background: #111827;
  border-radius: 8px;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 700px;
}

th {
  background: #1e293b;
  text-align: left;
  padding: 15px;
  color: #38bdf8;
  font-size: 0.85rem;
}

td {
  padding: 15px;
  border-bottom: 1px solid #1e293b;
  font-size: 0.9rem;
  color: #cbd5e1;
}

/* BUTTONS */
button {
  padding: 8px 16px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  font-size: 0.8rem;
  transition: 0.2s;
}

.btn-approve { background: #22c55e; color: #052e16; }
.btn-balance { background: #38bdf8; color: #082f49; }
.btn-danger { background: #ef4444; color: white; }

button:hover { filter: brightness(1.2); }

.status-badge {
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 0.75rem;
  background: #334155;
}

.pending { color: #fbbf24; border: 1px solid #fbbf24; }
</style>
</head>

<body>

<div class="sidebar">
  <h2>Admin Dashboard</h2>
  <a onclick="loadUsers()">👤 User Management</a>
  <a onclick="loadDeposits()">💰 Deposit Requests</a>
  <a onclick="loadOrders()">📦 System Orders</a>
  <hr style="border: 0; border-top: 1px solid #1e293b; margin: 20px 0;">
  <a onclick="logout()" style="color: #ef4444;">🚪 Logout</a>
</div>

<div class="main">
  <h1 id="pageTitle">Welcome, Administrator</h1>
  <div id="content">
      <div class="card">
          <h3>System Status</h3>
          <p>Select a category from the sidebar to manage your panel.</p>
      </div>
  </div>
</div>

<script>
const API = "https://unasemeje-backend-3.onrender.com/api";
const token = localStorage.getItem("token");

/* --- SECURITY: ADMIN ONLY --- */
function checkAdmin() {
  if (!token) { location.href = "index.html"; return; }
  try {
    const payload = JSON.parse(atob(token.split(".")[1]));
    const isAdmin = payload.email === "diasamratbarusz@gmail.com" || payload.phone === "0715509440";

    if (!isAdmin) {
      alert("Access Denied: You do not have admin privileges.");
      location.href = "dashboard.html";
    }
  } catch (e) {
    location.href = "index.html";
  }
}
checkAdmin();

/* --- GENERIC FETCH HELPER --- */
async function adminFetch(endpoint, method = "GET", body = null) {
  try {
    const options = {
      method,
      headers: {
        "Authorization": "Bearer " + token,
        "Content-Type": "application/json"
      }
    };
    if (body) options.body = JSON.stringify(body);

    const res = await fetch(API + endpoint, options);
    const data = await res.json();
    
    if (!res.ok) {
        console.error("Server Error:", data);
        return { error: data.message || data.error || "Server error" };
    }
    return data;
  } catch (err) {
    console.error("Network Error:", err);
    return { error: "Could not connect to backend server." };
  }
}

/* --- USERS SECTION --- */
async function loadUsers() {
  document.getElementById("pageTitle").innerText = "All Users";
  const content = document.getElementById("content");
  content.innerHTML = "<p>Loading user list...</p>";

  const users = await adminFetch("/admin/users");
  if (users.error) {
      content.innerHTML = `<div class="card" style="color:#ef4444">Error: ${users.error}</div>`;
      return;
  }

  let html = `
    <div class="table-container">
      <table>
        <tr>
          <th>Email / Phone</th>
          <th>Balance</th>
          <th>Action</th>
        </tr>`;

  users.forEach(u => {
    html += `
      <tr>
        <td>${u.email}<br><small>${u.phone || 'No Phone'}</small></td>
        <td><b>KES ${u.balance.toFixed(2)}</b></td>
        <td>
          <button class="btn-balance" onclick="adjustBalance('${u._id}', '${u.email}')">Adjust Balance</button>
        </td>
      </tr>`;
  });

  html += `</table></div>`;
  content.innerHTML = html;
}

/* --- DEPOSITS SECTION --- */
async function loadDeposits() {
  document.getElementById("pageTitle").innerText = "Pending Deposit Submissions";
  const content = document.getElementById("content");
  content.innerHTML = "<p>Scanning for deposits...</p>";

  const deposits = await adminFetch("/admin/deposits");
  if (deposits.error) {
      content.innerHTML = `<div class="card" style="color:#ef4444">Error: ${deposits.error}</div>`;
      return;
  }

  let html = `<div class="table-container"><table>
    <tr>
      <th>User Info</th>
      <th>Amount</th>
      <th>M-Pesa Details</th>
      <th>Action</th>
    </tr>`;

  const pending = deposits.filter(d => d.status !== "approved");

  if (pending.length === 0) {
      content.innerHTML = `<div class="card">No pending deposits found.</div>`;
      return;
  }

  pending.forEach(d => {
    html += `
      <tr>
        <td>${d.userEmail || 'N/A'}<br><small>${d.phone}</small></td>
        <td>KES ${d.amount}</td>
        <td><pre style="font-size:0.75rem; color:#94a3b8">${d.message}</pre></td>
        <td>
          <button class="btn-approve" onclick="approveDeposit('${d._id}')">Approve & Credit</button>
        </td>
      </tr>`;
  });

  html += `</table></div>`;
  content.innerHTML = html;
}

/* --- ORDERS SECTION --- */
async function loadOrders() {
    document.getElementById("pageTitle").innerText = "System Wide Orders";
    const content = document.getElementById("content");
    content.innerHTML = "<p>Loading orders...</p>";

    const orders = await adminFetch("/admin/orders");
    if (orders.error) {
        content.innerHTML = `<div class="card" style="color:#ef4444">Error: ${orders.error}</div>`;
        return;
    }

    let html = `<div class="table-container"><table>
        <tr>
            <th>User</th>
            <th>Service</th>
            <th>Qty</th>
            <th>Link</th>
            <th>Status</th>
        </tr>`;

    orders.reverse().forEach(o => {
        html += `
            <tr>
                <td>${o.userEmail}</td>
                <td>ID: ${o.serviceId}</td>
                <td>${o.quantity}</td>
                <td><a href="${o.link}" target="_blank" style="color:#38bdf8">View Link</a></td>
                <td><span class="status-badge pending">${o.status || 'Processing'}</span></td>
            </tr>`;
    });
    html += `</table></div>`;
    content.innerHTML = html;
}

/* --- ACTIONS --- */
async function approveDeposit(id) {
  if (!confirm("Are you sure you have verified this M-Pesa payment? User balance will be updated instantly.")) return;
  
  const res = await adminFetch("/admin/approve-deposit", "POST", { depositId: id });
  
  if (res.error) {
    alert("Error: " + res.error);
  } else {
    alert("Payment Approved! Balance has been credited.");
    loadDeposits();
  }
}

async function adjustBalance(userId, email) {
    const amount = prompt(`Enter amount to add to ${email} (Example: 500 to add, -500 to deduct):`);
    if (!amount || isNaN(amount)) return;

    const res = await adminFetch("/admin/update-balance", "POST", { 
        userId, 
        amount: parseFloat(amount) 
    });

    if (res.error) {
        alert("Failed to update: " + res.error);
    } else {
        alert("Balance Updated Successfully!");
        loadUsers();
    }
}

function logout() {
  localStorage.removeItem("token");
  location.href = "index.html";
}

// Default View
loadUsers();

</script>

</body>
</html>
