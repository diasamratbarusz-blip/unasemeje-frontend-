<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  height: 100vh;
  position: fixed;
  background: #020617;
  padding: 20px;
}

.sidebar h2 {
  color: #38bdf8;
}

.sidebar a {
  display: block;
  margin: 12px 0;
  cursor: pointer;
  color: #cbd5f5;
}

.sidebar a:hover {
  color: #fff;
}

/* MAIN */
.main {
  margin-left: 240px;
  padding: 20px;
}

.card {
  background: #111827;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #1f2937;
}

button {
  padding: 6px 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  background: #22c55e;
  color: black;
  font-weight: bold;
}

.danger {
  background: #ef4444;
  color: white;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>ADMIN PANEL</h2>

  <a onclick="loadUsers()">👤 Users</a>
  <a onclick="loadDeposits()">💰 Deposits</a>
  <a onclick="logout()">🚪 Logout</a>
</div>

<div class="main">
  <h1>Admin Dashboard</h1>
  <div id="content"></div>
</div>

<script>

const API = "https://unasemeje-backend-3.onrender.com/api";
const token = localStorage.getItem("token");

/* ================= ADMIN SECURITY ================= */
function checkAdmin() {
  if (!token) {
    location.href = "index.html";
    return;
  }

  try {
    const payload = JSON.parse(atob(token.split(".")[1]));

    const isAdmin =
      payload.email === "diasamratbarusz@gmail.com" ||
      payload.phone === "0715509440";

    if (!isAdmin) {
      alert("Access denied");
      location.href = "dashboard.html";
    }

  } catch {
    location.href = "index.html";
  }
}

checkAdmin();

/* ================= FETCH SAFE ================= */
async function safeFetch(url, options = {}) {
  try {
    const res = await fetch(url, options);
    const data = await res.json();

    if (!res.ok) throw new Error(data.error || "Request failed");

    return data;
  } catch (err) {
    console.error(err);
    return null;
  }
}

/* ================= USERS ================= */
async function loadUsers() {

  document.getElementById("content").innerHTML =
    "<p>Loading users...</p>";

  const data = await safeFetch(API + "/admin/users", {
    headers: { Authorization: "Bearer " + token }
  });

  if (!data) {
    document.getElementById("content").innerHTML =
      "<p style='color:red'>Failed to load users</p>";
    return;
  }

  let html = `<h2>Users</h2>`;

  data.forEach(u => {
    html += `
      <div class="card">
        <b>Email:</b> ${u.email}<br>
        <b>Phone:</b> ${u.phone || "N/A"}<br>
        <b>Balance:</b> KES ${u.balance}
      </div>
    `;
  });

  document.getElementById("content").innerHTML = html;
}

/* ================= DEPOSITS ================= */
async function loadDeposits() {

  document.getElementById("content").innerHTML =
    "<p>Loading deposits...</p>";

  const data = await safeFetch(API + "/admin/deposits", {
    headers: { Authorization: "Bearer " + token }
  });

  if (!data) {
    document.getElementById("content").innerHTML =
      "<p style='color:red'>Failed to load deposits</p>";
    return;
  }

  let html = `<h2>Deposits</h2>`;

  html += `
  <table>
    <tr>
      <th>Phone</th>
      <th>Amount</th>
      <th>Transaction</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  `;

  data.forEach(d => {
    html += `
      <tr>
        <td>${d.phone}</td>
        <td>KES ${d.amount}</td>
        <td>${d.transactionCode || "N/A"}</td>
        <td>${d.status}</td>
        <td>
          ${d.status !== "approved"
            ? `<button onclick="approveDeposit('${d._id}')">Approve</button>`
            : "✔ Done"}
        </td>
      </tr>
    `;
  });

  html += `</table>`;

  document.getElementById("content").innerHTML = html;
}

/* ================= APPROVE DEPOSIT ================= */
async function approveDeposit(id) {

  if (!confirm("Approve this deposit?")) return;

  const res = await safeFetch(API + "/admin/approve", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + token
    },
    body: JSON.stringify({ id })
  });

  if (!res) {
    alert("Failed");
    return;
  }

  alert("Approved ✅");
  loadDeposits();
}

/* ================= LOGOUT ================= */
function logout() {
  localStorage.removeItem("token");
  location.href = "index.html";
}

/* ================= DEFAULT ================= */
loadUsers();

</script>

</body>
</html>
