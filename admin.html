<!DOCTYPE html>
<html lang="en-KE">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Control | UNASEMEJE ø DIA</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    :root {
      --brand-primary: #10b981;
      --bg-dark: #020617;
      --card-bg: #0f172a;
      --text-dim: #94a3b8;
      --danger: #ef4444;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg-dark);
      color: #f8fafc;
      margin: 0;
      display: flex;
    }

    /* Sidebar */
    .admin-sidebar {
      width: 280px;
      height: 100vh;
      background: var(--card-bg);
      border-right: 1px solid #1e293b;
      padding: 30px;
      position: fixed;
    }

    .admin-nav button {
      width: 100%;
      padding: 15px;
      background: transparent;
      border: none;
      color: var(--text-dim);
      text-align: left;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .admin-nav button.active, .admin-nav button:hover {
      background: rgba(16, 185, 129, 0.1);
      color: var(--brand-primary);
    }

    /* Main Content */
    .admin-main {
      margin-left: 280px;
      padding: 40px;
      width: 100%;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--card-bg);
      padding: 25px;
      border-radius: 20px;
      border: 1px solid #1e293b;
    }

    .stat-card h3 { color: var(--text-dim); font-size: 14px; margin-bottom: 10px; }
    .stat-card p { font-size: 24px; font-weight: 800; color: var(--brand-primary); }

    /* Tables */
    .table-container {
      background: var(--card-bg);
      border-radius: 20px;
      border: 1px solid #1e293b;
      overflow: hidden;
      margin-top: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th {
      background: #1e293b;
      padding: 15px 20px;
      font-size: 13px;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    td {
      padding: 15px 20px;
      border-bottom: 1px solid #1e293b;
      font-size: 14px;
    }

    .status-badge {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .status-pending { background: rgba(251, 191, 36, 0.1); color: #fbbf24; }
    .status-completed { background: rgba(16, 185, 129, 0.1); color: var(--brand-primary); }

    .btn-approve {
      background: var(--brand-primary);
      color: #020617;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-approve:hover { opacity: 0.8; }
  </style>
</head>
<body>

  <aside class="admin-sidebar">
    <h2 style="font-family: 'Outfit'; color: var(--brand-primary); margin-bottom: 40px;">Admin Panel</h2>
    <nav class="admin-nav">
      <button class="active" onclick="showSection('deposits')"><i class="fas fa-wallet"></i> Deposits</button>
      <button onclick="showSection('users')"><i class="fas fa-users"></i> User Management</button>
      <button onclick="showSection('orders')"><i class="fas fa-shopping-cart"></i> All Orders</button>
      <hr style="border: 0; border-top: 1px solid #1e293b; margin: 20px 0;">
      <button onclick="window.location.href='dashboard.html'"><i class="fas fa-arrow-left"></i> Back to Site</button>
    </nav>
  </aside>

  <main class="admin-main">
    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
      <h1>System Overview</h1>
      <div id="adminId" style="font-size: 14px; color: var(--text-dim);">Owner: diasamratbarusz@gmail.com</div>
    </header>

    <div class="stats-grid">
      <div class="stat-card"><h3>Pending Deposits</h3><p id="stat-pending">0</p></div>
      <div class="stat-card"><h3>Total Users</h3><p id="stat-users">0</p></div>
      <div class="stat-card"><h3>Platform Orders</h3><p id="stat-orders">0</p></div>
    </div>

    <!-- DEPOSITS SECTION -->
    <section id="section-deposits">
      <h2>Pending M-Pesa Verifications</h2>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>User</th>
              <th>Amount</th>
              <th>Transaction Code</th>
              <th>Date</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="table-deposits"></tbody>
        </table>
      </div>
    </section>

    <!-- USERS SECTION -->
    <section id="section-users" style="display:none;">
      <h2>Registered Users</h2>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Username</th>
              <th>Phone</th>
              <th>Balance</th>
              <th>Joined</th>
            </tr>
          </thead>
          <tbody id="table-users"></tbody>
        </table>
      </div>
    </section>

    <!-- ORDERS SECTION -->
    <section id="section-orders" style="display:none;">
      <h2>Global Order History</h2>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>User</th>
              <th>Service</th>
              <th>Qty</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="table-orders"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const API_URL = "https://unasemeje-backend-3.onrender.com/api/admin";
    const token = localStorage.getItem("token");

    // Security check: If no token, kick back to login
    if (!token) window.location.href = "index.html";

    function showSection(sectionId) {
      document.querySelectorAll('section').forEach(s => s.style.display = 'none');
      document.getElementById(`section-${sectionId}`).style.display = 'block';
      
      document.querySelectorAll('.admin-nav button').forEach(b => b.classList.remove('active'));
      event.currentTarget.classList.add('active');

      if (sectionId === 'deposits') loadDeposits();
      if (sectionId === 'users') loadUsers();
      if (sectionId === 'orders') loadOrders();
    }

    async function loadDeposits() {
      const res = await fetch(`${API_URL}/deposits`, { headers: { "Authorization": `Bearer ${token}` } });
      const data = await res.json();
      if (!res.ok) return alert("Unauthorized access denied.");

      const container = document.getElementById("table-deposits");
      container.innerHTML = "";
      
      const pendingCount = data.filter(d => d.status === 'pending').length;
      document.getElementById("stat-pending").innerText = pendingCount;

      data.forEach(d => {
        container.innerHTML += `
          <tr>
            <td>${d.userEmail}</td>
            <td>KES ${d.amount}</td>
            <td style="font-weight:bold; color:var(--brand-primary)">${d.transactionCode}</td>
            <td>${new Date(d.createdAt).toLocaleDateString()}</td>
            <td>
              ${d.status === 'pending' ? 
                `<button class="btn-approve" onclick="approveDeposit('${d._id}')">Approve</button>` : 
                `<span class="status-badge status-completed">Verified</span>`}
            </td>
          </tr>
        `;
      });
    }

    async function approveDeposit(depositId) {
      if (!confirm("Confirm M-Pesa code matches? This will add funds to user wallet.")) return;
      
      const res = await fetch(`${API_URL}/approve-deposit`, {
        method: "POST",
        headers: { 
          "Authorization": `Bearer ${token}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ depositId })
      });

      if (res.ok) {
        alert("Wallet updated successfully!");
        loadDeposits();
      }
    }

    async function loadUsers() {
      const res = await fetch(`${API_URL}/users`, { headers: { "Authorization": `Bearer ${token}` } });
      const data = await res.json();
      document.getElementById("stat-users").innerText = data.length;
      
      const container = document.getElementById("table-users");
      container.innerHTML = "";
      data.forEach(u => {
        container.innerHTML += `
          <tr>
            <td>${u.username}</td>
            <td>${u.phone}</td>
            <td>KES ${u.balance.toFixed(2)}</td>
            <td>${new Date(u.createdAt).toLocaleDateString()}</td>
          </tr>
        `;
      });
    }

    async function loadOrders() {
      const res = await fetch(`${API_URL}/orders`, { headers: { "Authorization": `Bearer ${token}` } });
      const data = await res.json();
      document.getElementById("stat-orders").innerText = data.length;

      const container = document.getElementById("table-orders");
      container.innerHTML = "";
      data.forEach(o => {
        container.innerHTML += `
          <tr>
            <td>${o.userEmail}</td>
            <td>${o.serviceName}</td>
            <td>${o.quantity}</td>
            <td><span class="status-badge status-${o.status}">${o.status}</span></td>
          </tr>
        `;
      });
    }

    // Initial load
    loadDeposits();
  </script>
</body>
</html>
