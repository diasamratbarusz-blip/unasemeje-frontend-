<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard - SMM Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .sidebar {
      width: 220px;
      height: 100vh;
      background: #020617;
      position: fixed;
      padding: 20px;
    }

    .sidebar h2 {
      color: #38bdf8;
    }

    .sidebar a {
      display: block;
      color: #cbd5f5;
      margin: 15px 0;
      cursor: pointer;
    }

    .main {
      margin-left: 240px;
      padding: 20px;
    }

    .card {
      background: #111827;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #1f2937;
    }

    button {
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #22c55e;
      color: black;
      font-weight: bold;
    }

    .danger {
      background: #ef4444;
      color: white;
    }

    .loading {
      color: #38bdf8;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>ADMIN PANEL</h2>
  <a onclick="loadUsers()">👤 Users</a>
  <a onclick="loadDeposits()">💰 Deposits</a>
  <a onclick="logout()">🚪 Logout</a>
</div>

<div class="main">
  <h1>Admin Dashboard</h1>
  <div id="content"></div>
</div>

<script>

const API = "https://unasemeje-backend-3.onrender.com/api";

// ================= TOKEN =================
function getToken(){
  return localStorage.getItem("token");
}

// ================= LOGOUT =================
function logout(){
  localStorage.removeItem("token");
  location.href = "index.html";
}

// ================= SAFE FETCH =================
async function safeFetch(url, options = {}) {
  try {
    const res = await fetch(url, options);
    if (!res.ok) throw new Error("Request failed");
    return await res.json();
  } catch (err) {
    console.error(err);
    return null;
  }
}

// ================= USERS =================
async function loadUsers(){

  document.getElementById("content").innerHTML =
    "<p class='loading'>⏳ Loading users...</p>";

  const data = await safeFetch(API + "/admin/users", {
    headers: { Authorization: "Bearer " + getToken() }
  });

  if(!data){
    document.getElementById("content").innerHTML =
      "<p style='color:red'>❌ Failed to load users</p>";
    return;
  }

  let html = `<h2>Users</h2>`;

  data.forEach(u => {
    html += `
      <div class="card">
        <b>Email:</b> ${u.email}<br>
        <b>Phone:</b> ${u.phone || "N/A"}<br>
        <b>Balance:</b> KES ${u.balance}
      </div>
    `;
  });

  document.getElementById("content").innerHTML = html;
}

// ================= DEPOSITS =================
async function loadDeposits(){

  document.getElementById("content").innerHTML =
    "<p class='loading'>⏳ Loading deposits...</p>";

  const data = await safeFetch(API + "/admin/deposits", {
    headers: { Authorization: "Bearer " + getToken() }
  });

  if(!data){
    document.getElementById("content").innerHTML =
      "<p style='color:red'>❌ Failed to load deposits</p>";
    return;
  }

  let html = `<h2>Deposits</h2>`;

  html += `
    <table>
      <tr>
        <th>Phone</th>
        <th>Amount</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
  `;

  data.forEach(d => {
    html += `
      <tr>
        <td>${d.phone}</td>
        <td>KES ${d.amount}</td>
        <td>${d.status}</td>
        <td>
          ${d.status !== "completed" ? `
            <button onclick="approveDeposit('${d._id}')">
              Approve
            </button>
          ` : "✔ Done"}
        </td>
      </tr>
    `;
  });

  html += `</table>`;

  document.getElementById("content").innerHTML = html;
}

// ================= APPROVE DEPOSIT =================
async function approveDeposit(id){

  if(!confirm("Approve this deposit?")) return;

  const res = await safeFetch(API + "/admin/approve", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + getToken()
    },
    body: JSON.stringify({ id })
  });

  if(!res){
    alert("❌ Failed");
    return;
  }

  alert("✅ Deposit approved");
  loadDeposits();
}

// ================= INIT =================
loadUsers();

</script>

</body>
</html>
