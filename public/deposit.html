<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Direct Deposit | M-Pesa</title>

<style>

:root{
    --primary:#38bdf8;
    --success:#22c55e;
    --danger:#ef4444;
    --bg-dark:#0f172a;
    --card-bg:#1e293b;
    --text-main:#f8fafc;
    --text-muted:#94a3b8;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter','Segoe UI',sans-serif;
    background:var(--bg-dark);
    color:var(--text-main);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.box{
    width:100%;
    max-width:420px;
    background:var(--card-bg);
    padding:30px;
    border-radius:24px;
    box-shadow:0 20px 50px rgba(0,0,0,0.4);
    border:1px solid rgba(255,255,255,0.05);
}

.header{
    text-align:center;
    margin-bottom:28px;
}

.header h2{
    margin:0;
    color:var(--primary);
    font-size:28px;
    letter-spacing:-0.5px;
    font-weight:800;
}

.header p{
    font-size:14px;
    color:var(--text-muted);
    margin-top:10px;
    line-height:1.5;
}

.input-group{
    margin-bottom:22px;
}

label{
    display:block;
    font-size:13px;
    font-weight:700;
    margin-bottom:8px;
    color:var(--text-muted);
    text-transform:uppercase;
    letter-spacing:1px;
}

input{
    width:100%;
    padding:15px;
    border-radius:14px;
    border:1px solid #334155;
    background:#0f172a;
    color:white;
    font-size:16px;
    transition:all 0.3s ease;
}

input:focus{
    border-color:var(--primary);
    outline:none;
    box-shadow:0 0 0 4px rgba(56,189,248,0.15);
}

button{
    width:100%;
    padding:16px;
    margin-top:5px;
    border:none;
    border-radius:14px;
    background:var(--success);
    color:#052e16;
    font-weight:800;
    cursor:pointer;
    font-size:16px;
    transition:all 0.2s ease;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
}

button:hover{
    opacity:0.92;
    transform:translateY(-1px);
}

button:active{
    transform:translateY(0);
}

button:disabled{
    background:#475569;
    color:#94a3b8;
    cursor:not-allowed;
}

.status-box{
    margin-top:20px;
    padding:14px;
    border-radius:12px;
    font-size:13px;
    text-align:center;
    display:none;
    line-height:1.6;
}

.status-success{
    background:rgba(34,197,94,0.12);
    color:#4ade80;
    border:1px solid rgba(34,197,94,0.25);
}

.status-error{
    background:rgba(239,68,68,0.12);
    color:#f87171;
    border:1px solid rgba(239,68,68,0.25);
}

.loader{
    width:18px;
    height:18px;
    border:3px solid rgba(255,255,255,0.3);
    border-radius:50%;
    border-top-color:#fff;
    animation:spin 1s linear infinite;
    display:none;
}

.footer-note{
    font-size:11px;
    margin-top:22px;
    text-align:center;
    color:#64748b;
    line-height:1.6;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

</style>

</head>

<body>

<div class="box">

    <div class="header">

        <h2>💸 M-Pesa Direct</h2>

        <p>
            Enter your Safaricom number and amount to receive an STK Push instantly.
        </p>

    </div>

    <form id="depositForm">

        <div class="input-group">

            <label for="phone">
                M-Pesa Number
            </label>

            <input
                type="text"
                id="phone"
                placeholder="0712345678"
                required
            >

        </div>

        <div class="input-group">

            <label for="amount">
                Amount (Ksh)
            </label>

            <input
                type="number"
                id="amount"
                placeholder="Minimum 1"
                required
            >

        </div>

        <button type="submit" id="btn">

            <span class="loader" id="loader"></span>

            <span id="btnText">
                Deposit Now
            </span>

        </button>

    </form>

    <div id="statusBox" class="status-box"></div>

    <p class="footer-note">
        Securely processed via Safaricom Daraja API & Paynecta Gateway
    </p>

</div>

<script>

// ======================================
// API CONFIG
// ======================================
// Using relative path to stay consistent with your server.js setup
const API_BASE = window.location.hostname === "localhost" 
    ? "http://localhost:3000/api" 
    : "/api";

// ======================================
// ELEMENTS
// ======================================
const form = document.getElementById("depositForm");
const btn = document.getElementById("btn");
const btnText = document.getElementById("btnText");
const loader = document.getElementById("loader");
const statusBox = document.getElementById("statusBox");

// ======================================
// STATUS DISPLAY
// ======================================
function showStatus(message, type = "success"){

    statusBox.style.display = "block";

    statusBox.className = "status-box";

    if(type === "success"){
        statusBox.classList.add("status-success");
    }else{
        statusBox.classList.add("status-error");
    }

    statusBox.innerHTML = message;
}

// ======================================
// LOADING
// ======================================
function setLoading(isLoading){

    if(isLoading){

        btn.disabled = true;

        loader.style.display = "block";

        btnText.innerText = "Processing...";

    }else{

        btn.disabled = false;

        loader.style.display = "none";

        btnText.innerText = "Deposit Now";
    }
}

// ======================================
// FORMAT PHONE
// ======================================
function formatPhone(phone){

    phone = phone.replace(/\D/g,'');

    if(phone.startsWith("0")){
        phone = "254" + phone.substring(1);
    }

    if(phone.startsWith("7") || phone.startsWith("1")){
        phone = "254" + phone;
    }

    return phone;
}

// ======================================
// PAYNECTA STK PUSH
// ======================================
async function depositNow(amount, phone, token){

    try{

        const response = await fetch(`${API_BASE}/paynecta/stkpush`,{

            method:"POST",

            headers:{
                "Content-Type":"application/json",
                "Authorization":`Bearer ${token}`
            },

            body:JSON.stringify({
                amount,
                phone
            })

        });

        const data = await response.json();

        if(response.ok){

            showStatus(
                "✅ STK Push sent successfully.<br>Please enter your PIN. You will be redirected shortly.",
                "success"
            );

            document.getElementById("phone").value = "";
            document.getElementById("amount").value = "";

            // Redirect back to add-funds after 5 seconds to allow time for PIN entry
            setTimeout(() => {
                window.location.href = "/add-funds";
            }, 5000);

        } else {

            showStatus(
                `❌ ${data.error || data.message || "Payment failed"}`,
                "error"
            );
        }

    }catch(error){
        showStatus(
            "❌ Connection Error: Server unavailable",
            "error"
        );
    }
}

// ======================================
// FORM SUBMIT
// ======================================
form.addEventListener("submit",async(e)=>{

    e.preventDefault();

    const token = localStorage.getItem("token");

    if(!token){
        showStatus("❌ Session expired. Please login again.", "error");
        setTimeout(()=>{ window.location.href = "/home"; }, 1500);
        return;
    }

    let phone = document.getElementById("phone").value.trim();
    const amount = document.getElementById("amount").value.trim();

    phone = formatPhone(phone);

    // Validation for Safaricom numbers (7xx or 1xx)
    if(!/^254[71]\d{8}$/.test(phone)){
        showStatus("❌ Invalid phone format. Use 07... or 01...", "error");
        return;
    }

    if(!amount || Number(amount) < 1){
        showStatus("❌ Amount must be greater than 0", "error");
        return;
    }

    setLoading(true);
    statusBox.style.display = "none";

    await depositNow(amount,phone,token);

    setLoading(false);
});

</script>

</body>
</html>
