<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Deposit Funds</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  width: 90%;
  max-width: 450px;
  background: #1e293b;
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

h2 {
  text-align: center;
  margin-bottom: 10px;
  color: #38bdf8;
  font-size: 24px;
}

p {
  font-size: 14px;
  color: #cbd5e1;
  text-align: center;
  line-height: 1.5;
  margin-bottom: 20px;
}

textarea {
  width: 100%;
  height: 160px;
  padding: 15px;
  border-radius: 10px;
  border: 1px solid #334155;
  resize: none;
  background: #0f172a;
  color: #f8fafc;
  outline: none;
  box-sizing: border-box;
  font-size: 14px;
  transition: border-color 0.3s;
}

textarea:focus {
  border-color: #38bdf8;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: #052e16;
  font-weight: bold;
  cursor: pointer;
  font-size: 16px;
  transition: opacity 0.2s, transform 0.1s;
}

button:active {
  transform: scale(0.98);
}

button:disabled {
  background: #64748b;
  color: #cbd5e1;
  cursor: not-allowed;
}

.note {
  margin-top: 15px;
  font-size: 12px;
  color: #94a3b8;
  text-align: center;
  background: rgba(15, 23, 42, 0.5);
  padding: 10px;
  border-radius: 8px;
}

.example-text {
  color: #38bdf8;
  font-style: italic;
}
</style>

</head>

<body>

<div class="box">

<h2>💰 Deposit Funds</h2>

<p>
  Send money to your M-Pesa number then paste the <strong>full SMS message</strong> below.<br>
  The system will automatically detect the transaction code & amount.
</p>

<textarea id="msg" placeholder="Paste full M-Pesa message here..."></textarea>

<button id="btn" onclick="deposit()">Submit Deposit</button>

<div class="note">
  <strong>Example:</strong><br>
  <span class="example-text">"ABC123XYZ Confirmed. Ksh1,000 sent to..."</span>
</div>

</div>

<script>
// API Configuration
const API = "https://unasemeje-backend-3.onrender.com/api";

/** 
 * UI Feedback: Disables button and changes text during request
 */
function setLoading(state) {
  const btn = document.getElementById("btn");
  if (state) {
    btn.disabled = true;
    btn.innerText = "Processing Transaction...";
  } else {
    btn.disabled = false;
    btn.innerText = "Submit Deposit";
  }
}

/** 
 * Deposit Action: Sends M-Pesa message to backend
 */
async function deposit() {
  const messageInput = document.getElementById("msg");
  const message = messageInput.value.trim();
  const token = localStorage.getItem("token");

  // 1. Validation
  if (!message) {
    alert("⚠️ Please paste the M-Pesa message first.");
    return;
  }

  if (!token) {
    alert("❌ Session expired. Please log in again.");
    return;
  }

  setLoading(true);

  try {
    // 2. API Request
    const res = await fetch(`${API}/deposit`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    // 3. Handle Response
    if (!res.ok) {
      throw new Error(data.error || "Deposit verification failed. Please try again.");
    }

    alert("✅ Success! " + (data.message || "Your deposit is being processed."));
    
    // Clear the textarea on success
    messageInput.value = "";

  } catch (err) {
    // 4. Handle Errors
    console.error("Deposit Error:", err);
    alert("❌ Error: " + err.message);
  } finally {
    setLoading(false);
  }
}
</script>

</body>
</html>
