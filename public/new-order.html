<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>New Order | UNASEMEJE ø DIA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* ========================================= */
        /* GLOBAL RESPONSIVE FIXES                   */
        /* ========================================= */
        html, body {
            overflow-x: hidden !important;
            max-width: 100% !important;
            width: 100% !important;
        }

        .dashboard {
            width: 100% !important;
            overflow-x: hidden !important;
        }

        .main {
            box-sizing: border-box !important;
            max-width: 100% !important;
        }

        .card {
            box-sizing: border-box !important;
            max-width: 100% !important;
            overflow-wrap: break-word !important;
            word-wrap: break-word !important;
        }

        /* Extra styles for flexibility */
        .dynamic-field { margin-top: 15px; display: none; }
        .service-desc {
            font-size: 12px;
            color: var(--text-dim);
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            border-left: 3px solid var(--primary);
            line-height: 1.4;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        textarea {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-family: inherit;
            resize: vertical;
            min-height: 100px;
            box-sizing: border-box;
        }
        .badge-info {
            font-size: 11px;
            padding: 2px 8px;
            background: var(--primary);
            border-radius: 20px;
            color: black;
            font-weight: bold;
        }

        /* Platform Badge */
        .platform-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            background: linear-gradient(135deg, var(--primary), #4c1d95);
            border-radius: 12px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
        }
        .platform-badge i {
            font-size: 24px;
        }

        /* ========================================= */
        /* PROFESSIONAL MOBILE BOTTOM NAVIGATION BAR */
        /* ========================================= */
        @media (max-width: 768px) {
            
            /* 1. The Sidebar Container becomes the Bottom Bar */
            .sidebar {
                position: fixed !important;
                bottom: 0 !important;
                left: 0 !important;
                width: 100% !important;
                height: auto !important;
                min-height: 65px !important;
                flex-direction: column !important;
                padding: 0 !important;
                border-right: none !important;
                border-top: 1px solid rgba(255,255,255,0.1) !important;
                z-index: 1000 !important;
                background: rgba(17, 24, 39, 0.98) !important;
                backdrop-filter: blur(10px) !important;
                box-shadow: 0 -4px 15px rgba(0,0,0,0.3) !important;
                transition: transform 0.3s ease-in-out !important; 
            }

            /* Class to hide the bottom nav when scrolling down */
            .sidebar.nav-hidden {
                transform: translateY(100%) !important;
            }

            /* 2. Hide the Logo on mobile */
            .sidebar h2 {
                display: none !important; 
            }

            /* 3. Hide the old utility section (we'll add new ones to nav) */
            .sidebar > div:last-child {
                display: none !important;
            }

            /* 4. The Main Navigation - Now with 2 rows on mobile */
            .sidebar .sidebar-nav {
                display: flex !important;
                flex-direction: row !important;
                flex-wrap: wrap !important;
                width: 100% !important;
                justify-content: space-around !important;
                align-items: center !important;
                margin: 0 !important;
                padding: 8px 0 !important;
                gap: 0 !important;
            }

            /* 5. Individual Buttons - First row (6 items) */
            .sidebar .sidebar-nav a {
                flex: 1 1 calc(100% / 6) !important;
                max-width: calc(100% / 6) !important;
                flex-direction: column !important;
                justify-content: center !important;
                align-items: center !important;
                gap: 4px !important;
                padding: 8px 4px !important;
                margin: 0 !important;
                text-align: center !important;
                border-radius: 0 !important;
                transition: all 0.2s ease !important;
                min-width: 0 !important;
            }

            /* 6. Second row items (AI Support & WhatsApp) - Full width row */
            .sidebar .sidebar-nav a.utility-link {
                flex: 0 0 auto !important;
                max-width: none !important;
                flex-direction: row !important;
                padding: 10px 20px !important;
                gap: 8px !important;
                border-top: 1px solid rgba(255,255,255,0.05) !important;
                width: 100% !important;
                justify-content: center !important;
            }

            .sidebar .sidebar-nav a.utility-link i {
                font-size: 16px !important;
                margin: 0 !important;
            }

            .sidebar .sidebar-nav a.utility-link span {
                font-size: 12px !important;
                font-weight: 600 !important;
            }

            /* AI Support specific styling */
            .sidebar .sidebar-nav a.utility-link.ai-support {
                color: var(--secondary) !important;
            }
            .sidebar .sidebar-nav a.utility-link.ai-support i {
                color: var(--secondary) !important;
            }

            /* WhatsApp specific styling */
            .sidebar .sidebar-nav a.utility-link.whatsapp-help {
                color: #25d366 !important;
            }
            .sidebar .sidebar-nav a.utility-link.whatsapp-help i {
                color: #25d366 !important;
            }

            /* 7. Icon Styling for main nav */
            .sidebar .sidebar-nav a:not(.utility-link) i {
                font-size: 20px !important;
                margin: 0 !important;
                color: #9ca3af !important;
            }
            
            /* ✨ ACTIVE STATE STYLING */
            .sidebar .sidebar-nav a.active i {
                color: var(--primary) !important;
                transform: scale(1.1) !important;
            }
            .sidebar .sidebar-nav a.active span {
                color: var(--primary) !important;
                font-weight: 700 !important;
            }

            /* 8. Text Styling for main nav */
            .sidebar .sidebar-nav a:not(.utility-link) span {
                font-size: 10px !important;
                font-weight: 500 !important;
                color: #9ca3af !important;
                margin: 0 !important;
                white-space: nowrap !important;
                overflow: hidden !important;
                text-overflow: ellipsis !important;
                max-width: 100% !important;
            }
            
            /* 9. Push main content up so it's not hidden behind the bar */
            .main {
                margin-left: 0 !important;
                margin-bottom: 120px !important; 
                padding: 15px !important;
                width: 100% !important;
            }

            /* Form elements responsive (Prevents iOS zoom on focus) */
            input, select, textarea {
                font-size: 16px !important; 
                max-width: 100% !important;
                box-sizing: border-box !important;
            }
            
            /* Service details flex wrap */
            #serviceDetails > div:first-child {
                flex-wrap: wrap;
                gap: 10px;
            }

            .live-notif {
                bottom: 140px !important;
                left: 15px !important;
                right: 15px !important;
                max-width: calc(100% - 30px) !important;
                word-wrap: break-word !important;
                overflow-wrap: break-word !important;
                box-sizing: border-box !important;
            }

            .platform-badge {
                font-size: 14px;
                padding: 10px 15px;
            }
            .platform-badge i {
                font-size: 20px;
            }
        }

        /* ========================================= */
        /* SMALL MOBILE (≤480px)                     */
        /* ========================================= */
        @media (max-width: 480px) {
            .main {
                padding: 12px !important;
                margin-bottom: 115px !important;
            }

            .sidebar {
                min-height: 60px !important;
            }
            .sidebar .sidebar-nav a:not(.utility-link) i {
                font-size: 18px !important;
            }
            .sidebar .sidebar-nav a:not(.utility-link) span {
                font-size: 9px !important;
            }

            .sidebar .sidebar-nav a.utility-link {
                padding: 8px 15px !important;
            }
            .sidebar .sidebar-nav a.utility-link i {
                font-size: 14px !important;
            }
            .sidebar .sidebar-nav a.utility-link span {
                font-size: 11px !important;
            }

            .live-notif {
                bottom: 135px !important;
                left: 10px !important;
                right: 10px !important;
                max-width: calc(100% - 20px) !important;
                padding: 12px 18px !important;
                font-size: 12px !important;
            }

            .platform-badge {
                font-size: 13px;
                padding: 8px 12px;
            }
            .platform-badge i {
                font-size: 18px;
            }
        }

        /* ========================================= */
        /* VERY SMALL MOBILE (≤360px)                */
        /* ========================================= */
        @media (max-width: 360px) {
            .main {
                padding: 10px !important;
                margin-bottom: 110px !important;
            }

            .sidebar {
                min-height: 58px !important;
            }
            .sidebar .sidebar-nav a:not(.utility-link) i {
                font-size: 16px !important;
            }
            .sidebar .sidebar-nav a:not(.utility-link) span {
                font-size: 8px !important;
            }

            .sidebar .sidebar-nav a.utility-link {
                padding: 7px 12px !important;
            }
            .sidebar .sidebar-nav a.utility-link i {
                font-size: 13px !important;
            }
            .sidebar .sidebar-nav a.utility-link span {
                font-size: 10px !important;
            }
        }
    </style>
</head>
<body>

<!-- DYNAMIC MOVING WORDS TICKER -->
<div class="top-ticker">
    <div class="ticker-content" id="tickerContent">
        <!-- Items will be injected dynamically by JS from the backend -->
    </div>
</div>

<div class="dashboard">
    <!-- Sidebar Navigation -->
    <div class="sidebar">
        <h2 style="font-family: 'Plus Jakarta Sans';">unasemeje ø dia</h2>
        <div class="sidebar-nav">
            <a href="dashboard.html"><i class="fas fa-home"></i> <span>Home</span></a>
            <a href="platform.html"><i class="fas fa-rocket"></i> <span>New Order</span></a>
            <a href="my-orders.html"><i class="fas fa-history"></i> <span>My Orders</span></a>
            <a href="services.html"><i class="fas fa-list"></i> <span>Services</span></a>
            <a href="add-funds.html"><i class="fas fa-wallet"></i> <span>Add Funds</span></a>
            <a href="referrals.html"><i class="fas fa-users"></i> <span>Referrals</span></a>
            
            <!-- AI Support & WhatsApp Help at bottom of mobile nav -->
            <a href="support.html" class="utility-link ai-support"><i class="fas fa-robot"></i> <span>AI Support</span></a>
            <a href="https://wa.me/254715509440" target="_blank" class="utility-link whatsapp-help"><i class="fab fa-whatsapp"></i> <span>WhatsApp Help</span></a>
        </div>
        
        <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
            <a onclick="logout()" style="color: #ef4444; cursor: pointer; display: flex; align-items: center; gap: 10px; padding: 12px 15px; text-decoration: none;">
                <i class="fas fa-sign-out-alt"></i> <span>Logout</span>
            </a>
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="main">
        <div class="card" style="border-left: 5px solid var(--primary);">
            <h2 style="margin:0;">Boost Your Socials 🚀</h2>
            <p style="color: var(--text-dim); margin-top: 5px; font-size: 14px;">Chagua package yako, uanze ku-trend instantly!</p>
        </div>

        <!-- Platform Selection Badge -->
        <div id="platformBadge" class="platform-badge" style="display: none;">
            <i id="platformIcon" class="fab fa-facebook"></i>
            <span id="platformName">Facebook</span>
        </div>

        <div class="card">
            <!-- Step 1: Category (SHOWS ALL CATEGORIES FROM SELECTED PLATFORM) -->
            <label><i class="fas fa-layer-group"></i> 1. Select Category</label>
            <select id="categorySelect" onchange="loadServices()">
                <option value="">-- Loading Categories... --</option>
            </select>

            <!-- Step 2: Service -->
            <label style="margin-top:20px;"><i class="fas fa-bolt"></i> 2. Choose Service</label>
            <select id="serviceSelect" onchange="updateServiceInfo()">
                <option value="">-- Select Category First --</option>
            </select>

            <!-- Service Details & Description -->
            <div id="serviceDetails" style="display: none; margin-top: 15px;">
                <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px;">
                    <span>Min Order: <b id="minQty" style="color: var(--primary);">0</b></span>
                    <span>Max Order: <b id="maxQty" style="color: var(--primary);">0</b></span>
                </div>
                <div id="serviceDesc" class="service-desc"></div>
            </div>

            <!-- Step 3: Link -->
            <label style="margin-top:20px;"><i class="fas fa-link"></i> 3. Link (Link ya Profile/Post)</label>
            <input type="text" id="link" placeholder="Paste link hapa...">

            <!-- Step 4: Custom Content (For Comments) -->
            <div id="customCommentsGroup" class="dynamic-field">
                <label><i class="fas fa-comments"></i> Enter Comments (One per line)</label>
                <textarea id="customComments" placeholder="Weka comment moja per line..." oninput="calculateCommentsQty()"></textarea>
            </div>

            <!-- Step 5: Quantity (Hides if comments are used) -->
            <div id="quantityGroup">
                <label style="margin-top:20px;"><i class="fas fa-sort-amount-up"></i> 4. Quantity (Kiasi Gani?)</label>
                <input type="number" id="quantity" placeholder="E.g 1000" oninput="calculateTotal()">
            </div>

            <!-- Price Display -->
            <div class="price-display">
                <small id="priceLabel">Order Total</small>
                <b id="priceContainer">KES <span id="totalPrice">0.00</span></b>
            </div>

            <!-- Submit Button -->
            <button class="btn-primary" id="orderBtn" onclick="placeOrder()">
                <i class="fas fa-fire"></i> CONFIRM BOOST
            </button>
        </div>
    </div>
</div>

<script>
    let allData = {};
    let selectedService = null;
    let selectedPlatform = null;
    const API = "https://unasemeje-backend.vercel.app/api";
    const API_FALLBACK = "https://unasemeje-backend-3.onrender.com/api";
    const token = localStorage.getItem("token");

    if (!token) window.location.href = "index.html";

    function logout() {
        localStorage.clear();
        window.location.href = "index.html";
    }

    // --- GET PLATFORM FROM URL ---
    function getSelectedPlatform() {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get('platform');
    }

    // --- GET PLATFORM ICON ---
    function getPlatformIcon(platform) {
        const icons = {
            'TikTok': 'fa-tiktok',
            'Instagram': 'fa-instagram',
            'Facebook': 'fa-facebook',
            'YouTube': 'fa-youtube',
            'Telegram': 'fa-telegram',
            'Twitter': 'fa-twitter',
            'Twitter/X': 'fa-twitter'
        };
        return icons[platform] || 'fa-globe';
    }

    // --- DYNAMIC TOP TICKER LOADER ---
    async function loadTopTicker() {
        try {
            let res = await fetch(`${API}/ticker`);
            if (!res.ok) res = await fetch(`${API_FALLBACK}/ticker`);
            
            const data = await res.json();
            const tickerContent = document.getElementById('tickerContent');
            
            if (data.items && data.items.length > 0) {
                let html = '';
                data.items.forEach(item => {
                    html += `<div class="ticker-item">${item}</div>`;
                });
                tickerContent.innerHTML = html + html; 
            } else {
                const fallback = `<div class="ticker-item">🚀 <span>UNASEMEJE SMM:</span> Welcome to the Ultimate Plug!</div>`;
                tickerContent.innerHTML = fallback + fallback;
            }
            
            const speed = data.speed || 80;
            tickerContent.style.animationDuration = `${speed}s`;
            
        } catch (err) {
            console.error("Failed to load top ticker:", err);
            const tickerContent = document.getElementById('tickerContent');
            const fallback = `<div class="ticker-item">🚀 <span>UNASEMEJE SMM:</span> Welcome to the Ultimate Plug!</div>`;
            tickerContent.innerHTML = fallback + fallback;
        }
    }

    // Initialize: Fetch all services and categories
    async function init() {
        try {
            // Force refresh to get latest services from provider
            const res = await fetch(`${API}/services?refresh=true`);
            if (!res.ok) throw new Error("Failed to fetch services");
            const json = await res.json();
            
            // Store all data from provider
            allData = json.data;
            
            console.log("📦 ALL PLATFORMS FROM PROVIDER:", Object.keys(allData));
            console.log("📊 TOTAL SERVICES:", Object.values(allData).reduce((sum, platform) => {
                return sum + Object.values(platform).reduce((catSum, cat) => catSum + cat.length, 0);
            }, 0));

            // Get selected platform from URL
            selectedPlatform = getSelectedPlatform();
            
            // Show platform badge if platform is selected
            if (selectedPlatform) {
                const badge = document.getElementById('platformBadge');
                const icon = document.getElementById('platformIcon');
                const name = document.getElementById('platformName');
                
                icon.className = `fab ${getPlatformIcon(selectedPlatform)}`;
                name.textContent = selectedPlatform;
                badge.style.display = 'inline-flex';
            }

            const cSelect = document.getElementById("categorySelect");
            cSelect.innerHTML = '<option value="">-- Choose Category --</option>';
            
            // FIX: Show ALL categories from the selected platform
            if (selectedPlatform && allData[selectedPlatform]) {
                const categories = allData[selectedPlatform];
                const categoryNames = Object.keys(categories);
                
                console.log(`📂 ALL ${selectedPlatform} CATEGORIES:`, categoryNames);
                console.log(`📊 TOTAL ${selectedPlatform} CATEGORIES:`, categoryNames.length);
                
                // Show ALL categories from this platform
                categoryNames.forEach(category => {
                    const opt = document.createElement("option");
                    opt.value = `${selectedPlatform}||${category}`;
                    // Display category name EXACTLY as it comes from provider
                    opt.innerText = category;
                    cSelect.appendChild(opt);
                });
                
                // Count total services for this platform
                const totalServices = categoryNames.reduce((sum, cat) => sum + categories[cat].length, 0);
                console.log(`📊 TOTAL ${selectedPlatform} SERVICES:`, totalServices);
                
            } else {
                // Fallback: Show all platforms if no platform selected
                console.log("⚠️ No platform selected, showing all platforms");
                Object.keys(allData).forEach(platform => {
                    Object.keys(allData[platform]).forEach(category => {
                        const opt = document.createElement("option");
                        opt.value = `${platform}||${category}`;
                        opt.innerText = `${platform} - ${category}`;
                        cSelect.appendChild(opt);
                    });
                });
            }

        } catch (e) { 
            console.error("Service Loading Error:", e);
            document.getElementById("categorySelect").innerHTML = '<option>Error loading services. Refresh!</option>';
        }
    }

    // Load Services for selected category
    function loadServices() {
        const catValue = document.getElementById("categorySelect").value;
        const sSelect = document.getElementById("serviceSelect");
        sSelect.innerHTML = '<option value="">-- Select Service --</option>';
        
        if (!catValue) return;

        // FIXED: Use indexOf instead of split to handle category names with special characters
        const separatorIndex = catValue.indexOf("||");
        const platform = catValue.substring(0, separatorIndex);
        const category = catValue.substring(separatorIndex + 2);
        
        const services = allData[platform][category];

        console.log(`📋 Loading ${services.length} services for ${platform} > ${category}`);

        // Show ALL services in this category
        services.forEach((s, index) => {
            const opt = document.createElement("option");
            opt.value = s.serviceId;
            // Display service name EXACTLY as it comes from provider
            opt.innerText = `${s.name} (KES ${s.rate}/1k)`;
            sSelect.appendChild(opt);
        });
        
        console.log(`✅ Loaded ${services.length} services successfully`);
    }

    // Update UI based on chosen service type (Quantity vs Comments)
    function updateServiceInfo() {
        const catValue = document.getElementById("categorySelect").value;
        const sId = document.getElementById("serviceSelect").value;
        const details = document.getElementById("serviceDetails");
        const qtyGroup = document.getElementById("quantityGroup");
        const commentGroup = document.getElementById("customCommentsGroup");

        if (!catValue || !sId) {
            details.style.display = "none";
            return;
        }

        // FIXED: Use indexOf instead of split to handle category names with special characters
        const separatorIndex = catValue.indexOf("||");
        const platform = catValue.substring(0, separatorIndex);
        const category = catValue.substring(separatorIndex + 2);
        
        selectedService = allData[platform][category].find(x => x.serviceId == sId);

        if (selectedService) {
            details.style.display = "block";
            document.getElementById("minQty").innerText = Number(selectedService.min).toLocaleString();
            document.getElementById("maxQty").innerText = Number(selectedService.max).toLocaleString();
            // Display description exactly as it comes from provider
            document.getElementById("serviceDesc").innerHTML = selectedService.description || "Hakuna maelezo zaidi. Plug is ready!";

            // CHECK FLEXIBILITY: Is this a comment service?
            const type = (selectedService.type || "").toLowerCase();
            if (type.includes("comment") || type.includes("custom")) {
                qtyGroup.style.display = "none";
                commentGroup.style.display = "block";
                document.getElementById("quantity").value = 0;
            } else {
                qtyGroup.style.display = "block";
                commentGroup.style.display = "none";
                document.getElementById("customComments").value = "";
            }
            
            calculateTotal();
        }
    }

    // Calculate total for normal quantity
    function calculateTotal() {
        if (!selectedService) return;
        const qty = parseFloat(document.getElementById("quantity").value) || 0;
        const total = (selectedService.rate / 1000) * qty;
        updatePriceUI(total);
    }

    // Calculate quantity and total for comments
    function calculateCommentsQty() {
        if (!selectedService) return;
        const lines = document.getElementById("customComments").value.split('\n').filter(l => l.trim().length > 0);
        const qty = lines.length;
        document.getElementById("quantity").value = qty;
        
        const total = (selectedService.rate / 1000) * qty;
        updatePriceUI(total);
        document.getElementById("priceLabel").innerHTML = `Order Total (${qty} comments)`;
    }

    function updatePriceUI(amount) {
        document.getElementById("totalPrice").innerText = amount.toLocaleString('en-KE', { 
            minimumFractionDigits: 2,
            maximumFractionDigits: 2 
        });
    }

    // Submit Order
    async function placeOrder() {
        const sId = document.getElementById("serviceSelect").value;
        const link = document.getElementById("link").value.trim();
        const qty = parseInt(document.getElementById("quantity").value);
        const comments = document.getElementById("customComments").value.trim();
        const btn = document.getElementById("orderBtn");

        if (!sId || !link) return alert("Weka link kwanza boss!");
        if (!qty || qty <= 0) return alert("Weka quantity ama comments!");

        if (qty < selectedService.min) return alert(`Huwezi order chini ya ${selectedService.min}`);
        if (qty > selectedService.max) return alert(`Order yako imepita limit ya ${selectedService.max}`);

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> TUNA-PLUG...';

        try {
            const payload = { 
                serviceId: sId, 
                link: link, 
                quantity: qty 
            };
            
            if(comments) payload.comments = comments;

            const res = await fetch(`${API}/order`, {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json", 
                    "Authorization": `Bearer ${token}` 
                },
                body: JSON.stringify(payload)
            });

            const data = await res.json();

            if (res.ok) {
                const finalCost = (selectedService.rate / 1000) * qty;
                window.location.href = `order-placed.html?id=${data.orderId}&service=${encodeURIComponent(selectedService.name)}&cost=${finalCost.toFixed(2)}&balance=${data.newBalance}`;
            } else {
                alert(data.error || "Wallet imebeat! Top up mzee.");
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-fire"></i> CONFIRM BOOST';
            }
        } catch (e) {
            alert("Network issues. Jaribu tena!");
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-fire"></i> CONFIRM BOOST';
        }
    }

    // Live Notification Ticker
    function showLiveOrder() {
