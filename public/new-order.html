<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>New Order | UNASEMEJE ø DIA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">
    <div class="sidebar">
        <h2>unasemeje ø dia</h2>
        <div class="sidebar-nav">
            <a href="home.html"><i class="fas fa-home"></i> <span>Home</span></a>
            <a href="new-order.html" class="active"><i class="fas fa-plus-circle"></i> <span>New Order</span></a>
            <a href="my-orders.html"><i class="fas fa-history"></i> <span>My Orders</span></a>
            <a href="services.html"><i class="fas fa-list"></i> <span>Services</span></a>
            <a href="add-funds.html"><i class="fas fa-wallet"></i> <span>Add Funds</span></a>
            <a href="referrals.html"><i class="fas fa-users"></i> <span>Referrals</span></a>
        </div>
    </div>

    <div class="main">
        <div class="card" style="border-left: 5px solid var(--primary);">
            <h2 style="margin:0;">Boost Your Socials</h2>
            <p style="color: var(--text-dim); margin-top: 5px; font-size: 14px;">Select a package and watch your engagement grow.</p>
        </div>

        <div class="card">
            <label><i class="fas fa-th-large"></i> 1. Select Platform</label>
            <select id="platformSelect" onchange="loadCategories()">
                <option value="">-- Choose Platform --</option>
            </select>

            <label><i class="fas fa-layer-group"></i> 2. Choose Category</label>
            <select id="categorySelect" onchange="loadServices()">
                <option value="">-- Select Category --</option>
            </select>

            <label><i class="fas fa-bolt"></i> 3. Select Service</label>
            <select id="serviceSelect" onchange="updateServiceInfo()">
                <option value="">-- Select Service --</option>
            </select>

            <div id="serviceDetails" style="display: none; background: rgba(15, 23, 42, 0.4); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border);">
                <div style="display: flex; justify-content: space-between; font-size: 12px;">
                    <span>Min: <b id="minQty" style="color: var(--primary);">0</b></span>
                    <span>Max: <b id="maxQty" style="color: var(--primary);">0</b></span>
                </div>
            </div>

            <label><i class="fas fa-link"></i> 4. Target Link</label>
            <input type="text" id="link" placeholder="Paste link (e.g., TikTok video/profile URL)">

            <label><i class="fas fa-sort-amount-up"></i> 5. Quantity</label>
            <input type="number" id="quantity" placeholder="How many do you want?" oninput="calculateTotal()">

            <div class="price-display">
                <small>Order Total</small>
                <b id="priceContainer">KES <span id="totalPrice">0.00</span></b>
            </div>

            <button class="btn-primary" id="orderBtn" onclick="placeOrder()">
                <i class="fas fa-paper-plane"></i> CONFIRM ORDER
            </button>
        </div>
    </div>
</div>

<script>
    let allData = {};
    // Pointing to your Render backend
    const API = "https://unasemeje-backend-3.onrender.com/api";
    const token = localStorage.getItem("token");

    // Protect route
    if (!token) window.location.href = "index.html";

    // 1. Fetch Services from Backend
    async function init() {
        try {
            const res = await fetch(`${API}/services`);
            const json = await res.json();
            allData = json.data;

            const pSelect = document.getElementById("platformSelect");
            Object.keys(allData).forEach(p => {
                const opt = document.createElement("option");
                opt.value = p; opt.innerText = p;
                pSelect.appendChild(opt);
            });

            // Handle pre-selection from redirect
            const params = new URLSearchParams(window.location.search);
            if (params.get('platform')) {
                pSelect.value = params.get('platform');
                loadCategories(params.get('category'));
            }
        } catch (e) { 
            console.error("Fetch error:", e);
            alert("Could not load services. Please check your connection."); 
        }
    }

    // 2. Filter Categories based on Platform
    function loadCategories(preselectCat = null) {
        const platform = document.getElementById("platformSelect").value;
        const cSelect = document.getElementById("categorySelect");
        cSelect.innerHTML = '<option value="">-- Select Category --</option>';
        
        if (allData[platform]) {
            Object.keys(allData[platform]).forEach(c => {
                const opt = document.createElement("option");
                opt.value = c; opt.innerText = c;
                cSelect.appendChild(opt);
            });
            if(preselectCat) {
                cSelect.value = preselectCat;
                loadServices();
            }
        }
    }

    // 3. Filter Services based on Category
    function loadServices() {
        const p = document.getElementById("platformSelect").value;
        const c = document.getElementById("categorySelect").value;
        const sSelect = document.getElementById("serviceSelect");
        sSelect.innerHTML = '<option value="">-- Select Service --</option>';

        if (allData[p] && allData[p][c]) {
            allData[p][c].forEach(s => {
                const opt = document.createElement("option");
                opt.value = s.serviceId;
                opt.innerText = `${s.name} - KES ${s.rate}/1k`;
                sSelect.appendChild(opt);
            });
        }
    }

    // 4. Show Min/Max and setup Pricing
    function updateServiceInfo() {
        const p = document.getElementById("platformSelect").value;
        const c = document.getElementById("categorySelect").value;
        const sId = document.getElementById("serviceSelect").value;
        const details = document.getElementById("serviceDetails");

        const service = allData[p] && allData[p][c] ? allData[p][c].find(x => x.serviceId == sId) : null;
        if (service) {
            details.style.display = "block";
            document.getElementById("minQty").innerText = service.min.toLocaleString();
            document.getElementById("maxQty").innerText = service.max.toLocaleString();
            calculateTotal();
        } else {
            details.style.display = "none";
        }
    }

    // 5. Live Calculation
    function calculateTotal() {
        const p = document.getElementById("platformSelect").value;
        const c = document.getElementById("categorySelect").value;
        const sId = document.getElementById("serviceSelect").value;
        const qtyInput = document.getElementById("quantity").value;
        const qty = parseFloat(qtyInput) || 0;

        if (p && c && sId) {
            const service = allData[p][c].find(x => x.serviceId == sId);
            const total = (service.rate / 1000) * qty;
            document.getElementById("totalPrice").innerText = total.toLocaleString('en-KE', { minimumFractionDigits: 2 });
        }
    }

    // 6. Submit Order to API
    async function placeOrder() {
        const p = document.getElementById("platformSelect").value;
        const c = document.getElementById("categorySelect").value;
        const sId = document.getElementById("serviceSelect").value;
        const link = document.getElementById("link").value.trim();
        const qty = document.getElementById("quantity").value;
        const btn = document.getElementById("orderBtn");

        if (!sId || !link || !qty) return alert("Please complete all steps.");

        const service = allData[p][c].find(x => x.serviceId == sId);
        if (parseInt(qty) < service.min) return alert(`Minimum quantity for this service is ${service.min}`);
        if (parseInt(qty) > service.max) return alert(`Maximum quantity for this service is ${service.max}`);

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> PROCESSING...';

        try {
            const res = await fetch(`${API}/order`, {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json", 
                    "Authorization": `Bearer ${token}` 
                },
                body: JSON.stringify({ serviceId: sId, link, quantity: parseInt(qty) })
            });

            const data = await res.json();

            if (res.ok) {
                // Redirect to success page with encoded parameters
                const finalCost = (service.rate / 1000) * parseInt(qty);
                window.location.href = `order-placed.html?id=${data.orderId}&service=${encodeURIComponent(service.name)}&cost=${finalCost}&balance=${data.newBalance}`;
            } else {
                alert(data.error || "Order failed. Please check your balance.");
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> CONFIRM ORDER';
            }
        } catch (e) {
            console.error("Order error:", e);
            alert("Connection error. Please check your internet and try again.");
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-paper-plane"></i> CONFIRM ORDER';
        }
    }

    init();
</script>

</body>
</html>
