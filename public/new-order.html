        /* ========================================= */
        /* GLOBAL RESPONSIVE FIXES                   */
        /* ========================================= */
        html, body {
            overflow-x: hidden !important;
            max-width: 100% !important;
            width: 100% !important;
        }

        .dashboard {
            width: 100% !important;

        .main {

        .card {

        /* ========================================= */
        /* PROFESSIONAL MOBILE BOTTOM NAVIGATION BAR */

        @media (max-width: 768px) {
            
            /* 1. The Sidebar Container becomes the Bottom Bar */

                position: fixed !important;
                bottom: 0 !important;
                left: 0 !important;
                width: 100% !important;
                height: auto !important;
                min-height: 65px !important;
                flex-direction: column !important;
                padding: 0 !important;
                border-right: none !important;
                border-top: 1px solid rgba(255,255,255,0.1) !important;
                z-index: 1000 !important;
                background: rgba(17, 24, 39, 0.98) !important;
                backdrop-filter: blur(10px) !important;
                box-shadow: 0 -4px 15px rgba(0,0,0,0.3) !important;
                transition: transform 0.3s ease-in-out !important; 
            }

            /* Class to hide the bottom nav when scrolling down */
            .sidebar.nav-hidden {
                transform: translateY(100%) !important;
            }

            /* 2. Hide the Logo on mobile */
            .sidebar h2 {
                display: none !important; 
            }

            /* 3. Hide the old utility section (we'll add new ones to nav) */
            .sidebar > div:last-child {
                display: none !important;
            }

            /* 4. The Main Navigation - Now with 2 rows on mobile */

                display: flex !important;
                flex-direction: row !important;
                flex-wrap: wrap !important;
                width: 100% !important;
                justify-content: space-around !important;
                align-items: center !important;
                margin: 0 !important;
                padding: 8px 0 !important;
                gap: 0 !important;
            }

            /* 5. Individual Buttons - First row (6 items) */
            .sidebar .sidebar-nav a {
                flex: 1 1 calc(100% / 6) !important;
                max-width: calc(100% / 6) !important;

            }

            /* 6. Second row items (AI Support & WhatsApp) - Full width row */

<script>
    let allData = {};
    let selectedService = null;
    const API = "https://unasemeje-backend.vercel.app/api";
    const API_FALLBACK = "https://unasemeje-backend-3.onrender.com/api";
    const token = localStorage.getItem("token");

    if (!token) window.location.href = "index.html";

    function logout() {
        localStorage.clear();
        window.location.href = "index.html";
    }

    // --- DYNAMIC TOP TICKER LOADER ---
    async function loadTopTicker() {
        try {
            let res = await fetch(`${API}/ticker`);
            if (!res.ok) res = await fetch(`${API_FALLBACK}/ticker`);
            
            const data = await res.json();
            const tickerContent = document.getElementById('tickerContent');
            
            if (data.items && data.items.length > 0) {
                let html = '';
                data.items.forEach(item => {
                    html += `<div class="ticker-item">${item}</div>`;
                });
                tickerContent.innerHTML = html + html; 
            } else {
                const fallback = `<div class="ticker-item">🚀 <span>UNASEMEJE SMM:</span> Welcome to the Ultimate Plug!</div>`;
                tickerContent.innerHTML = fallback + fallback;
            }
            
            const speed = data.speed || 80;
            tickerContent.style.animationDuration = `${speed}s`;
            
        } catch (err) {
            console.error("Failed to load top ticker:", err);
            const tickerContent = document.getElementById('tickerContent');
            const fallback = `<div class="ticker-item">🚀 <span>UNASEMEJE SMM:</span> Welcome to the Ultimate Plug!</div>`;
            tickerContent.innerHTML = fallback + fallback;
        }
    }

    // Initialize: Fetch all services and categories
    async function init() {
        try {
            const res = await fetch(`${API}/services`);
            if (!res.ok) throw new Error("Failed to fetch services");
            const json = await res.json();
            
            // This structure handles the nested provider data flexibly
            allData = json.data;

            const cSelect = document.getElementById("categorySelect");
            cSelect.innerHTML = '<option value="">-- Choose Category --</option>';
            
            // Get all categories from all platforms
            Object.keys(allData).forEach(platform => {
                Object.keys(allData[platform]).forEach(category => {
                    const opt = document.createElement("option");
                    opt.value = `${platform}||${category}`; // Store both to find easily
                    opt.innerText = `${platform} - ${category}`;
                    cSelect.appendChild(opt);
                });
            });

        } catch (e) { 
            console.error("Service Loading Error:", e);
            document.getElementById("categorySelect").innerHTML = '<option>Error loading services. Refresh!</option>';
        }
    }

    // Load Services for selected category
    function loadServices() {
        const catValue = document.getElementById("categorySelect").value;
        const sSelect = document.getElementById("serviceSelect");
        sSelect.innerHTML = '<option value="">-- Select Service --</option>';
        
        if (!catValue) return;

        const [platform, category] = catValue.split("||");
        const services = allData[platform][category];

        services.forEach(s => {
            const opt = document.createElement("option");
            opt.value = s.serviceId;
            opt.innerText = `${s.name} (KES ${s.rate}/1k)`;
            sSelect.appendChild(opt);
        });
    }

    // Update UI based on chosen service type (Quantity vs Comments)
    function updateServiceInfo() {
        const catValue = document.getElementById("categorySelect").value;
        const sId = document.getElementById("serviceSelect").value;
        const details = document.getElementById("serviceDetails");
        const qtyGroup = document.getElementById("quantityGroup");
        const commentGroup = document.getElementById("customCommentsGroup");

        if (!catValue || !sId) {
            details.style.display = "none";
            return;
        }

        const [p, c] = catValue.split("||");
        selectedService = allData[p][c].find(x => x.serviceId == sId);

        if (selectedService) {
            details.style.display = "block";
            document.getElementById("minQty").innerText = Number(selectedService.min).toLocaleString();
            document.getElementById("maxQty").innerText = Number(selectedService.max).toLocaleString();
            document.getElementById("serviceDesc").innerHTML = selectedService.description || "Hakuna maelezo zaidi. Plug is ready!";

            // CHECK FLEXIBILITY: Is this a comment service?
            // Usually, SMM providers flag these as "Custom Comments" or "Package"
            const type = (selectedService.type || "").toLowerCase();
            if (type.includes("comment") || type.includes("custom")) {
                qtyGroup.style.display = "none";
                commentGroup.style.display = "block";
                document.getElementById("quantity").value = 0;
            } else {
                qtyGroup.style.display = "block";
                commentGroup.style.display = "none";
                document.getElementById("customComments").value = "";
            }
            
            calculateTotal();
        }
    }

    // Calculate total for normal quantity
    function calculateTotal() {
        if (!selectedService) return;
        const qty = parseFloat(document.getElementById("quantity").value) || 0;
        const total = (selectedService.rate / 1000) * qty;
        updatePriceUI(total);
    }

    // Calculate quantity and total for comments
    function calculateCommentsQty() {
        if (!selectedService) return;
        const lines = document.getElementById("customComments").value.split('\n').filter(l => l.trim().length > 0);
        const qty = lines.length;
        document.getElementById("quantity").value = qty; // Hidden but kept for logic
        
        const total = (selectedService.rate / 1000) * qty;
        updatePriceUI(total);
        document.getElementById("priceLabel").innerHTML = `Order Total (${qty} comments)`;
    }

    function updatePriceUI(amount) {
        document.getElementById("totalPrice").innerText = amount.toLocaleString('en-KE', { 
            minimumFractionDigits: 2,
            maximumFractionDigits: 2 
        });
    }

    // Submit Order
    async function placeOrder() {
        const sId = document.getElementById("serviceSelect").value;
        const link = document.getElementById("link").value.trim();
        const qty = parseInt(document.getElementById("quantity").value);
        const comments = document.getElementById("customComments").value.trim();
        const btn = document.getElementById("orderBtn");

        if (!sId || !link) return alert("Weka link kwanza boss!");
        if (!qty || qty <= 0) return alert("Weka quantity ama comments!");

        if (qty < selectedService.min) return alert(`Huwezi order chini ya ${selectedService.min}`);
        if (qty > selectedService.max) return alert(`Order yako imepita limit ya ${selectedService.max}`);

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> TUNA-PLUG...';

        try {
            const payload = { 
                serviceId: sId, 
                link: link, 
                quantity: qty 
            };
            
            // Add comments to payload if they exist
            if(comments) payload.comments = comments;

            const res = await fetch(`${API}/order`, {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json", 
                    "Authorization": `Bearer ${token}` 
                },
                body: JSON.stringify(payload)
            });

            const data = await res.json();

            if (res.ok) {
                const finalCost = (selectedService.rate / 1000) * qty;
                window.location.href = `order-placed.html?id=${data.orderId}&service=${encodeURIComponent(selectedService.name)}&cost=${finalCost.toFixed(2)}&balance=${data.newBalance}`;
            } else {
                alert(data.error || "Wallet imebeat! Top up mzee.");
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-fire"></i> CONFIRM BOOST';
            }
        } catch (e) {
            alert("Network issues. Jaribu tena!");
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-fire"></i> CONFIRM BOOST';
        }
    }

    // Live Notification Ticker
    function showLiveOrder() {
        const names = ["Brian", "Mercy", "Kevin", "Stacy", "Juma", "Anita", "Otieno", "Faith", "Kamau", "Wanjiku", "Chalo", "Dancan", "Sharon", "Kibet", "Omondi", "Aura", "Plug", "King", "Queen"];
        const services = ["1,000 TikTok Views", "500 IG Followers", "2,500 YouTube Views", "200 Post Likes", "50 TikTok Shares", "100 IG Reel Likes"];
        
        const randomName = names[Math.floor(Math.random() * names.length)];
        const randomService = services[Math.floor(Math.random() * services.length)];

        const notification = document.createElement("div");
        notification.className = "live-notif"; 
        notification.innerHTML = `🔥 <b>${randomName}</b> amebuy <b>${randomService}</b>!`;
        document.body.appendChild(notification);

        setTimeout(() => {
            notification.style.opacity = "0";
            setTimeout(() => notification.remove(), 500);
        }, 4000);
    }

    setInterval(showLiveOrder, 10000);
    
    // Execute functions on page load
    loadTopTicker();
    init();
</script>

<!-- CHAT WIDGET JAVASCRIPT LOGIC -->
<script>
    document.addEventListener('DOMContentLoaded', () => {
        // DOM Elements
        const chatToggleBtn = document.getElementById('chatToggleBtn');
        const chatCloseBtn = document.getElementById('chatCloseBtn');
        const chatWindow = document.getElementById('chatWindow');
        const chatMessages = document.getElementById('chatMessages');
        const chatForm = document.getElementById('chatForm');
        const chatInput = document.getElementById('chatInput');
        const chatIconOpen = document.getElementById('chatIconOpen');
        const chatIconClose = document.getElementById('chatIconClose');

        // Configuration: Your Backend URLs (Dual-API Fallback)
        const API_PRIMARY_BOT = 'https://unasemeje-backend.vercel.app/api/support-bot';
        const API_FALLBACK_BOT = 'https://unasemeje-backend-3.onrender.com/api/support-bot';

        let isChatOpen = false;

        // ==========================================
        // AUTO-HIDE BOTTOM NAV ON SCROLL DOWN
        // ==========================================
        let lastScrollTop = 0;
        const mobileSidebar = document.querySelector('.sidebar');

        window.addEventListener('scroll', () => {
            if (window.innerWidth <= 768) {
                let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                const isChatCurrentlyOpen = chatWindow.style.display === 'flex' && !chatWindow.classList.contains('hidden');
                
                if (scrollTop > lastScrollTop && scrollTop > 100 && !isChatCurrentlyOpen) {
                    mobileSidebar.classList.add('nav-hidden');
                    chatToggleBtn.classList.add('nav-hidden');
                    chatWindow.classList.add('nav-hidden');
                } else {
                    mobileSidebar.classList.remove('nav-hidden');
                    chatToggleBtn.classList.remove('nav-hidden');
                    chatWindow.classList.remove('nav-hidden');
                }
                lastScrollTop = scrollTop <= 0 ? 0 : scrollTop;
            }
        }, false);

        // --- UI TOGGLE LOGIC ---
        function toggleChat() {
            isChatOpen = !isChatOpen;
            if (isChatOpen) {
                chatWindow.style.display = 'flex';
                setTimeout(() => {
                    chatWindow.classList.remove('hidden', 'scale-95', 'opacity-0');
                    chatWindow.classList.add('scale-100', 'opacity-100');
                }, 10);
                chatIconOpen.classList.add('hidden');
                chatIconClose.classList.remove('hidden');
                
                // Show welcome message if chat is empty
                if (chatMessages.children.length === 0) {
                    appendMessage('bot', "Hello! 👋 I'm the Unasemeje AI Assistant. How can I help you today? You can ask me about adding funds, updating your profile, or payment issues.");
                }
                setTimeout(() => chatInput.focus(), 300);
            } else {
                chatWindow.classList.add('scale-95', 'opacity-0');
                chatWindow.classList.remove('scale-100', 'opacity-100');
                setTimeout(() => {
                    chatWindow.style.display = 'none';
                    chatWindow.classList.add('hidden');
                }, 300);
                chatIconOpen.classList.remove('hidden');
                chatIconClose.classList.add('hidden');
            }
        }

        // --- MESSAGE RENDERING ---
        function appendMessage(sender, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const bubble = document.createElement('div');
            if (sender === 'user') {
                bubble.className = 'text-white px-4 py-2.5 rounded-2xl rounded-br-sm max-w-[85%] text-sm shadow-md break-words';
                bubble.style.backgroundColor = 'var(--primary)';
            } else {
                bubble.className = 'bg-white text-gray-800 px-4 py-2.5 rounded-2xl rounded-bl-sm max-w-[85%] text-sm shadow-sm border border-gray-100 break-words';
            }
            bubble.innerText = text;
            
            msgDiv.appendChild(bubble);
            chatMessages.appendChild(msgDiv);
            
            // Auto-scroll to bottom
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typingIndicator';
            typingDiv.className = 'flex justify-start';
            typingDiv.innerHTML = `
                <div class="bg-white text-gray-400 px-4 py-3 rounded-2xl rounded-bl-sm shadow-sm border border-gray-100 flex gap-1.5">
                    <span class="w-2 h-2 bg-gray-300 rounded-full typing-dot"></span>
                    <span class="w-2 h-2 bg-gray-300 rounded-full typing-dot"></span>
                    <span class="w-2 h-2 bg-gray-300 rounded-full typing-dot"></span>
                </div>
            `;
            chatMessages.appendChild(typingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        // --- API COMMUNICATION (WITH FALLBACK) ---
        async function sendToBackend(message) {
            try {
                const response = await fetch(API_PRIMARY_BOT, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify({ message })
                });
                if (response.ok) return await response.json();
            } catch (err) {
                console.warn("Primary AI server unreachable. Trying fallback...");
            }

            try {
                const response = await fetch(API_FALLBACK_BOT, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify({ message })
                });
                if (response.ok) return await response.json();
            } catch (err) {
                console.error("Both AI servers unreachable.");
                return null;
            }
        }

        // --- FORM SUBMISSION HANDLER ---
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = chatInput.value.trim();
            if (!message) return;

            appendMessage('user', message);
            chatInput.value = '';
            chatInput.disabled = true; 
            showTyping();

            const data = await sendToBackend(message);
            
            hideTyping();
            chatInput.disabled = false;
            chatInput.focus();

            if (data && data.success && data.reply) {
                appendMessage('bot', data.reply);
            } else {
                appendMessage('bot', "I'm having trouble connecting to my brain right now. Please try again in a moment!");
            }
        });

        // --- EVENT LISTENERS ---
        chatToggleBtn.addEventListener('click', toggleChat);
        chatCloseBtn.addEventListener('click', toggleChat);
        
        document.addEventListener('click', (e) => {
            if (isChatOpen && !chatWindow.contains(e.target) && !chatToggleBtn.contains(e.target)) {
                toggleChat();
            }
        });
    });
</script>
