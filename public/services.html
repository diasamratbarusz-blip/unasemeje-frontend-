<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Select Package | UNASEMEJE ø DIA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific tweaks for the package selection flow */
        .header-nav { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        
        .back-circle { 
            width: 45px; height: 45px; background: var(--card-bg); border: 1px solid var(--border); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            color: white; text-decoration: none; transition: 0.3s; flex-shrink: 0;
        }
        .back-circle:hover { background: var(--primary); border-color: var(--primary); transform: scale(1.1); }

        /* UPDATED: Ultra-flexible responsive grid for ALL screen widths (320px to 4K) */
        .package-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 300px), 1fr)); 
            gap: 20px; 
        }
        
        .package-link { text-decoration: none; display: block; height: 100%; }
        
        .package-card {
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            align-items: flex-start;
            background: var(--card-bg); 
            border: 1px solid var(--border);
            padding: 20px; 
            border-radius: 18px; 
            transition: all 0.3s ease;
            min-height: 120px;
            box-sizing: border-box;
            gap: 15px;
            height: 100%;
        }

        .package-card:hover {
            border-color: var(--primary);
            background: rgba(124, 58, 237, 0.05);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        /* Switch to row layout on slightly larger screens */
        @media (min-width: 500px) {
            .package-card {
                flex-direction: row;
                align-items: center;
            }
        }

        .package-info {
            flex: 1;
            min-width: 0; /* Crucial for preventing flex item text overflow */
        }

        .package-info h3 { 
            margin: 0; 
            font-size: clamp(14px, 2.5vw, 16px); 
            font-weight: 700; 
            color: var(--text-main); 
            word-wrap: break-word;
            overflow-wrap: break-word;
            line-height: 1.4;
        }

        .package-info p { 
            margin: 6px 0 0; 
            font-size: clamp(11px, 2vw, 13px); 
            color: var(--text-dim); 
            word-wrap: break-word;
            overflow-wrap: break-word;
            display: flex;
            align-items: center;
            gap: 6px;
            line-height: 1.3;
        }

        .package-info p i {
            font-size: 10px;
            color: var(--primary);
            flex-shrink: 0;
        }

        .package-info .category-text {
            color: var(--primary);
            font-weight: 600;
            font-size: clamp(10px, 1.8vw, 11px);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 8px;
        }

        .package-info .limit-text {
            color: var(--text-dim);
            font-size: clamp(10px, 1.8vw, 12px);
            margin-top: 4px;
            opacity: 0.8;
        }

        .count-badge {
            background: rgba(16, 185, 129, 0.1); 
            color: var(--secondary);
            padding: 10px 15px; 
            border-radius: 12px; 
            font-size: clamp(13px, 2vw, 15px); 
            font-weight: 800;
            border: 1px solid rgba(16, 185, 129, 0.2);
            white-space: nowrap;
            flex-shrink: 0;
            text-align: center;
            line-height: 1.2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .count-badge span {
            font-size: clamp(8px, 1.5vw, 9px);
            font-weight: 600;
            opacity: 0.8;
            margin-top: 2px;
        }

        /* Ensure loading and error states span full width */
        .full-width-message {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px 20px;
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="sidebar">
        <h2>unasemeje ø dia</h2>
        <div class="sidebar-nav">
            <a href="dashboard.html"><i class="fas fa-home"></i> <span>Home</span></a>
            <a href="platform.html" class="active"><i class="fas fa-plus-circle"></i> <span>New Order</span></a>
            <a href="my-orders.html"><i class="fas fa-history"></i> <span>My Orders</span></a>
            <a href="services.html"><i class="fas fa-list"></i> <span>Services</span></a>
            <a href="add-funds.html"><i class="fas fa-wallet"></i> <span>Add Funds</span></a>
            <a href="referrals.html"><i class="fas fa-users"></i> <span>Referrals</span></a>
        </div>
    </div>

    <div class="main">
        <div class="header-nav">
            <a href="platform.html" class="back-circle"><i class="fas fa-arrow-left"></i></a>
            <div style="min-width: 0;">
                <h1 id="platformTitle" style="margin:0; font-size: clamp(20px, 4vw, 24px); font-weight: 800; word-wrap: break-word;">---</h1>
                <p style="color: var(--text-dim); margin: 2px 0 0; font-size: clamp(12px, 2vw, 14px);">Select a package to proceed</p>
            </div>
        </div>

        <div class="package-container" id="packageList">
            <div class="full-width-message">
                <i class="fas fa-circle-notch fa-spin fa-2x" style="color: var(--primary);"></i>
                <p style="margin-top: 15px; color: var(--text-dim);">Syncing global packages...</p>
            </div>
        </div>
    </div>
</div>

<script>
    // Updated cleanly to bind securely to your live production endpoint
    const API = "https://unasemeje-backend.vercel.app/api";
    const token = localStorage.getItem("token");
    const urlParams = new URLSearchParams(window.location.search);
    const platform = urlParams.get('platform');

    // Security Check
    if (!token) window.location.href = "index.html";
    if (!platform) window.location.href = "platform.html";

    // Set Title
    document.getElementById('platformTitle').innerText = platform + " Packages";

    async function fetchPackages() {
        try {
            const res = await fetch(`${API}/services`);
            const json = await res.json();
            
            const categories = json.data[platform];
            const list = document.getElementById('packageList');
            list.innerHTML = "";

            if (!categories) {
                list.innerHTML = `<div class="card full-width-message">No services found for this platform.</div>`;
                return;
            }

            let allPackages = [];

            // Flatten all services from all categories into a single list
            Object.keys(categories).forEach(catName => {
                categories[catName].forEach(service => {
                    // ==========================================
                    // FILTER LOGIC: Hide if category or service name contains 'delix'
                    // ==========================================
                    const nameLower = (service.name || "").toLowerCase();
                    const catLower = (catName || "").toLowerCase();
                    
                    if (!nameLower.includes('delix') && !catLower.includes('delix')) {
                        allPackages.push(service);
                    }
                });
            });

            if (allPackages.length === 0) {
                list.innerHTML = `<div class="card full-width-message">No valid packages found for this platform.</div>`;
                return;
            }

            // Optional: Sort packages by rate (cheapest first) or name
            // allPackages.sort((a, b) => a.rate - b.rate);

            allPackages.forEach(service => {
                const link = document.createElement('a');
                // Link to the checkout/order page with the specific service ID
                // Note: Change 'order.html' to your actual checkout page filename if different
                link.href = `order.html?platform=${encodeURIComponent(platform)}&serviceId=${service.serviceId}`;
                link.className = 'package-link';
                
                // Format min and max quantities safely
                const minQty = service.min ? Number(service.min).toLocaleString() : '0';
                const maxQty = service.max ? Number(service.max).toLocaleString() : 'Unlimited';
                const rate = service.rate ? Number(service.rate).toFixed(2) : '0.00';

                link.innerHTML = `
                    <div class="package-card">
                        <div class="package-info">
                            <h3>${service.name}</h3>
                            <p class="category-text"><i class="fas fa-layer-group"></i> ${service.category}</p>
                            <p class="limit-text"><i class="fas fa-arrows-alt-h"></i> Min: ${minQty} | Max: ${maxQty}</p>
                        </div>
                        <div class="count-badge">
                            KES ${rate}
                            <span>/ 1K</span>
                        </div>
                    </div>
                `;
                list.appendChild(link);
            });

        } catch (error) {
            console.error("Package Load Error:", error);
            document.getElementById('packageList').innerHTML = `
                <div class="card full-width-message" style="border-color: var(--danger);">
                    <i class="fas fa-exclamation-triangle" style="color: var(--danger); font-size: 30px;"></i>
                    <p style="margin-top:10px;">Failed to load packages. Please check your internet.</p>
                    <button onclick="location.reload()" class="btn-primary" style="margin-top:15px; width:auto; padding: 10px 20px;">Retry</button>
                </div>
            `;
        }
    }

    // Run
    fetchPackages();
</script>

</body>
</html>
