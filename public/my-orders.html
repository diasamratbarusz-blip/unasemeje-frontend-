<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Orders | UNASEMEJE ø DIA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7c3aed;
            --secondary: #10b981;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; 
            background: var(--bg-dark); 
            color: var(--text-main); 
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
        }

        /* SIDEBAR */
        .sidebar { 
            width: 260px; background: #111827; padding: 25px; border-right: 1px solid #1f2937; 
            position: fixed; height: 100vh; display: flex; flex-direction: column; 
        }
        .sidebar h2 { color: var(--primary); font-size: 20px; margin-bottom: 30px; text-align: center; font-weight: 800; }
        .sidebar a { 
            display: flex; align-items: center; padding: 12px 15px; color: var(--text-dim); 
            text-decoration: none; border-radius: 10px; margin-bottom: 5px; transition: 0.2s; 
        }
        .sidebar a:hover, .sidebar a.active { background: var(--primary); color: white; }

        /* MAIN CONTENT */
        .main { margin-left: 260px; padding: 40px; width: calc(100% - 260px); min-height: 100vh; }
        
        .header-section { 
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; 
        }
        .header-section h1 { font-weight: 800; font-size: 28px; margin: 0; }

        /* TABLE STYLES */
        .card { 
            background: var(--card-bg); 
            border: 1px solid #334155; 
            border-radius: 20px; 
            padding: 20px; 
            overflow: hidden;
        }

        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { 
            text-align: left; padding: 15px; color: var(--text-dim); 
            border-bottom: 1px solid #334155; font-size: 12px; text-transform: uppercase; 
            letter-spacing: 1px;
        }
        td { padding: 15px; border-bottom: 1px solid #1f2937; font-size: 14px; }

        /* STATUS BADGES */
        .badge { 
            padding: 5px 12px; border-radius: 6px; font-size: 11px; 
            font-weight: 800; text-transform: uppercase; display: inline-block;
        }
        .bg-pending { background: rgba(99, 102, 241, 0.2); color: #818cf8; border: 1px solid #6366f1; }
        .bg-completed { background: rgba(16, 185, 129, 0.2); color: var(--secondary); border: 1px solid var(--secondary); }
        .bg-processing { background: rgba(245, 158, 11, 0.2); color: var(--warning); border: 1px solid var(--warning); }
        .bg-canceled { background: rgba(239, 68, 68, 0.2); color: var(--danger); border: 1px solid var(--danger); }

        .refresh-btn {
            background: var(--primary); color: white; border: none; padding: 10px 20px;
            border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.3s;
        }
        .refresh-btn:hover { opacity: 0.9; transform: scale(1.05); }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { margin-left: 0; padding: 20px; }
            .header-section h1 { font-size: 22px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>unasemeje ø dia</h2>
        <a href="home.html"><i class="fas fa-home"></i> Home</a>
        <a href="select-platform.html"><i class="fas fa-plus-circle"></i> New Order</a>
        <a href="my-orders.html" class="active"><i class="fas fa-history"></i> My Orders</a>
        <a href="add-funds.html"><i class="fas fa-wallet"></i> Add Funds</a>
        <a href="referrals.html"><i class="fas fa-users"></i> Referrals</a>
    </div>

    <div class="main">
        <div class="header-section">
            <h1>Order History</h1>
            <button class="refresh-btn" onclick="loadOrders()">
                <i class="fas fa-sync-alt"></i> Refresh
            </button>
        </div>

        <div class="card">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Service Details</th>
                            <th>Quantity</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="ordersList">
                        <tr>
                            <td colspan="4" style="text-align:center; padding: 40px; color: var(--text-dim);">
                                <i class="fas fa-spinner fa-spin"></i> Loading your orders...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API = "https://unasemeje-backend-3.onrender.com/api";
        const token = localStorage.getItem("token");

        if (!token) window.location.href = "index.html";

        async function loadOrders() {
            try {
                const res = await fetch(`${API}/sync-orders`, { 
                    headers: { "Authorization": `Bearer ${token}` }
                });
                const orders = await res.json();
                const list = document.getElementById("ordersList");

                if (!orders || orders.length === 0) {
                    list.innerHTML = `<tr><td colspan="4" style="text-align:center; padding: 40px; color: var(--text-dim);">No orders found. Start growing today!</td></tr>`;
                    return;
                }

                list.innerHTML = orders.map(o => {
                    const status = (o.status || 'pending').toLowerCase();
                    const badgeClass = `bg-${status}`;
                    const serviceName = o.serviceName || "Social Service";
                    
                    return `
                    <tr>
                        <td style="font-weight: 800; color: var(--primary);">#${o.orderId || '---'}</td>
                        <td>
                            <div style="font-weight: 600;">${serviceName}</div>
                            <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">
                                <i class="fas fa-link"></i> ${o.link.substring(0, 30)}...
                            </div>
                        </td>
                        <td>${o.quantity.toLocaleString()}</td>
                        <td><span class="badge ${badgeClass}">${status}</span></td>
                    </tr>`;
                }).join('');

            } catch (e) {
                console.error("Order Load Error", e);
                document.getElementById("ordersList").innerHTML = `<tr><td colspan="4" style="text-align:center; color: var(--danger);">Failed to sync orders. Please try again.</td></tr>`;
            }
        }

        // Initial Load
        loadOrders();
    </script>
</body>
</html>
