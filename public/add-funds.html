<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Funds - Unasemeje</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

    <style>
        body{ font-family:'Plus Jakarta Sans',sans-serif; background:#f5f7fb; }
        .bg-custom-green{ background:#11453b; }
        .status-success{ background:#ecfdf5; color:#047857; border:1px solid #a7f3d0; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .payment-frame-container {
            width: 100%; height: 650px; border-radius: 24px;
            overflow: hidden; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid #e5e7eb; background: #ffffff;
        }

        /* Identity Overlay Modals */
        #identityOverlay {
            position: fixed; inset: 0; background: rgba(11, 69, 59, 0.85);
            z-index: 1000; display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(8px); padding: 20px;
        }

        .input-field {
            width: 100%; background: #f9fafb; border: 1px solid #e5e7eb;
            padding: 12px 16px; border-radius: 12px; outline: none; transition: 0.2s; color: #1f2937; font-weight: 500;
        }
        .input-field:focus { border-color: #11453b; box-shadow: 0 0 0 2px rgba(17, 69, 59, 0.2); }

        .spinner {
            width: 18px; height: 18px; border: 2px solid #ffffff;
            border-bottom-color: transparent; border-radius: 50%;
            display: inline-block; animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>

<body class="min-h-screen">

    <div id="identityOverlay">
        <div class="bg-white w-full max-w-md p-8 rounded-[2.5rem] shadow-2xl border border-gray-100 max-h-[90vh] overflow-y-auto">
            <h2 class="text-2xl font-extrabold text-gray-900 mb-1">Setup Payment Profile</h2>
            <p class="text-xs text-gray-500 mb-6 uppercase tracking-wider font-semibold">Permanently Link M-PESA Channels to your ID</p>
            
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-gray-700 uppercase ml-1">Full Name (As per M-PESA) <span class="text-red-500">*</span></label>
                    <input type="text" id="userName" class="input-field" placeholder="e.g. Peter Kamau">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-700 uppercase ml-1">Notification Email <span class="text-red-500">*</span></label>
                    <input type="email" id="userEmail" class="input-field" placeholder="yourname@gmail.com">
                </div>
                
                <div class="pt-2 border-t border-gray-100">
                    <p class="text-xs font-extrabold text-zinc-400 uppercase tracking-wider mb-3">Authorized M-PESA Numbers (Max 3)</p>
                    
                    <div class="space-y-3">
                        <div>
                            <input type="text" id="userPhone1" class="input-field mono" placeholder="Primary e.g. 0712345678">
                        </div>
                        <div>
                            <input type="text" id="userPhone2" class="input-field mono" placeholder="Backup 2 (Optional)">
                        </div>
                        <div>
                            <input type="text" id="userPhone3" class="input-field mono" placeholder="Backup 3 (Optional)">
                        </div>
                    </div>
                </div>
                
                <button id="saveProfileBtn" class="w-full bg-custom-green text-white font-extrabold py-4 rounded-xl mt-2 hover:opacity-95 transition-all shadow-md uppercase tracking-wider text-sm">
                    Save Profile Permanently
                </button>
            </div>
        </div>
    </div>

    <div class="bg-custom-green text-white py-16 px-4 text-center shadow-lg">
        <h1 class="text-4xl md:text-5xl font-extrabold italic mb-3">Add Funds</h1>
        <p class="uppercase tracking-[4px] text-xs opacity-70">Live Account Balance: <span id="liveBalance" class="font-bold underline text-emerald-400">KES 0.00</span></p>
    </div>

    <div class="max-w-2xl mx-auto px-4 -mt-10 pb-20 space-y-6">
        
        <div id="profileCard" class="bg-white rounded-3xl shadow-xl border border-gray-100 p-6 hidden">
            <div class="flex justify-between items-start border-b border-gray-100 pb-4 mb-4">
                <div>
                    <p class="text-[10px] font-bold text-emerald-600 uppercase tracking-widest">Logged-In Profile</p>
                    <h3 id="cardDispName" class="text-xl font-extrabold text-gray-900 leading-tight">...</h3>
                    <p id="cardDispEmail" class="text-xs text-gray-500 font-medium"></p>
                </div>
                <button onclick="editProfile()" class="text-xs font-bold text-custom-green bg-emerald-50 px-4 py-2 rounded-xl border border-emerald-200/50">
                    Change Numbers
                </button>
            </div>
            <div id="cardDispPhones" class="flex flex-wrap gap-2"></div>
        </div>

        <div id="portalSection" class="bg-white rounded-3xl shadow-xl border border-gray-100 p-8">
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-gray-800 italic">Secure Funding</h2>
                <p class="text-xs text-gray-500 mt-1">Automatic credit active for your registered numbers.</p>
            </div>

            <div class="payment-frame-container">
                <iframe 
                    src="https://paynecta.co.ke/pay/Unasemeje" 
                    class="w-full h-full border-0"
                    id="paymentPortalFrame">
                </iframe>
            </div>
        </div>
    </div>

    <script>
        const overlay = document.getElementById('identityOverlay');
        const saveBtn = document.getElementById('saveProfileBtn');
        const profileCard = document.getElementById('profileCard');
        const cardDispName = document.getElementById('cardDispName');
        const cardDispEmail = document.getElementById('cardDispEmail');
        const cardDispPhones = document.getElementById('cardDispPhones');
        const liveBalance = document.getElementById('liveBalance');

        const API_URL = '/api';
        const token = localStorage.getItem('token');

        // 1. FETCH USER DATA FROM SERVER ON LOAD
        async function loadUserData() {
            if (!token) {
                window.location.href = '/login';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const user = await response.json();

                // Update Balance UI
                liveBalance.innerText = `KES ${Number(user.balance || 0).toLocaleString()}`;

                // Check if payment profile exists on the server
                if (user.paymentPhone1) {
                    overlay.style.display = 'none';
                    profileCard.classList.remove('hidden');
                    
                    cardDispName.innerText = user.paymentProfileName || user.username;
                    cardDispEmail.innerText = user.paymentProfileEmail || user.email;
                    
                    const phones = [user.paymentPhone1, user.paymentPhone2, user.paymentPhone3].filter(Boolean);
                    cardDispPhones.innerHTML = phones.map(p => `
                        <span class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-emerald-50 text-emerald-800 rounded-xl text-xs font-bold font-mono border border-emerald-100">
                            ${p}
                        </span>
                    `).join('');
                } else {
                    overlay.style.display = 'flex';
                }
            } catch (err) {
                console.error("Session error:", err);
            }
        }

        window.onload = loadUserData;

        // 2. SAVE PROFILE TO SERVER (NOT LOCALSTORAGE)
        saveBtn.onclick = async () => {
            const name = document.getElementById('userName').value.trim();
            const email = document.getElementById('userEmail').value.trim();
            const phones = [
                document.getElementById('userPhone1').value.trim(),
                document.getElementById('userPhone2').value.trim(),
                document.getElementById('userPhone3').value.trim()
            ].filter(p => p !== "");

            if (!name || !email || phones.length === 0) {
                alert("Please fill in your name and at least one phone number.");
                return;
            }

            saveBtn.disabled = true;
            saveBtn.innerHTML = `<span class="spinner"></span> Saving to Server...`;

            try {
                const res = await fetch(`${API_URL}/user/update-payment-profile`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ name, email, phones })
                });

                if (res.ok) {
                    window.location.reload();
                } else {
                    alert("Error saving profile. Try again.");
                }
            } catch (err) {
                alert("Network error.");
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = "Save Profile Permanently";
            }
        };

        function editProfile() {
            overlay.style.display = 'flex';
        }

        // Webhook listener - Optional for immediate UI feedback
        window.addEventListener("message", (event) => {
            if (event.data.status === "completed") {
                setTimeout(() => window.location.reload(), 3000);
            }
        });
    </script>
</body>
</html>
