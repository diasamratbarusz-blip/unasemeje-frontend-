<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Funds - Unasemeje</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .bg-custom-green { background-color: #11453b; }
        .btn-custom { background-color: #8da39e; transition: 0.3s; color: white; }
        .btn-custom:hover { background-color: #7a8e89; }
        .btn-custom:disabled { opacity: 0.6; cursor: not-allowed; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Header -->
    <div class="bg-custom-green text-white py-16 px-4 text-center">
        <h1 class="text-4xl italic font-bold mb-2">Effortless.</h1>
        <p class="uppercase tracking-widest text-xs opacity-70">Every Payment, Every Time</p>
    </div>

    <!-- Card Container -->
    <div class="max-w-2xl mx-auto -mt-10 px-4 pb-20">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
            <h2 class="text-xl font-bold text-gray-800 mb-1">Payment Details</h2>
            <div class="w-12 h-1 bg-custom-green mb-8"></div>

            <form id="stkForm" class="space-y-6">
                <!-- Phone Input -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Enter Your Mpesa Phone Number</label>
                    <div class="flex">
                        <span class="inline-flex items-center px-4 rounded-l-md border border-r-0 border-gray-300 bg-gray-50 text-gray-500 text-sm">
                            +254
                        </span>
                        <input type="number" id="phone" required placeholder="Enter Number eg. 0701...."
                            class="flex-1 block w-full px-4 py-3 rounded-none rounded-r-md border border-gray-300 focus:ring-1 focus:ring-teal-900 focus:border-teal-900 sm:text-sm outline-none">
                    </div>
                    <p class="mt-2 text-[11px] text-green-700 font-medium">Enter a valid mpesa phone number eg. 701..... Start without the 0</p>
                </div>

                <!-- Amount Input -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Enter Amount</label>
                    <div class="flex">
                        <span class="inline-flex items-center px-4 rounded-l-md border border-r-0 border-gray-300 bg-gray-50 text-gray-500 text-sm uppercase">
                            KES
                        </span>
                        <input type="number" id="amount" required placeholder="0"
                            class="flex-1 block w-full px-4 py-3 rounded-none rounded-r-md border border-gray-300 focus:ring-1 focus:ring-teal-900 focus:border-teal-900 sm:text-sm outline-none">
                    </div>
                    <p class="mt-2 text-[11px] text-green-700 font-medium">Enter the amount to be paid</p>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submitBtn" class="w-full btn-custom py-4 rounded-xl font-bold text-lg">
                    Send Money
                </button>
            </form>

            <div id="statusBox" class="mt-4 p-4 rounded-lg text-sm hidden text-center"></div>
        </div>
    </div>

    <script>
        const form = document.getElementById('stkForm');
        const btn = document.getElementById('submitBtn');
        const statusBox = document.getElementById('statusBox');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const token = localStorage.getItem('token'); // Get JWT from login
            if (!token) {
                showStatus("Please login first", "red");
                return;
            }

            const phone = document.getElementById('phone').value;
            const amount = document.getElementById('amount').value;

            btn.disabled = true;
            btn.innerText = "Sending STK Push...";
            statusBox.classList.add('hidden');

            try {
                const response = await fetch('/api/paynecta/initialize', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        mobile_number: phone,
                        amount: amount,
                        code: "600" // Default code for M-Pesa STK
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    showStatus("STK Push Sent! Check your phone to enter M-Pesa PIN.", "green");
                } else {
                    showStatus(result.error || result.message || "Failed to initialize payment", "red");
                }
            } catch (err) {
                showStatus("Connection Error: Make sure your server is running", "red");
            } finally {
                btn.disabled = false;
                btn.innerText = "Send Money";
            }
        });

        function showStatus(msg, color) {
            statusBox.innerText = msg;
            statusBox.className = `mt-4 p-4 rounded-lg text-sm text-center ${color === 'red' ? 'bg-red-50 text-red-700 border border-red-200' : 'bg-green-50 text-green-700 border border-green-200'}`;
            statusBox.classList.remove('hidden');
        }
    </script>
</body>
</html>
