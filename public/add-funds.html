<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>Add Funds - Unasemeje</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
    >

    <style>

        body{
            font-family:'Plus Jakarta Sans',sans-serif;
            background:#f5f7fb;
        }

        .bg-custom-green{
            background:#11453b;
        }

        .btn-custom{
            background:#11453b;
            transition:0.3s;
            color:white;
        }

        .btn-custom:hover{
            opacity:0.92;
        }

        .btn-custom:disabled{
            opacity:0.6;
            cursor:not-allowed;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button{
            -webkit-appearance:none;
            margin:0;
        }

        input[type=number]{
            -moz-appearance:textfield;
        }

        .status-success{
            background:#ecfdf5;
            color:#047857;
            border:1px solid #a7f3d0;
        }

        .status-error{
            background:#fef2f2;
            color:#b91c1c;
            border:1px solid #fecaca;
        }

        .status-info{
            background:#eff6ff;
            color:#1d4ed8;
            border:1px solid #bfdbfe;
        }

    </style>

</head>

<body class="min-h-screen">

    <!-- HEADER -->
    <div class="bg-custom-green text-white py-16 px-4 text-center shadow-lg">

        <h1 class="text-4xl md:text-5xl font-extrabold italic mb-3">
            Add Funds
        </h1>

        <p class="uppercase tracking-[4px] text-xs opacity-70">
            Fast & Secure M-PESA Payments
        </p>

    </div>

    <!-- MAIN CARD -->
    <div class="max-w-2xl mx-auto px-4 -mt-10 pb-20">

        <div class="bg-white rounded-3xl shadow-xl border border-gray-100 p-8">

            <!-- TITLE -->
            <div class="mb-8">

                <h2 class="text-2xl font-bold text-gray-800">
                    Payment Details
                </h2>

                <div class="w-16 h-1 bg-custom-green mt-3 rounded-full"></div>

            </div>

            <!-- FORM -->
            <form id="stkForm" class="space-y-6">

                <!-- PHONE -->
                <div>

                    <label
                        class="block text-sm font-semibold text-gray-700 mb-2"
                    >
                        Enter Your M-PESA Number
                    </label>

                    <div class="flex">

                        <span
                            class="inline-flex items-center px-4 rounded-l-xl border border-r-0 border-gray-300 bg-gray-50 text-gray-500 text-sm"
                        >
                            +254
                        </span>

                        <input
                            type="text"
                            id="phone"
                            required
                            autocomplete="off"
                            placeholder="701234567"
                            class="flex-1 w-full px-4 py-4 rounded-r-xl border border-gray-300 focus:ring-2 focus:ring-teal-900 focus:border-teal-900 outline-none text-sm"
                        />

                    </div>

                    <p class="mt-2 text-xs text-green-700 font-medium">
                        Example: 701234567
                    </p>

                </div>

                <!-- AMOUNT -->
                <div>

                    <label
                        class="block text-sm font-semibold text-gray-700 mb-2"
                    >
                        Enter Amount
                    </label>

                    <div class="flex">

                        <span
                            class="inline-flex items-center px-4 rounded-l-xl border border-r-0 border-gray-300 bg-gray-50 text-gray-500 text-sm"
                        >
                            KES
                        </span>

                        <input
                            type="number"
                            id="amount"
                            required
                            min="1"
                            placeholder="100"
                            class="flex-1 w-full px-4 py-4 rounded-r-xl border border-gray-300 focus:ring-2 focus:ring-teal-900 focus:border-teal-900 outline-none text-sm"
                        />

                    </div>

                    <p class="mt-2 text-xs text-green-700 font-medium">
                        Minimum deposit is KES 1
                    </p>

                </div>

                <!-- BUTTON -->
                <button
                    type="submit"
                    id="submitBtn"
                    class="w-full btn-custom py-4 rounded-2xl font-bold text-lg shadow-lg"
                >
                    Send Money
                </button>

            </form>

            <!-- STATUS BOX -->
            <div
                id="statusBox"
                class="mt-6 hidden p-4 rounded-2xl text-sm text-center font-medium"
            ></div>

        </div>

    </div>

    <!-- SCRIPT -->
    <script>

        // =========================
        // ELEMENTS
        // =========================
        const form = document.getElementById('stkForm');

        const btn = document.getElementById('submitBtn');

        const statusBox = document.getElementById('statusBox');

        const phoneInput = document.getElementById('phone');

        const amountInput = document.getElementById('amount');

        // =========================
        // AUTO REMOVE NON-NUMBERS
        // =========================
        phoneInput.addEventListener('input', () => {

            phoneInput.value =
                phoneInput.value.replace(/\D/g, '');

        });

        amountInput.addEventListener('input', () => {

            amountInput.value =
                amountInput.value.replace(/[^\d]/g, '');

        });

        // =========================
        // PAYNECTA STK PUSH
        // =========================
        async function depositNow(amount, phone, token) {

            try {

                const response = await fetch(
                    '/api/paynecta/stkpush',
                    {

                        method: 'POST',

                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },

                        body: JSON.stringify({
                            amount,
                            phone
                        })

                    }
                );

                const data = await response.json();

                console.log("PAYMENT RESPONSE:", data);

                if (response.ok) {

                    showStatus(
                        "STK Push Sent Successfully. Check your phone and enter M-PESA PIN.",
                        "success"
                    );

                    amountInput.value = "";
                    phoneInput.value = "";

                } else {

                    showStatus(
                        data.error ||
                        data.message ||
                        "Payment failed",
                        "error"
                    );
                }

            } catch (error) {

                console.log("PAYMENT ERROR:", error);

                showStatus(
                    "Connection Error: Server unavailable",
                    "error"
                );
            }
        }

        // =========================
        // FORM SUBMIT
        // =========================
        form.addEventListener('submit', async (e) => {

            e.preventDefault();

            const token = localStorage.getItem('token');

            if (!token) {

                showStatus(
                    "Please login first",
                    "error"
                );

                return;
            }

            let phone = phoneInput.value.trim();

            let amount = amountInput.value.trim();

            // REMOVE NON NUMBERS
            phone = phone.replace(/\D/g, '');

            amount = amount.replace(/\D/g, '');

            // FORMAT PHONE
            if (phone.startsWith('0')) {

                phone =
                    '254' + phone.substring(1);
            }

            if (phone.startsWith('7')) {

                phone =
                    '254' + phone;
            }

            // VALIDATE PHONE
            if (!/^2547\d{8}$/.test(phone)) {

                showStatus(
                    "Invalid Safaricom number format",
                    "error"
                );

                return;
            }

            // VALIDATE AMOUNT
            if (
                !amount ||
                Number(amount) < 1
            ) {

                showStatus(
                    "Amount must be greater than 0",
                    "error"
                );

                return;
            }

            // BUTTON LOADING
            btn.disabled = true;

            btn.innerText = "Sending STK Push...";

            showStatus(
                "Please wait while we send the STK Push...",
                "info"
            );

            // SEND PAYMENT
            await depositNow(
                amount,
                phone,
                token
            );

            // RESET BUTTON
            btn.disabled = false;

            btn.innerText = "Send Money";

        });

        // =========================
        // SHOW STATUS
        // =========================
        function showStatus(message, type) {

            statusBox.innerText = message;

            statusBox.classList.remove(
                'hidden',
                'status-success',
                'status-error',
                'status-info'
            );

            if (type === 'success') {

                statusBox.classList.add(
                    'status-success'
                );

            } else if (type === 'error') {

                statusBox.classList.add(
                    'status-error'
                );

            } else {

                statusBox.classList.add(
                    'status-info'
                );
            }
        }

    </script>

</body>
</html>
