<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Funds - UNASEMEJE ø DIA</title>
    <style>
        :root {
            --paynecta-green: #144237;
            --paynecta-bg: #f8f9fa;
            --paynecta-btn: #8ba8a1;
            --border-color: #e0e0e0;
            --success-text: #1e7e34;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--paynecta-bg); 
            margin: 0; 
            padding: 0;
            color: #333;
        }

        /* Top Header Style matched to image */
        .header-section {
            background-color: var(--paynecta-green);
            color: white;
            text-align: center;
            padding: 70px 20px 110px 20px;
        }

        .header-section h1 {
            font-style: italic;
            font-size: 2.3rem;
            margin: 0;
            font-weight: 600;
        }

        .header-section p {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 15px;
            opacity: 0.8;
        }

        /* Card Container */
        .container {
            max-width: 900px;
            margin: -70px auto 50px auto;
            padding: 0 20px;
        }

        .payment-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .payment-card h2 {
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 25px;
            font-weight: 600;
            position: relative;
        }

        /* The green line under "Payment Details" */
        .payment-card h2::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -10px;
            width: 45px;
            height: 4px;
            background-color: var(--paynecta-green);
        }

        /* Input Styling */
        .input-group {
            margin-top: 35px;
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: #222;
        }

        .field-box {
            display: flex;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            transition: border-color 0.3s;
        }

        .field-box:focus-within {
            border-color: var(--paynecta-green);
        }

        .prefix {
            background-color: #f9f9f9;
            padding: 15px 22px;
            border-right: 1px solid var(--border-color);
            color: #666;
            font-size: 1rem;
        }

        input {
            flex: 1;
            border: none;
            padding: 15px;
            font-size: 1.05rem;
            outline: none;
            color: #333;
        }

        .helper-text {
            font-size: 0.78rem;
            margin-top: 10px;
            display: block;
            color: var(--success-text);
        }

        /* Button Styling matched to image */
        .btn-send {
            width: 100%;
            background-color: var(--paynecta-btn);
            color: white;
            border: none;
            padding: 18px;
            font-size: 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            margin-top: 15px;
            transition: background 0.3s;
        }

        .btn-send:hover {
            background-color: #7a948e;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="header-section">
    <h1>Effortless.</h1>
    <p>EVERY PAYMENT, EVERY TIME</p>
</div>

<div class="container">
    <form id="payForm" action="https://paynecta.co.ke/pay/Unasemeje" method="POST" onsubmit="return validatePayment()">
        <div class="payment-card">
            <h2>Payment Details</h2>
            
            <div class="input-group">
                <label>Enter Your Mpesa Phone Number</label>
                <div class="field-box">
                    <span class="prefix">+254</span>
                    <input type="text" id="phone_display" placeholder="Enter Number eg. 0701...." oninput="syncPhone()">
                </div>
                <span class="helper-text">Enter a valid mpesa phone number eg. 701..... Start without the 0</span>
            </div>

            <div class="input-group">
                <label>Enter Amount</label>
                <div class="field-box">
                    <span class="prefix">KES</span>
                    <input type="number" id="amount" name="amount" placeholder="0" min="10">
                </div>
                <span class="helper-text">Enter the amount to be paid</span>
            </div>

            <input type="hidden" name="phone" id="phone_hidden">

            <button type="submit" class="btn-send">Send Money</button>
            
            <a href="/dashboard" class="back-link">← Back to Dashboard</a>
        </div>
    </form>
</div>

<script>
    const token = localStorage.getItem("token");
    const user = JSON.parse(localStorage.getItem("user") || "{}");

    if (!token) window.location.href = "/login";

    // Auto-fill from local storage if user is logged in
    window.onload = () => {
        if (user.phone) {
            let ph = String(user.phone).trim();
            if(ph.startsWith('254')) ph = ph.substring(3);
            if(ph.startsWith('0')) ph = ph.substring(1);
            document.getElementById("phone_display").value = ph;
            syncPhone();
        }
    };

    // Ensures the phone number is always formatted correctly for the payment link
    function syncPhone() {
        let val = document.getElementById("phone_display").value.trim();
        if (val.startsWith('0')) val = val.substring(1);
        // Paynecta usually expects the 0 included or excluded depending on setup
        // We set the hidden field to "07..." format
        document.getElementById("phone_hidden").value = '0' + val;
    }

    function validatePayment() {
        const amt = document.getElementById("amount").value;
        const phone = document.getElementById("phone_display").value;

        if (!amt || amt < 10) {
            alert("Minimum amount is KES 10");
            return false;
        }
        if (!phone) {
            alert("Please enter a valid phone number");
            return false;
        }

        // Final sync before submission
        syncPhone();
        return true;
    }
</script>

</body>
</html>
