<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Add Funds - Unasemeje</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- PAYNECTA WIDGET SCRIPT -->
    <script src="https://paynecta.co.ke/widget.js" data-slug="unasemeje-"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body{
            font-family:'Plus Jakarta Sans',sans-serif;
            background:#f5f7fb;
        }
        .bg-custom-green{
            background:#11453b;
        }
        .status-success{
            background:#ecfdf5;
            color:#047857;
            border:1px solid #a7f3d0;
        }
        .status-error{
            background:#fef2f2;
            color:#b91c1c;
            border:1px solid #fecaca;
        }
        .status-info{
            background:#eff6ff;
            color:#1d4ed8;
            border:1px solid #bfdbfe;
        }
        /* Smooth Responsive Frame Container */
        .payment-frame-container {
            width: 100%;
            height: 650px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            border: 1px solid #e5e7eb;
            background: #ffffff;
        }
    </style>

</head>

<body class="min-h-screen">

    <!-- HEADER -->
    <div class="bg-custom-green text-white py-16 px-4 text-center shadow-lg">
        <h1 class="text-4xl md:text-5xl font-extrabold italic mb-3">
            Add Funds
        </h1>
        <p class="uppercase tracking-[4px] text-xs opacity-70">
            Fast & Secure M-PESA Payments
        </p>
    </div>

    <!-- MAIN CARDS WRAPPER -->
    <div class="max-w-2xl mx-auto px-4 -mt-10 pb-20 space-y-8">
        
        <!-- STATUS BOX & APPROVAL INTERFACE CARD -->
        <div id="statusCard" class="bg-white rounded-3xl shadow-xl border border-gray-100 p-8 hidden">
            <!-- TITLE -->
            <div class="mb-4">
                <h2 class="text-xl font-bold text-gray-800">
                    Transaction Progress
                </h2>
                <div class="w-16 h-1 bg-custom-green mt-2 rounded-full"></div>
            </div>

            <!-- STATUS BOX WITH APPROVAL CTA INTERFACE -->
            <div id="statusBox" class="p-4 rounded-2xl text-sm font-medium flex flex-col items-center justify-center gap-3">
                <span id="statusMessage"></span>
                <button id="approveBtn" class="hidden bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 px-6 rounded-xl transition shadow-md text-sm mt-1"></button>
            </div>
        </div>

        <!-- HOSTED LIVE PAYMENT PORTAL (Using Direct Link) -->
        <div class="bg-white rounded-3xl shadow-xl border border-gray-100 p-8">
            <div class="mb-6 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">
                        Paynecta Checkout Portal
                    </h2>
                    <p class="text-xs text-gray-500 mt-1">Complete your deposit securely inside this checkout portal below.</p>
                    <div class="w-16 h-1 bg-custom-green mt-3 rounded-full"></div>
                </div>

                <!-- MANUAL FALLBACK LINK (Ensures reliability if browser blocks iframe events) -->
                <div id="fallbackWrapper" class="text-right">
                    <p class="text-xs text-gray-400">
                        Don't see the approval button? <br class="hidden md:inline">
                        <button type="button" onclick="triggerManualApprovalBridge()" class="text-teal-800 underline font-semibold">Click here to manually approve</button>
                    </p>
                </div>
            </div>

            <!-- Embedded Payment Frame -->
            <div class="payment-frame-container">
                <iframe 
                    src="https://paynecta.co.ke/pay/unasemeje-" 
                    class="w-full h-full border-0"
                    allow="payment"
                    id="paymentPortalFrame">
                </iframe>
            </div>
        </div>

    </div>

    <!-- SCRIPT LOGIC -->
    <script>
        const statusCard = document.getElementById('statusCard');
        const statusBox = document.getElementById('statusBox');
        const statusMessage = document.getElementById('statusMessage');
        const approveBtn = document.getElementById('approveBtn');
        const iframePortal = document.getElementById('paymentPortalFrame');

        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:3000/api'
            : '/api';

        let pollingInterval = null;
        let lastKnownReference = "PORTAL_TX_" + Date.now();

        // RECOVERY ROUTE BRIDGE (Forces interface open instantly when clicked)
        function triggerManualApprovalBridge() {
            showCustomSuccessWithApproval("0.00", lastKnownReference);
        }

        // COARSE IFRAME STATE DETECTION (Fires fallback hook if user interacts and window switches layout structures)
        if(iframePortal) {
            iframePortal.addEventListener('load', () => {
                try {
                    const currentUrl = iframePortal.contentWindow.location.href;
                    if(currentUrl && (currentUrl.includes('success') || currentUrl.includes('complete'))) {
                        triggerManualApprovalBridge();
                    }
                } catch(e) {
                    console.log("Iframe loaded internal secure payment state mapping.");
                }
            });
        }

        // DYNAMIC MESSAGE EVENT LISTENER (Handles window messages from Paynecta)
        window.addEventListener("message", async (event) => {
            if (event.data) {
                const data = event.data;
                const isPaynectaEvent = event.origin.includes("paynecta.co.ke") || 
                                        (typeof data === 'string' && data.includes('payment')) ||
                                        (data.event && data.event.includes('payment'));

                if (isPaynectaEvent) {
                    const isSuccess = data.event === "payment.completed" || 
                                      data.status === "completed" || 
                                      data.status === "success" ||
                                      data.type === "success";

                    if (isSuccess) {
                        if (pollingInterval) clearInterval(pollingInterval);
                        
                        const finalizedAmount = data.amount || data.transaction_amount || "0.00";
                        if(data.reference || data.transaction_reference) {
                            lastKnownReference = data.reference || data.transaction_reference;
                        }
                        
                        showCustomSuccessWithApproval(finalizedAmount, lastKnownReference);
                    } else if (data.status === "failed" || data.event === "payment.failed") {
                        showStatus("❌ payment link message detected: Transaction was rejected or failed.", "error");
                    }
                }
            }
        });

        // GENERATES APPROVAL ROUTE INTERFACE ON RUNTIME
        function showCustomSuccessWithApproval(amount, reference) {
            statusCard.classList.remove('hidden');
            
            if (amount === "0.00") {
                statusMessage.innerText = `🎉 Payment completed! Click below to approve and immediately verify your deposit.`;
            } else {
                statusMessage.innerText = `🎉 You have successfully deposited KES ${Number(amount).toFixed(2)}! Click below to confirm and apply changes immediately.`;
            }
            
            // Explicitly force removal of hidden properties
            approveBtn.innerText = "Approved";
            approveBtn.style.display = "block";
            approveBtn.classList.remove('hidden');
            
            statusBox.style.display = "flex";
            statusBox.classList.remove('hidden', 'status-error', 'status-info');
            statusBox.classList.add('status-success', 'text-center');

            // Scroll cleanly to display the validation gateway
            statusCard.scrollIntoView({ behavior: 'smooth', block: 'center' });

            // Hardbound execution pathway to process transaction logic to core backend database systems
            approveBtn.onclick = async () => {
                const token = localStorage.getItem('token');
                if (!token) {
                    showStatus("Please login first", "error");
                    return;
                }

                approveBtn.disabled = true;
                approveBtn.innerText = "Updating account...";

                try {
                    // Try checking standard internal status engine first
                    const response = await fetch(`${API_URL}/paynecta/status?transaction_reference=${reference}`, {
                        method: 'GET',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const updateResult = await response.json();

                    if (updateResult.success && updateResult.data?.status === 'completed') {
                        const verifiedAmount = updateResult.data.amount || amount;
                        showStatus(`🎉 Account Balance updated! KES ${verifiedAmount} successfully credited.`, "success");
                        approveBtn.classList.add('hidden');
                        approveBtn.style.display = "none";
                    } else {
                        // Direct Verification Verification Fallback route
                        const manualResponse = await fetch(`${API_URL}/paynecta/credit-verify`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${token}`
                            },
                            body: JSON.stringify({ amount: Number(amount), reference: reference })
                        });
                        const manualResult = await manualResponse.json();

                        if (manualResult.success) {
                            showStatus(`🎉 Account Balance updated! KES ${amount} successfully credited via verification route.`, "success");
                            approveBtn.classList.add('hidden');
                            approveBtn.style.display = "none";
                        } else {
                            showStatus(`🎉 Balance Request Logged: System verification queued for update.`, "info");
                            approveBtn.classList.add('hidden');
                            approveBtn.style.display = "none";
                        }
                    }
                } catch (error) {
                    showStatus("Connection Error processing server approval. Balance sync running in backend.", "error");
                    approveBtn.disabled = false;
                    approveBtn.innerText = "Approved";
                }
            };
        }

        function showStatus(message, type) {
            statusCard.classList.remove('hidden');
            approveBtn.classList.add('hidden'); 
            approveBtn.style.display = "none";
            statusMessage.innerText = message;
            statusBox.style.display = "flex";
            statusBox.classList.remove('hidden', 'status-success', 'status-error', 'status-info');
            statusBox.classList.add(`status-${type}`);
        }
    </script>

</body>
</html>
