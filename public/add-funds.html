<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Add Funds - Unasemeje</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- PAYNECTA WIDGET SCRIPT -->
    <script src="https://paynecta.co.ke/widget.js" data-slug="unasemeje-"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body{
            font-family:'Plus Jakarta Sans',sans-serif;
            background:#f5f7fb;
        }
        .bg-custom-green{
            background:#11453b;
        }
        .status-success{
            background:#ecfdf5;
            color:#047857;
            border:1px solid #a7f3d0;
        }
        .status-error{
            background:#fef2f2;
            color:#b91c1c;
            border:1px solid #fecaca;
        }
        .status-info{
            background:#eff6ff;
            color:#1d4ed8;
            border:1px solid #bfdbfe;
        }
        /* Smooth Responsive Frame Container */
        .payment-frame-container {
            width: 100%;
            height: 650px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            border: 1px solid #e5e7eb;
            background: #ffffff;
        }
        
        /* Spinner for the button */
        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #047857;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>

</head>

<body class="min-h-screen">

    <!-- HEADER -->
    <div class="bg-custom-green text-white py-16 px-4 text-center shadow-lg">
        <h1 class="text-4xl md:text-5xl font-extrabold italic mb-3">
            Add Funds
        </h1>
        <p class="uppercase tracking-[4px] text-xs opacity-70">
            Fast & Secure M-PESA Payments
        </p>
    </div>

    <!-- MAIN CARDS WRAPPER -->
    <div class="max-w-2xl mx-auto px-4 -mt-10 pb-20 space-y-8">
        
        <!-- STATUS BOX & APPROVAL INTERFACE CARD -->
        <div id="statusCard" class="bg-white rounded-3xl shadow-xl border border-gray-100 p-8 hidden">
            <!-- TITLE -->
            <div class="mb-4">
                <h2 class="text-xl font-bold text-gray-800">
                    Transaction Detected
                </h2>
                <div class="w-16 h-1 bg-custom-green mt-2 rounded-full"></div>
            </div>

            <!-- STATUS BOX WITH APPROVAL CTA INTERFACE -->
            <div id="statusBox" class="p-6 rounded-2xl text-sm font-medium flex flex-col items-center justify-center gap-4">
                <div class="text-center">
                    <span id="statusMessage" class="text-lg block mb-2"></span>
                    <p class="text-gray-500 text-xs">Click the button below to finalize and credit your account balance.</p>
                </div>
                <button id="approveBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-10 rounded-xl transition shadow-lg text-base transform active:scale-95">
                    Approve Payment
                </button>
            </div>
        </div>

        <!-- HOSTED LIVE PAYMENT PORTAL -->
        <div class="bg-white rounded-3xl shadow-xl border border-gray-100 p-8">
            <div class="mb-6 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">
                        Paynecta Checkout Portal
                    </h2>
                    <p class="text-xs text-gray-500 mt-1">Enter amount and pay via M-PESA below.</p>
                    <div class="w-16 h-1 bg-custom-green mt-3 rounded-full"></div>
                </div>

                <!-- MANUAL FALLBACK LINK -->
                <div id="fallbackWrapper" class="text-right">
                    <p class="text-xs text-gray-400">
                        Payment complete but no popup? <br>
                        <button type="button" onclick="triggerManualApprovalBridge()" class="text-teal-800 underline font-semibold">Click to manually check</button>
                    </p>
                </div>
            </div>

            <!-- Embedded Payment Frame -->
            <div class="payment-frame-container">
                <iframe 
                    src="https://paynecta.co.ke/pay/unasemeje-" 
                    class="w-full h-full border-0"
                    allow="payment"
                    id="paymentPortalFrame">
                </iframe>
            </div>
        </div>

    </div>

    <!-- SCRIPT LOGIC -->
    <script>
        const statusCard = document.getElementById('statusCard');
        const statusBox = document.getElementById('statusBox');
        const statusMessage = document.getElementById('statusMessage');
        const approveBtn = document.getElementById('approveBtn');

        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:3000/api'
            : '/api';

        let lastKnownReference = null;
        let lastKnownAmount = 0;

        // 1. LISTEN FOR MESSAGES FROM PAYNECTA IFRAME
        window.addEventListener("message", (event) => {
            // Security check: Ensure message comes from Paynecta
            if (!event.origin.includes("paynecta.co.ke")) return;

            const data = event.data;
            console.log("Paynecta Event Received:", data);

            // Check for success status in various possible formats sent by Paynecta
            const isSuccess = data.event === "payment.completed" || 
                              data.status === "completed" || 
                              data.status === "success";

            if (isSuccess) {
                // Extract amount and reference from the iframe message
                lastKnownAmount = data.amount || data.transaction_amount || 0;
                lastKnownReference = data.reference || data.transaction_reference || "REF_" + Date.now();

                // Trigger the Approval Popup
                showApprovalPopup(lastKnownAmount, lastKnownReference);
            }
        });

        // 2. SHOW THE APPROVAL INTERFACE
        function showApprovalPopup(amount, reference) {
            statusCard.classList.remove('hidden');
            statusBox.classList.remove('status-error', 'status-info');
            statusBox.classList.add('status-success');
            
            // Format amount for display
            const displayAmount = amount > 0 ? `KES ${Number(amount).toLocaleString()}` : "your deposit";
            
            statusMessage.innerHTML = `✅ <strong>Success!</strong> You have successfully deposited <strong>${displayAmount}</strong>.`;
            
            // Scroll to the status card so user sees it
            statusCard.scrollIntoView({ behavior: 'smooth', block: 'center' });

            // Setup the Approve Button click handler
            approveBtn.onclick = () => handleFinalApproval(amount, reference);
        }

        // 3. SEND DATA TO BACKEND
        async function handleFinalApproval(amount, reference) {
            const token = localStorage.getItem('token');
            if (!token) {
                showStatus("Error: User session expired. Please login again.", "error");
                return;
            }

            // UI Loading state
            approveBtn.disabled = true;
            approveBtn.innerHTML = `<span class="loader"></span> Processing...`;

            try {
                const response = await fetch(`${API_URL}/paynecta/credit-verify`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ 
                        amount: Number(amount), 
                        reference: reference 
                    })
                });

                const result = await response.json();

                if (result.success) {
                    showStatus(`🎉 Account credited! KES ${amount} has been added to your balance.`, "success");
                    approveBtn.classList.add('hidden');
                } else {
                    showStatus(result.message || "Verification failed. Our team will update it manually.", "info");
                    approveBtn.classList.add('hidden');
                }
            } catch (error) {
                console.error("Approval Error:", error);
                showStatus("Network error. Your balance will be updated automatically shortly.", "error");
                approveBtn.disabled = false;
                approveBtn.innerText = "Retry Approval";
            }
        }

        // Helper to update status message
        function showStatus(message, type) {
            statusCard.classList.remove('hidden');
            statusMessage.innerHTML = message;
            statusBox.classList.remove('status-success', 'status-error', 'status-info');
            statusBox.classList.add(`status-${type}`);
            if(type !== 'success') approveBtn.classList.add('hidden');
        }

        // Manual fallback for users who don't trigger the event
        function triggerManualApprovalBridge() {
            const manualAmt = prompt("Enter the exact amount you paid:");
            if(manualAmt && !isNaN(manualAmt)) {
                showApprovalPopup(manualAmt, "MANUAL_" + Date.now());
            }
        }
    </script>

</body>
</html>
