<script>
    const form = document.getElementById('stkForm');
    const btn = document.getElementById('submitBtn');
    const statusBox = document.getElementById('statusBox');

    // =========================
    // PAYNECTA STK PUSH
    // =========================
    async function depositNow(amount, phone, token) {

        try {

            const response = await fetch('/api/paynecta/stkpush', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    amount,
                    phone
                })
            });

            const data = await response.json();

            console.log(data);

            if (response.ok) {

                showStatus(
                    "STK Push Sent Successfully. Check your phone and enter M-PESA PIN.",
                    "green"
                );

            } else {

                showStatus(
                    data.error || data.message || "Payment failed",
                    "red"
                );
            }

        } catch (error) {

            console.log(error);

            showStatus(
                "Connection Error: Server unavailable",
                "red"
            );
        }
    }

    // =========================
    // FORM SUBMIT
    // =========================
    form.addEventListener('submit', async (e) => {

        e.preventDefault();

        const token = localStorage.getItem('token');

        if (!token) {
            showStatus("Please login first", "red");
            return;
        }

        let phone = document.getElementById('phone').value.trim();
        const amount = document.getElementById('amount').value;

        // REMOVE NON-NUMBERS
        phone = phone.replace(/\D/g, "");

        // FORMAT TO 2547XXXXXXXX
        if (phone.startsWith("0")) {
            phone = "254" + phone.substring(1);
        }

        if (phone.startsWith("7")) {
            phone = "254" + phone;
        }

        // VALIDATION
        if (!/^2547\d{8}$/.test(phone)) {
            showStatus("Invalid Safaricom number format", "red");
            return;
        }

        if (Number(amount) < 1) {
            showStatus("Amount must be greater than 0", "red");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Sending STK Push...";
        statusBox.classList.add('hidden');

        // CALL PAYMENT FUNCTION
        await depositNow(amount, phone, token);

        btn.disabled = false;
        btn.innerText = "Send Money";
    });

    // =========================
    // STATUS BOX
    // =========================
    function showStatus(msg, color) {

        statusBox.innerText = msg;

        statusBox.className =
            `mt-4 p-4 rounded-lg text-sm text-center ${
                color === 'red'
                ? 'bg-red-50 text-red-700 border border-red-200'
                : 'bg-green-50 text-green-700 border border-green-200'
            }`;

        statusBox.classList.remove('hidden');
    }
</script>
