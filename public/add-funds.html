<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Funds - UNASEMEJE ø DIA</title>
    <style>
        :root {
            --paynecta-green: #144237;
            --paynecta-bg: #f8f9fa;
            --paynecta-btn: #8ba8a1;
            --border-color: #e0e0e0;
            --text-gray: #757575;
            --success-green: #28a745;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--paynecta-bg); 
            margin: 0; 
            padding: 0;
            color: #333;
        }

        /* Dark Green Header Area */
        .header-section {
            background-color: var(--paynecta-green);
            color: white;
            text-align: center;
            padding: 60px 20px 100px 20px;
        }

        .header-section h1 {
            font-style: italic;
            font-size: 2.2rem;
            margin: 0;
            font-weight: 600;
        }

        .header-section p {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            margin-top: 15px;
            opacity: 0.9;
        }

        /* Form Container Card */
        .container {
            max-width: 900px;
            margin: -60px auto 40px auto;
            padding: 0 20px;
        }

        .payment-card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .payment-card h2 {
            font-size: 1.4rem;
            margin-top: 0;
            margin-bottom: 30px;
            font-weight: 600;
            position: relative;
        }

        .payment-card h2::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -8px;
            width: 40px;
            height: 3px;
            background-color: var(--paynecta-green);
        }

        /* Inputs */
        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: #444;
        }

        .field-wrapper {
            display: flex;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
            transition: border 0.3s;
        }

        .field-wrapper:focus-within {
            border-color: var(--paynecta-green);
        }

        .prefix {
            background-color: #fcfcfc;
            padding: 14px 20px;
            border-right: 1px solid var(--border-color);
            color: #666;
            font-size: 0.95rem;
            min-width: 50px;
            text-align: center;
        }

        input {
            flex: 1;
            border: none;
            padding: 14px 15px;
            font-size: 1rem;
            outline: none;
            color: #333;
        }

        input::placeholder {
            color: #aaa;
        }

        .helper-text {
            font-size: 0.75rem;
            margin-top: 8px;
            display: block;
        }

        .green-text { color: var(--success-green); }

        /* Submit Button */
        .btn-send {
            width: 100%;
            background-color: var(--paynecta-btn);
            color: white;
            border: none;
            padding: 18px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            margin-top: 10px;
            transition: opacity 0.3s;
        }

        .btn-send:hover {
            opacity: 0.9;
        }

        /* Hidden Frame for background processing */
        #hiddenPayFrame {
            display: none;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: var(--text-gray);
            text-decoration: none;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<div class="header-section">
    <h1>Effortless.</h1>
    <p>EVERY PAYMENT, EVERY TIME</p>
</div>

<div class="container">
    <div class="payment-card">
        <h2>Payment Details</h2>
        
        <div class="input-group">
            <label>Enter Your Mpesa Phone Number</label>
            <div class="field-wrapper">
                <span class="prefix">+254</span>
                <input type="text" id="phone" placeholder="Enter Number eg. 0701....">
            </div>
            <span class="helper-text green-text">Enter a valid mpesa phone number eg. 701..... Start without the 0</span>
        </div>

        <div class="input-group">
            <label>Enter Amount</label>
            <div class="field-wrapper">
                <span class="prefix">KES</span>
                <input type="number" id="amount" placeholder="0" min="10">
            </div>
            <span class="helper-text green-text">Enter the amount to be paid</span>
        </div>

        <button type="button" class="btn-send" onclick="processPayment()">Send Money</button>
        
        <a href="/dashboard" class="back-link">Return to Dashboard</a>
    </div>
</div>

<iframe id="hiddenPayFrame" name="hiddenPayFrame"></iframe>

<script>
    const token = localStorage.getItem("token");
    const user = JSON.parse(localStorage.getItem("user") || "{}");

    if (!token) window.location.href = "/login";

    // Auto-fill phone if available in session
    if (user.phone) {
        let ph = String(user.phone).trim();
        if(ph.startsWith('254')) ph = ph.substring(3);
        if(ph.startsWith('0')) ph = ph.substring(1);
        document.getElementById("phone").value = ph;
    }

    function processPayment() {
        const amt = document.getElementById("amount").value;
        let phone = document.getElementById("phone").value.trim();
        const btn = document.querySelector(".btn-send");

        if (!amt || amt < 10) {
            alert("Please enter a valid amount (Minimum KES 10)");
            return;
        }

        // Standardize phone for Paynecta link
        if (phone.startsWith('0')) phone = phone.substring(1);
        
        btn.innerText = "Processing...";
        btn.disabled = true;

        // Construct the exact URL that the Paynecta page uses
        // This sends the data "behind the scenes" to the payment link
        const targetUrl = `https://paynecta.co.ke/pay/Unasemeje?amount=${amt}&phone=0${phone}`;

        // Load the link into the hidden frame
        document.getElementById("hiddenPayFrame").src = targetUrl;

        // Feedback to user
        setTimeout(() => {
            alert("Payment initiated! Check your phone for the M-Pesa prompt.");
            btn.innerText = "Send Money";
            btn.disabled = false;
        }, 2000);
    }
</script>

</body>
</html>
