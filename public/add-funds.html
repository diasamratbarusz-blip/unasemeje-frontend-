<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Add Funds - Unasemeje</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>

        body{
            font-family:'Plus Jakarta Sans',sans-serif;
            background:#f5f7fb;
        }

        .bg-custom-green{
            background:#11453b;
        }

        .btn-custom{
            background:#11453b;
            transition:0.3s;
            color:white;
        }

        .btn-custom:hover{
            opacity:0.92;
        }

        .btn-custom:disabled{
            opacity:0.6;
            cursor:not-allowed;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button{
            -webkit-appearance:none;
            margin:0;
        }

        input[type=number]{
            -moz-appearance:textfield;
        }

    </style>
</head>

<body class="min-h-screen">

    <!-- HEADER -->
    <div class="bg-custom-green text-white py-16 px-4 text-center shadow-lg">

        <h1 class="text-4xl md:text-5xl font-extrabold italic mb-3">
            Add Funds
        </h1>

        <p class="uppercase tracking-[4px] text-xs opacity-70">
            Fast & Secure M-PESA Payments
        </p>

    </div>

    <!-- CARD -->
    <div class="max-w-2xl mx-auto px-4 -mt-10 pb-20">

        <div class="bg-white rounded-3xl shadow-xl border border-gray-100 p-8">

            <div class="mb-8">

                <h2 class="text-2xl font-bold text-gray-800">
                    Payment Details
                </h2>

                <div class="w-16 h-1 bg-custom-green mt-3 rounded-full"></div>

            </div>

            <!-- FORM -->
            <form id="stkForm" class="space-y-6">

                <!-- PHONE -->
                <div>

                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        Enter Your M-PESA Number
                    </label>

                    <div class="flex">

                        <span class="inline-flex items-center px-4 rounded-l-xl border border-r-0 border-gray-300 bg-gray-50 text-gray-500 text-sm">
                            +254
                        </span>

                        <input
                            type="text"
                            id="phone"
                            required
                            placeholder="701234567"
                            class="flex-1 w-full px-4 py-4 rounded-r-xl border border-gray-300 focus:ring-2 focus:ring-teal-900 focus:border-teal-900 outline-none text-sm"
                        />

                    </div>

                    <p class="mt-2 text-xs text-green-700 font-medium">
                        Example: 701234567
                    </p>

                </div>

                <!-- AMOUNT -->
                <div>

                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        Enter Amount
                    </label>

                    <div class="flex">

                        <span class="inline-flex items-center px-4 rounded-l-xl border border-r-0 border-gray-300 bg-gray-50 text-gray-500 text-sm">
                            KES
                        </span>

                        <input
                            type="text"
                            id="amount"
                            required
                            placeholder="100"
                            class="flex-1 w-full px-4 py-4 rounded-r-xl border border-gray-300 focus:ring-2 focus:ring-teal-900 focus:border-teal-900 outline-none text-sm"
                        />

                    </div>

                    <p class="mt-2 text-xs text-green-700 font-medium">
                        Minimum deposit is KES 1
                    </p>

                </div>

                <!-- BUTTON -->
                <button
                    type="submit"
                    id="submitBtn"
                    class="w-full btn-custom py-4 rounded-2xl font-bold text-lg shadow-lg"
                >
                    Send Money
                </button>

            </form>

            <!-- STATUS -->
            <div
                id="statusBox"
                class="mt-6 hidden p-4 rounded-2xl text-sm text-center"
            ></div>

        </div>

    </div>

    <!-- SCRIPT -->
    <script>

        const form = document.getElementById('stkForm');
        const btn = document.getElementById('submitBtn');
        const statusBox = document.getElementById('statusBox');

        // =========================
        // PAYNECTA STK PUSH
        // =========================
        async function depositNow(amount, phone, token) {

            try {

                const response = await fetch('/api/paynecta/stkpush', {

                    method: 'POST',

                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },

                    body: JSON.stringify({
                        amount,
                        phone
                    })

                });

                const data = await response.json();

                console.log("PAYMENT RESPONSE:", data);

                if (response.ok) {

                    showStatus(
                        "STK Push Sent Successfully. Check your phone and enter M-PESA PIN.",
                        "green"
                    );

                    document.getElementById('amount').value = "";
                    document.getElementById('phone').value = "";

                } else {

                    showStatus(
                        data.error ||
                        data.message ||
                        "Payment failed",
                        "red"
                    );
                }

            } catch (error) {

                console.log("PAYMENT ERROR:", error);

                showStatus(
                    "Connection Error: Server unavailable",
                    "red"
                );
            }
        }

        // =========================
