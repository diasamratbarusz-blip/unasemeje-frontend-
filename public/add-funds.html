<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Funds - UNASEMEJE ø DIA</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --header-bg: #144237; 
            --primary-btn: #8ba8a1; 
            --input-border: #e0e0e0;
            --text-main: #333;
        }

        body { font-family: sans-serif; background: var(--bg-color); margin: 0; padding: 0; overflow-x: hidden; }

        .header-banner { background-color: var(--header-bg); padding: 40px 20px; text-align: center; color: white; }
        .header-banner h1 { font-style: italic; margin: 0; font-size: 2rem; }

        .container { max-width: 600px; margin: -40px auto 40px auto; padding: 0 15px; }

        .payment-card { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.5s ease;
        }

        /* Hiding the iframe until payment is triggered */
        #paymentFrameContainer {
            display: none;
            width: 100%;
            height: 600px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--input-border);
            margin-top: 20px;
        }

        iframe { width: 100%; height: 100%; border: none; }

        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        
        .input-wrapper {
            display: flex;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            background: #fff;
        }

        .prefix { padding: 12px; background: #eee; border-right: 1px solid #ddd; font-size: 0.9rem; }
        input { width: 100%; padding: 12px; border: none; outline: none; font-size: 1rem; }

        .btn { 
            width: 100%; padding: 16px; border: none; border-radius: 8px; 
            cursor: pointer; font-size: 1rem; font-weight: bold; background: var(--primary-btn); color: white;
        }

        .loading-dots:after { content: ' .'; animation: dots 1s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 40% { color: white; text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 60% { text-shadow: .5em 0 0 white, 1em 0 0 rgba(0,0,0,0); } 80%, 100% { text-shadow: .5em 0 0 white, 1em 0 0 white; } }
    </style>
</head>
<body>

<div class="header-banner">
    <h1>Fast.</h1>
    <p>SECURE WALLET DEPOSIT</p>
</div>

<div class="container">
    <div class="payment-card" id="mainCard">
        <div id="formSection">
            <h2 style="margin-top:0;">Deposit Details</h2>
            <p style="font-size: 0.8rem; color: #666;">Enter amount to start secure checkout.</p>

            <div class="input-group">
                <label>Amount (KES)</label>
                <div class="input-wrapper">
                    <span class="prefix">KES</span>
                    <input type="number" id="amount" placeholder="e.g. 500" min="10">
                </div>
            </div>

            <button class="btn" id="payBtn" onclick="startSilentPayment()">Initialize Secure Payment</button>
        </div>

        <div id="paymentFrameContainer">
            <div style="text-align: center; padding: 10px; background: #144237; color: white; font-size: 0.8rem;">
                Secure Connection Established <span class="loading-dots"></span>
            </div>
            <iframe id="paynectaFrame" src=""></iframe>
        </div>

        <div style="text-align: center; margin-top: 20px;">
            <a href="/dashboard" style="color: #999; text-decoration: none; font-size: 0.8rem;">← Return to Dashboard</a>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem("token");
    const user = JSON.parse(localStorage.getItem("user") || "{}");

    if (!token) window.location.href = "/login";

    function startSilentPayment() {
        const amt = document.getElementById("amount").value;
        const btn = document.getElementById("payBtn");
        const formSection = document.getElementById("formSection");
        const frameContainer = document.getElementById("paymentFrameContainer");
        const iframe = document.getElementById("paynectaFrame");

        if (!amt || amt < 10) {
            alert("Minimum deposit is 10 KES");
            return;
        }

        btn.innerHTML = "Opening Secure Channel...";
        btn.disabled = true;

        // Construct the link with the amount pre-filled
        // We use the user's phone from localStorage so the Paynecta page recognizes them
        const phone = user.phone || "";
        const basePayUrl = "https://paynecta.co.ke/pay/Unasemeje";
        const finalUrl = `${basePayUrl}?amount=${amt}&phone=${phone}`;

        // SILENT TRANSITION
        setTimeout(() => {
            formSection.style.display = "none"; // Hide the form
            frameContainer.style.display = "block"; // Show the iframe
            iframe.src = finalUrl; // Load Paynecta inside your site
        }, 800);
    }
</script>

</body>
</html>
