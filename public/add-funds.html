<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paynecta - Effortless Payments</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus+Jakarta+Sans', sans-serif; }
        .bg-custom-green { background-color: #11453b; }
        .btn-custom { background-color: #8da39e; transition: 0.3s; }
        .btn-custom:hover { background-color: #7a8e89; }
        .input-focus:focus { outline: none; border-color: #11453b; ring: 1px #11453b; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- Header Section -->
    <div class="bg-custom-green text-white py-16 px-4 text-center">
        <h1 class="text-4xl italic font-bold mb-2">Effortless.</h1>
        <p class="uppercase tracking-widest text-sm opacity-80">Every Payment, Every Time</p>
    </div>

    <!-- Payment Card -->
    <div class="max-w-2xl mx-auto -mt-10 px-4 pb-12">
        <div class="bg-white rounded-2xl shadow-xl p-8">
            <h2 class="text-xl font-bold text-gray-800 mb-1">Payment Details</h2>
            <div class="w-12 h-1 bg-custom-green mb-8"></div>

            <form id="paymentForm" class="space-y-6">
                <!-- Phone Number -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Enter Your Mpesa Phone Number</label>
                    <div class="flex">
                        <span class="inline-flex items-center px-4 rounded-l-md border border-r-0 border-gray-300 bg-gray-50 text-gray-500 text-sm">
                            +254
                        </span>
                        <input type="number" id="phone" name="phone" required placeholder="Enter Number eg. 0701...."
                            class="flex-1 min-w-0 block w-full px-3 py-3 rounded-none rounded-r-md border border-gray-300 text-gray-900 focus:ring-1 focus:ring-teal-900 focus:border-teal-900 sm:text-sm">
                    </div>
                    <p class="mt-2 text-xs text-green-600 font-medium">Enter a valid mpesa phone number eg. 701..... Start without the 0</p>
                </div>

                <!-- Amount -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Enter Amount</label>
                    <div class="flex">
                        <span class="inline-flex items-center px-4 rounded-l-md border border-r-0 border-gray-300 bg-gray-50 text-gray-500 text-sm">
                            KES
                        </span>
                        <input type="number" id="amount" name="amount" required placeholder="0"
                            class="flex-1 min-w-0 block w-full px-3 py-3 rounded-none rounded-r-md border border-gray-300 text-gray-900 focus:ring-1 focus:ring-teal-900 focus:border-teal-900 sm:text-sm">
                    </div>
                    <p class="mt-2 text-xs text-green-600 font-medium">Enter the amount to be paid</p>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submitBtn" class="w-full btn-custom text-white py-4 rounded-xl font-bold text-lg shadow-sm">
                    Send Money
                </button>
            </form>

            <!-- Status Message -->
            <div id="responseMsg" class="mt-4 text-center hidden p-3 rounded-lg"></div>
        </div>
    </div>

    <script>
        const paymentForm = document.getElementById('paymentForm');
        const submitBtn = document.getElementById('submitBtn');
        const responseMsg = document.getElementById('responseMsg');

        paymentForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Form data
            const phone = document.getElementById('phone').value;
            const amount = document.getElementById('amount').value;

            // UI Feedback
            submitBtn.disabled = true;
            submitBtn.innerText = "Processing...";
            responseMsg.classList.add('hidden');

            try {
                // Change the URL '/stkpush' to match your server.js route
                const response = await fetch('/stkpush', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        phone: phone.startsWith('0') ? '254' + phone.substring(1) : '254' + phone,
                        amount: amount 
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    responseMsg.innerText = "Check your phone to enter M-Pesa PIN";
                    responseMsg.className = "mt-4 text-center p-3 rounded-lg bg-green-100 text-green-700";
                } else {
                    responseMsg.innerText = data.message || "Something went wrong";
                    responseMsg.className = "mt-4 text-center p-3 rounded-lg bg-red-100 text-red-700";
                }
            } catch (error) {
                responseMsg.innerText = "Server connection error";
                responseMsg.className = "mt-4 text-center p-3 rounded-lg bg-red-100 text-red-700";
            } finally {
                responseMsg.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.innerText = "Send Money";
            }
        });
    </script>
</body>
</html>
