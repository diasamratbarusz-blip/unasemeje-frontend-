<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Funds - Unasemeje</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://paynecta.co.ke/widget.js" data-slug="unasemeje-"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f0f2f5; }
        .bg-custom-green { background: #11453b; }
        
        /* Scanner Visuals */
        .scanner-container {
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }
        .scanner-active {
            border-color: #10b981;
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.2);
        }
        
        .payment-frame-container {
            width: 100%; height: 680px; border-radius: 28px; overflow: hidden;
            background: #ffffff; border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* Success Animation */
        .check-glow {
            animation: glow 2s infinite;
        }
        @keyframes glow {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .loader-spin {
            width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%; border-top-color: #fff; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

<body class="min-h-screen">

    <div class="bg-custom-green text-white py-12 px-4 text-center">
        <h1 class="text-3xl font-extrabold mb-2">Add Funds</h1>
        <div id="scannerStatus" class="inline-flex items-center gap-2 bg-black/20 px-4 py-1 rounded-full border border-white/10">
            <span class="h-2 w-2 bg-emerald-400 rounded-full animate-pulse"></span>
            <span class="text-[10px] uppercase tracking-widest font-bold">Deep Scanner Active</span>
        </div>
    </div>

    <div class="max-w-2xl mx-auto px-4 -mt-8 pb-20 space-y-6">
        
        <!-- SCANNED INFORMATION RESULT CARD (Hidden by default) -->
        <div id="resultCard" class="bg-white rounded-[2rem] shadow-2xl p-8 hidden border-2 border-emerald-500 transform transition-all animate-bounce-short">
            <div class="text-center">
                <div class="w-16 h-16 bg-emerald-500 rounded-full flex items-center justify-center mx-auto mb-4 check-glow">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                </div>
                
                <h2 class="text-2xl font-black text-gray-900 mb-1">Payment Scanned!</h2>
                <p class="text-gray-500 text-sm mb-6">Confirm the details below to credit your account.</p>

                <div class="grid grid-cols-2 gap-3 mb-6">
                    <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100 text-left">
                        <span class="text-[10px] text-gray-400 uppercase font-bold">Amount</span>
                        <p id="displayAmount" class="text-xl font-black text-emerald-700">KES 0.00</p>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100 text-left">
                        <span class="text-[10px] text-gray-400 uppercase font-bold">Reference</span>
                        <p id="displayRef" class="text-sm font-mono font-bold text-gray-700 break-all">---</p>
                    </div>
                </div>

                <button id="approveBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-3">
                    <span class="text-lg">APPROVE & SYNC BALANCE</span>
                </button>
            </div>
        </div>

        <!-- PORTAL CONTAINER -->
        <div class="bg-white rounded-[2rem] shadow-xl overflow-hidden scanner-container" id="mainScannerContainer">
            <div class="p-5 border-b border-gray-50 flex justify-between items-center bg-white/50">
                <div class="flex items-center gap-3">
                    <div class="p-2 bg-emerald-50 rounded-lg">
                        <svg class="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                    </div>
                    <p class="text-sm font-bold text-gray-700">M-PESA Secure Checkout</p>
                </div>
                
                <!-- FAIL-SAFE BUTTON -->
                <button onclick="forceScan()" class="text-[10px] font-bold text-emerald-700 hover:text-emerald-900 underline flex items-center gap-1">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    NOT SCANNING? CLICK HERE
                </button>
            </div>

            <div class="payment-frame-container">
                <iframe 
                    src="https://paynecta.co.ke/pay/unasemeje-" 
                    class="w-full h-full border-0"
                    id="payPortal"
                    allow="payment">
                </iframe>
            </div>
        </div>
    </div>

    <script>
        const resultCard = document.getElementById('resultCard');
        const displayAmount = document.getElementById('displayAmount');
        const displayRef = document.getElementById('displayRef');
        const approveBtn = document.getElementById('approveBtn');
        const mainContainer = document.getElementById('mainScannerContainer');

        const API_URL = '/api'; // Adjusted for your production environment

        let capturedData = {
            amount: 0,
            reference: "",
            status: "pending"
        };

        // 1. THE DEEP SCANNER: Listens for any cross-domain messages
        window.addEventListener("message", (event) => {
            // Log for debugging (you can see this in Chrome Inspect > Console)
            console.log("Scanner Pulse Detected:", event.data);

            const data = event.data;
            if (!data) return;

            // SMART PARSING: Check for success keywords or specific M-PESA patterns (UET...)
            const isSuccess = JSON.stringify(data).toLowerCase().includes('success') || 
                              JSON.stringify(data).toLowerCase().includes('completed') ||
                              (data.reference && data.reference.startsWith('UE'));

            if (isSuccess) {
                processScannedData(data);
            }
        });

        // 2. PROCESS SCANNED DATA
        function processScannedData(data) {
            // Extract values using multiple possible keys sent by gateways
            capturedData.amount = data.amount || data.transaction_amount || data.total || 0;
            capturedData.reference = data.reference || data.transaction_reference || data.tx_ref || "MANUAL-SYNC";
            
            // Show result
            displayAmount.innerText = `KES ${Number(capturedData.amount).toLocaleString()}`;
            displayRef.innerText = capturedData.reference;

            resultCard.classList.remove('hidden');
            mainContainer.classList.add('scanner-active');
            
            // Smooth scroll to results
            resultCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // 3. FORCE SCAN (The Fail-safe if postMessage fails)
        async function forceScan() {
            const btn = event.target;
            btn.innerText = "SCANNING...";
            
            // Wait 1 second to simulate scan
            setTimeout(() => {
                // If we don't have auto-data, we try to fetch from your backend "Status Check"
                // For this example, we show the card so the user can sync
                if(capturedData.reference === "") {
                    processScannedData({ amount: 0, reference: "REF_REQUIRED" });
                    displayRef.innerHTML = '<span class="text-red-500">Scanning failed. Click Approve to try Server Sync.</span>';
                }
                btn.innerText = "SCAN COMPLETE";
            }, 1000);
        }

        // 4. APPROVAL & BACKEND SYNC
        approveBtn.onclick = async () => {
            const token = localStorage.getItem('token');
            if (!token) { alert("Session expired. Please login."); return; }

            approveBtn.disabled = true;
            approveBtn.innerHTML = `<div class="loader-spin"></div> UPDATING BALANCE...`;

            try {
                const response = await fetch(`${API_URL}/paynecta/credit-verify`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ 
                        amount: Number(capturedData.amount), 
                        reference: capturedData.reference 
                    })
                });

                const result = await response.json();

                if (result.success) {
                    approveBtn.innerHTML = `DONE! KES ${capturedData.amount} ADDED`;
                    approveBtn.classList.replace('bg-emerald-600', 'bg-gray-900');
                    setTimeout(() => window.location.reload(), 2000);
                } else {
                    alert(result.message || "Balance update pending. Please wait 1 minute.");
                    approveBtn.disabled = false;
                    approveBtn.innerHTML = "RETRY APPROVAL";
                }
            } catch (err) {
                alert("Network error. Your balance will update automatically shortly.");
                approveBtn.disabled = false;
                approveBtn.innerHTML = "RETRY APPROVAL";
            }
        };
    </script>

</body>
</html>
