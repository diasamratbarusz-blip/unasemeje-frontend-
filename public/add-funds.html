<script>
    const form = document.getElementById('stkForm');
    const btn = document.getElementById('submitBtn');
    const statusBox = document.getElementById('statusBox');

    // =========================
    // PAYNECTA STK PUSH
    // =========================
    async function depositNow(amount, phone, token) {

        try {

            const response = await fetch('/api/paynecta/stkpush', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    amount,
                    phone
                })
            });

            const data = await response.json();

            console.log("PAYMENT RESPONSE:", data);

            if (response.ok) {

                showStatus(
                    "STK Push Sent Successfully. Check your phone and enter M-PESA PIN.",
                    "green"
                );

                // OPTIONAL AUTO CLEAR
                document.getElementById('amount').value = "";
                document.getElementById('phone').value = "";

            } else {

                showStatus(
                    data.error ||
                    data.message ||
                    "Payment failed",
                    "red"
                );
            }

        } catch (error) {

            console.log("PAYMENT ERROR:", error);

            showStatus(
                "Connection Error: Server unavailable",
                "red"
            );
        }
    }

    // =========================
    // FORM SUBMIT
    // =========================
    form.addEventListener('submit', async (e) => {

        e.preventDefault();

        const token = localStorage.getItem('token');

        // LOGIN CHECK
        if (!token) {

            showStatus(
                "Please login first",
                "red"
            );

            return;
        }

        // GET VALUES
        let phone = document
            .getElementById('phone')
            .value
            .trim();

        let amount = document
            .getElementById('amount')
            .value
            .trim();

        // REMOVE NON-NUMBERS
        phone = phone.replace(/\D/g, "");
        amount = amount.replace(/\D/g, "");

        // FORMAT PHONE TO 2547XXXXXXXX
        if (phone.startsWith("0")) {
            phone = "254" + phone.substring(1);
        }

        if (phone.startsWith("7")) {
            phone = "254" + phone;
        }

        // PHONE VALIDATION
        if (!/^2547\d{8}$/.test(phone)) {

            showStatus(
                "Invalid Safaricom number format",
                "red"
            );

            return;
        }

        // AMOUNT VALIDATION
        if (!amount || Number(amount) < 1) {

            showStatus(
                "Amount must be greater than 0",
                "red"
            );

            return;
        }

        if (Number(amount) > 150000) {

            showStatus(
                "Maximum amount exceeded",
                "red"
            );

            return;
        }

        // BUTTON LOADING
        btn.disabled = true;
        btn.innerText = "Sending STK Push...";

        statusBox.classList.add('hidden');

        // SEND PAYMENT
        await depositNow(amount, phone, token);

        // RESET BUTTON
        btn.disabled = false;
        btn.innerText = "Send Money";
    });

    // =========================
    // STATUS BOX
    // =========================
    function showStatus(msg, color) {

        statusBox.innerText = msg;

        statusBox.className =
            `mt-4 p-4 rounded-lg text-sm text-center ${
                color === 'red'
                ? 'bg-red-50 text-red-700 border border-red-200'
                : 'bg-green-50 text-green-700 border border-green-200'
            }`;

        statusBox.classList.remove('hidden');
    }

    // =========================
    // AUTO FORMAT PHONE INPUT
    // =========================
    document.getElementById('phone')
        .addEventListener('input', function () {

            this.value = this.value.replace(/\D/g, "");
        });

    // =========================
    // AUTO FORMAT AMOUNT INPUT
    // =========================
    document.getElementById('amount')
        .addEventListener('input', function () {

            this.value = this.value.replace(/\D/g, "");
        });
</script>
