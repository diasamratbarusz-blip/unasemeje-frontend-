<a href="https://paynecta.co.ke/pay/Unasemeje" target="_blank" class="btn-link-payment" id="securePayLink">
    <i class="fas fa-external-link-alt"></i> STK Delayed? Pay via Secure Web Link Instead
</a>

<script>
    const API_URL = "/api"; 
    let pollingInterval = null;

    // 1. Sync User Balance
    async function sync() {
        const token = localStorage.getItem("token");
        if(!token) return;
        
        try {
            const res = await fetch(`${API_URL}/services`, { 
                headers: { "Authorization": `Bearer ${token}` } 
            });
            const sessionBalance = localStorage.getItem("balance");
            if (sessionBalance !== null && document.activeElement !== document.getElementById("depositBtn")) {
                document.getElementById("userBalance").innerText = Number(sessionBalance).toLocaleString('en-US', {minimumFractionDigits: 2});
            }
        } catch (e) { console.error("Balance sync failed"); }
    }

    // 2. STK Push Initiation
    async function initiateSTK() {
        const phone = document.getElementById("phone").value;
        const amount = document.getElementById("amount").value;
        const btn = document.getElementById("depositBtn");
        const loader = document.getElementById("loader");
        const btnText = document.getElementById("btnText");
        const status = document.getElementById("statusMsg");
        const fallbackBtn = document.getElementById("securePayLink");
        const token = localStorage.getItem("token");

        if(!phone || phone.length < 10) return alert("Please enter a valid M-Pesa number");
        if(!amount || amount < 10) return alert("Minimum deposit is KES 10");

        if(pollingInterval) clearInterval(pollingInterval);

        // UI State: Loading
        btn.disabled = true;
        loader.style.display = "block";
        btnText.innerText = "Requesting Prompt...";
        status.style.display = "none";

        try {
            const res = await fetch(`${API_URL}/paynecta/initialize`, {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json", 
                    "Authorization": `Bearer ${token}` 
                },
                body: JSON.stringify({ 
                    code: "STK",
                    amount: amount,
                    mobile_number: phone
                })
            });

            const data = await res.json();

            if(res.ok && data.success) {
                status.style.display = "block";
                status.style.background = "rgba(16, 185, 129, 0.1)";
                status.style.color = "#10b981";
                status.innerHTML = "<b>✅ Prompt Sent!</b> Enter your PIN on your phone.";
                
                if(data.data && data.data.transaction_reference) {
                    startStatusPolling(data.data.transaction_reference, token);
                }
            } else {
                throw new Error(data.message || "STK Service unavailable.");
            }
        } catch (err) {
            status.style.display = "block";
            status.style.background = "rgba(239, 68, 68, 0.1)";
            status.style.color = "#ef4444";
            status.innerText = "❌ " + err.message;
            
            // Show fallback link prominently on failure
            fallbackBtn.style.display = "flex";
            fallbackBtn.style.borderColor = "#7c3aed";
            
            resetUI();
        }
    }

    // 3. Polling for payment confirmation
    function startStatusPolling(reference, token) {
        const status = document.getElementById("statusMsg");
        let attempts = 0;

        pollingInterval = setInterval(async () => {
            attempts++;
            if(attempts > 15) { // ~2.5 minutes
                clearInterval(pollingInterval);
                status.innerText = "⏳ Polling timed out. Refresh if you completed the payment.";
                resetUI();
                return;
            }

            try {
                const res = await fetch(`${API_URL}/paynecta/status?transaction_reference=${reference}`, {
                    headers: { "Authorization": `Bearer ${token}` }
                });
                const checkData = await res.json();

                if (checkData.success && checkData.data.status === "completed") {
                    clearInterval(pollingInterval);
                    status.innerHTML = "<b>🎉 Success!</b> Credited KES " + checkData.data.amount;
                    sync(); // Refresh balance
                    resetUI();
                } else if (checkData.success && (checkData.data.status === "failed")) {
                    clearInterval(pollingInterval);
                    status.innerText = "❌ Transaction failed.";
                    resetUI();
                }
            } catch (e) { console.error("Status check failed"); }
        }, 10000);
    }

    function resetUI() {
        document.getElementById("depositBtn").disabled = false;
        document.getElementById("loader").style.display = "none";
        document.getElementById("btnText").innerText = "DEPOSIT NOW";
    }

    // Initialize
    sync();
    setInterval(sync, 20000);
</script>
