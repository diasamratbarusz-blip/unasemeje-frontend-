<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Order Confirmed | UNASEMEJE ø DIA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7c3aed;
            --secondary: #10b981;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; }
        body { 
            margin: 0; background: var(--bg-dark); color: var(--text-main); 
            font-family: 'Plus Jakarta Sans', sans-serif; display: flex; 
            justify-content: center; align-items: center; min-height: 100vh;
        }

        .success-card {
            background: var(--card-bg);
            width: 90%;
            max-width: 450px;
            padding: 40px 30px;
            border-radius: 30px;
            text-align: center;
            border: 1px solid #334155;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .check-icon {
            width: 80px;
            height: 80px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--secondary);
            font-size: 40px;
            line-height: 80px;
            border-radius: 50%;
            margin: 0 auto 20px;
            border: 2px solid var(--secondary);
        }

        h1 { font-weight: 800; font-size: 24px; margin-bottom: 10px; }
        p { color: var(--text-dim); font-size: 14px; margin-bottom: 30px; }

        .receipt-box {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 15px;
            padding: 20px;
            text-align: left;
            margin-bottom: 30px;
            border: 1px dashed #334155;
        }

        .receipt-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .receipt-label { color: var(--text-dim); }
        .receipt-value { font-weight: 600; color: white; }

        .btn-group { display: flex; flex-direction: column; gap: 12px; }

        .btn-primary {
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            transition: 0.3s;
        }

        .btn-outline {
            background: transparent;
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 600;
            border: 1px solid #334155;
            transition: 0.3s;
        }

        .btn-outline:hover { background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="check-icon">
            <i class="fas fa-check"></i>
        </div>
        <h1>Order Received!</h1>
        <p>Your request is being processed. Sit back and watch your influence grow.</p>

        <div class="receipt-box">
            <div class="receipt-row">
                <span class="receipt-label">Order ID:</span>
                <span class="receipt-value" id="dispID">#---</span>
            </div>
            <div class="receipt-row">
                <span class="receipt-label">Service:</span>
                <span class="receipt-value" id="dispService">---</span>
            </div>
            <div class="receipt-row">
                <span class="receipt-label">Amount Paid:</span>
                <span class="receipt-value" id="dispCost" style="color: var(--secondary);">KES 0.00</span>
            </div>
            <div class="receipt-row">
                <span class="receipt-label">Balance Left:</span>
                <span class="receipt-value" id="dispBalance">KES 0.00</span>
            </div>
        </div>

        <div class="btn-group">
            <a href="my-orders.html" class="btn-primary">TRACK ORDER STATUS</a>
            <a href="platform.html" class="btn-outline">PLACE ANOTHER ORDER</a>
            <a href="home.html" class="btn-outline" style="border:none; font-size: 12px; color: var(--text-dim);">Back to Dashboard</a>
        </div>
    </div>

    <script>
        // Extract data from URL parameters passed from new-order.html
        const params = new URLSearchParams(window.location.search);
        
        document.getElementById('dispID').innerText = '#' + (params.get('id') || '---');
        document.getElementById('dispService').innerText = params.get('service') || 'Social Media Service';
        document.getElementById('dispCost').innerText = 'KES ' + (parseFloat(params.get('cost')).toFixed(2) || '0.00');
        document.getElementById('dispBalance').innerText = 'KES ' + (parseFloat(params.get('balance')).toFixed(2) || '0.00');

        // Logic to clear form storage or local temporary data could go here
    </script>
</body>
</html>
