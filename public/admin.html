<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate Admin Control | Unasemeje ø dia</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
  --primary: #38bdf8;
  --bg-dark: #020617;
  --bg-card: #0f172a;
  --text-dim: #94a3b8;
  --accent-purple: #8b5cf6;
  --danger: #ef4444;
  --success: #22c55e;
}

body {
  margin: 0;
  font-family: 'Inter', 'Segoe UI', sans-serif;
  background: var(--bg-dark);
  color: white;
  overflow-x: hidden;
}

/* --- SECURITY GATE --- */
#adminAuthGate {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
  z-index: 99999;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.gate-card {
  background: var(--bg-card);
  padding: 40px;
  border-radius: 24px;
  border: 1px solid #1e293b;
  width: 100%;
  max-width: 400px;
  text-align: center;
  box-shadow: 0 0 50px rgba(56, 189, 248, 0.1);
}

.gate-input {
  width: 100%;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 12px;
  border: 1px solid #334155;
  background: #1e293b;
  color: white;
  box-sizing: border-box;
  outline: none;
}

.gate-input:focus { border-color: var(--primary); }

.btn-gate {
  width: 100%;
  padding: 15px;
  background: var(--primary);
  color: #082f49;
  border: none;
  border-radius: 12px;
  font-weight: 800;
  cursor: pointer;
  transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.btn-gate:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -10px var(--primary); }

/* --- SIDEBAR --- */
.sidebar {
  width: 260px;
  height: 100vh;
  position: fixed;
  background: var(--bg-dark);
  padding: 30px 20px;
  box-sizing: border-box;
  border-right: 1px solid #1e293b;
  z-index: 100;
}

.sidebar-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 40px;
  color: var(--primary);
}

.sidebar a {
  display: flex;
  align-items: center;
  padding: 12px 15px;
  margin: 8px 0;
  cursor: pointer;
  color: var(--text-dim);
  text-decoration: none;
  font-weight: 500;
  border-radius: 10px;
  transition: 0.2s;
}

.sidebar a i { margin-right: 12px; font-size: 1.1rem; }
.sidebar a:hover, .sidebar a.active { 
  color: white; 
  background: rgba(56, 189, 248, 0.15); 
}

/* --- MAIN LAYOUT --- */
#adminWrapper { display: none; }

.main {
  margin-left: 260px;
  padding: 40px;
}

.header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
}

.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
}

.stat-card {
  background: var(--bg-card);
  padding: 25px;
  border-radius: 16px;
  border-left: 4px solid var(--primary);
  transition: 0.3s;
}

.stat-card:hover { transform: translateY(-5px); }
.stat-card h3 { font-size: 0.85rem; color: var(--text-dim); margin: 0; text-transform: uppercase; letter-spacing: 1px; }
.stat-card p { font-size: 1.8rem; font-weight: 800; margin: 10px 0 0; }

.card {
  background: var(--bg-card);
  padding: 25px;
  border-radius: 16px;
  border: 1px solid #1e293b;
  margin-bottom: 25px;
}

/* --- TABLES --- */
.table-container {
  background: var(--bg-card);
  border-radius: 16px;
  border: 1px solid #1e293b;
  overflow: hidden;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #1e293b;
  text-align: left;
  padding: 18px;
  color: var(--primary);
  font-size: 0.8rem;
  text-transform: uppercase;
}

td {
  padding: 18px;
  border-bottom: 1px solid #1e293b;
  font-size: 0.95rem;
}

.user-info { display: flex; flex-direction: column; }
.user-info small { color: var(--text-dim); margin-top: 4px; }

/* --- CONTROLS --- */
.search-bar {
    width: 100%;
    max-width: 400px;
    padding: 12px 20px;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 10px;
    color: white;
    margin-bottom: 25px;
}

button {
  padding: 10px 18px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  transition: 0.2s;
}

.btn-balance { background: var(--primary); color: #082f49; }
.btn-approve { background: var(--success); color: #052e16; }
.btn-reject { background: var(--danger); color: white; }
.btn-view { background: #334155; color: white; }

.badge {
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: bold;
}

.badge-pending { background: rgba(251, 191, 36, 0.2); color: #fbbf24; }
.badge-done { background: rgba(34, 197, 94, 0.2); color: var(--success); }

@media (max-width: 900px) {
    .sidebar { width: 80px; }
    .sidebar span, .sidebar-header h2 { display: none; }
    .main { margin-left: 80px; }
}
</style>
</head>

<body>

<div id="adminAuthGate">
  <div class="gate-card">
    <div style="font-size: 50px; color: var(--primary); margin-bottom: 20px;"><i class="fas fa-user-shield"></i></div>
    <h2>Access Restricted</h2>
    <p style="color: var(--text-dim); font-size: 14px; margin-bottom: 30px;">This area is for the Supreme Administrator only.</p>
    
    <input type="email" id="gateEmail" class="gate-input" placeholder="Admin Email">
    <input type="password" id="gatePass" class="gate-input" placeholder="Access Key">
    
    <button class="btn-gate" onclick="verifyAdminGate()">CONFIRM IDENTITY</button>
    <a href="home.html" style="display: block; margin-top: 20px; color: var(--text-dim); text-decoration: none; font-size: 13px;">Exit Terminal</a>
  </div>
</div>

<div id="adminWrapper">
    <div class="sidebar">
      <div class="sidebar-header">
          <i class="fas fa-terminal fa-lg"></i>
          <h2>CORE</h2>
      </div>
      <a onclick="loadStats()" id="nav-stats" class="active"><i class="fas fa-chart-pie"></i> <span>Insights</span></a>
      <a onclick="loadUsers()" id="nav-users"><i class="fas fa-user-friends"></i> <span>Manage Users</span></a>
      <a onclick="loadDeposits()" id="nav-deposits"><i class="fas fa-university"></i> <span>Deposits</span></a>
      <a onclick="loadOrders()" id="nav-orders"><i class="fas fa-stream"></i> <span>Live Orders</span></a>
      <a onclick="loadActivity()" id="nav-activity"><i class="fas fa-history"></i> <span>System Logs</span></a>
      
      <div style="position: absolute; bottom: 30px; width: calc(100% - 40px);">
          <hr style="border: 0; border-top: 1px solid #1e293b; margin-bottom: 20px;">
          <a onclick="logout()" style="color: var(--danger);"><i class="fas fa-power-off"></i> <span>Log Out</span></a>
      </div>
    </div>

    <div class="main">
      <div class="header-row">
          <h1 id="pageTitle" style="margin:0">Insights</h1>
          <div id="syncIndicator" style="font-size: 12px; color: var(--text-dim);">
              <i class="fas fa-circle" style="color:var(--success); font-size: 8px;"></i> System Live
          </div>
      </div>
      
      <div id="statsSection" class="stats-grid">
          <div class="stat-card"><h3>Total Membership</h3><p id="stat-users">0</p></div>
          <div class="stat-card" style="border-color: var(--accent-purple)"><h3>Capital Circulation</h3><p id="stat-money">KES 0</p></div>
          <div class="stat-card" style="border-color: #fbbf24"><h3>Pending Actions</h3><p id="stat-deposits">0</p></div>
      </div>

      <div id="contentArea">
          </div>
    </div>
</div>

<script>
const API = "https://unasemeje-backend-3.onrender.com/api";
const token = localStorage.getItem("token");

/* --- SECURITY & AUTH --- */
function checkAdmin() {
  if (!token) { location.href = "index.html"; return; }
  try {
    const payload = JSON.parse(atob(token.split(".")[1]));
    const ADMIN_LIST = ["diasamratbarusz@gmail.com"];
    if (!ADMIN_LIST.includes(payload.email) && payload.phone !== "0715509440") { 
        location.href = "home.html";
    }
  } catch (e) { location.href = "index.html"; }
}
checkAdmin();

function verifyAdminGate() {
    const email = document.getElementById('gateEmail').value;
    const pass = document.getElementById('gatePass').value;
    if (email.toLowerCase() === "diasamratbarusz@gmail.com" && pass.length > 3) {
        document.getElementById('adminAuthGate').style.display = 'none';
        document.getElementById('adminWrapper').style.display = 'block';
        loadStats();
    } else {
        alert("ACCESS DENIED: Credentials Invalid.");
    }
}

async function adminFetch(endpoint, method = "GET", body = null) {
  try {
    const options = {
      method,
      headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" }
    };
    if (body) options.body = JSON.stringify(body);
    const res = await fetch(API + endpoint, options);
    return await res.json();
  } catch (err) { return { error: "Link to server lost." }; }
}

/* --- VIEW CONTROLLERS --- */
async function loadStats() {
    switchActive('nav-stats', 'System Insights');
    const users = await adminFetch("/admin/users");
    const deposits = await adminFetch("/admin/deposits");
    
    if(!users.error) {
        document.getElementById("stat-users").innerText = users.length;
        const total = users.reduce((sum, u) => sum + (u.balance || 0), 0);
        document.getElementById("stat-money").innerText = "KES " + total.toLocaleString();
    }
    
    const pendingCount = !deposits.error ? deposits.filter(d => d.status === "pending").length : 0;
    document.getElementById("stat-deposits").innerText = pendingCount;

    document.getElementById("contentArea").innerHTML = `
        <div class="card">
            <h3 style="margin-top:0"><i class="fas fa-tools"></i> Global Maintenance</h3>
            <p style="color: var(--text-dim)">Perform system-wide updates and data synchronization.</p>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn-balance" onclick="forceSyncServices()"><i class="fas fa-sync"></i> Sync Services</button>
                <button class="btn-view" onclick="alert('Broadcasting feature coming soon...')"><i class="fas fa-bullhorn"></i> Broadcast Message</button>
            </div>
        </div>
        <div class="card">
            <h3>Recent Platform Health</h3>
            <div style="height: 150px; display: flex; align-items: center; justify-content: center; border: 1px dashed #334155; border-radius: 10px; color: var(--text-dim)">
                Real-time traffic monitor active. No anomalies detected.
            </div>
        </div>
    `;
}

async function loadUsers() {
  switchActive('nav-users', 'User Directory');
  const users = await adminFetch("/admin/users");
  
  let html = `
    <input type="text" class="search-bar" placeholder="Search by name, email or phone..." onkeyup="filterTable()">
    <div class="table-container">
    <table id="dataTable">
    <thead><tr><th>User Profile</th><th>Wallet</th><th>Security</th><th>Management</th></tr></thead>
    <tbody>`;

  users.forEach(u => {
    html += `<tr>
        <td>
            <div class="user-info">
                <strong>${u.username || 'Anonymous'}</strong>
                <small>${u.email}</small>
                <small>${u.phone || 'No Phone'}</small>
            </div>
        </td>
        <td><b style="color:var(--primary)">KES ${u.balance.toFixed(2)}</b></td>
        <td><span class="badge ${u.isVerified ? 'badge-done' : 'badge-pending'}">${u.isVerified ? 'VERIFIED' : 'UNVERIFIED'}</span></td>
        <td>
            <button class="btn-balance" onclick="adjustBalance('${u._id}', '${u.email}')"><i class="fas fa-edit"></i> Balance</button>
            <button class="btn-view" onclick="alert('User ID: ${u._id}')"><i class="fas fa-id-badge"></i></button>
        </td>
      </tr>`;
  });
  document.getElementById("contentArea").innerHTML = html + `</tbody></table></div>`;
}

async function loadDeposits() {
  switchActive('nav-deposits', 'Deposit Ledger');
  const deposits = await adminFetch("/admin/deposits");
  
  let html = `<div class="table-container"><table>
    <thead><tr><th>Client Email</th><th>Amount</th><th>M-Pesa Reference</th><th>Action</th></tr></thead><tbody>`;

  const pending = deposits.filter(d => d.status === "pending").reverse();
  
  pending.forEach(d => {
    html += `<tr>
        <td>${d.userEmail}</td>
        <td><b style="color:var(--success)">KES ${d.amount}</b></td>
        <td><code style="background:#1e293b; padding: 5px 10px; border-radius: 5px;">${d.transactionCode}</code></td>
        <td>
          <button class="btn-approve" onclick="approveDeposit('${d._id}')"><i class="fas fa-check"></i></button>
          <button class="btn-reject" onclick="cancelDeposit('${d._id}')"><i class="fas fa-times"></i></button>
        </td>
    </tr>`;
  });
  
  document.getElementById("contentArea").innerHTML = html + (pending.length === 0 ? "<tr><td colspan='4' style='text-align:center; padding: 40px; color:var(--text-dim)'>No pending deposits found.</td></tr>" : "") + `</tbody></table></div>`;
}

async function loadOrders() {
    switchActive('nav-orders', 'Live Fulfillment');
    const orders = await adminFetch("/admin/orders");
    let html = `<div class="table-container"><table>
        <thead><tr><th>Client</th><th>Order Details</th><th>Target Link</th><th>Status</th></tr></thead><tbody>`;
    
    orders.reverse().slice(0, 50).forEach(o => {
        html += `<tr>
            <td><small>${o.userEmail}</small></td>
            <td>Srv: ${o.serviceId} | Qty: ${o.quantity}</td>
            <td><a href="${o.link}" target="_blank" style="color:var(--primary); text-decoration:none;"><i class="fas fa-external-link-alt"></i> View Link</a></td>
            <td><span class="badge ${o.status === 'Completed' ? 'badge-done' : 'badge-pending'}">${o.status}</span></td>
        </tr>`;
    });
    document.getElementById("contentArea").innerHTML = html + `</tbody></table></div>`;
}

async function loadActivity() {
    switchActive('nav-activity', 'System Activity Logs');
    document.getElementById("contentArea").innerHTML = `
        <div class="card" style="text-align:center; padding: 50px;">
            <i class="fas fa-shield-virus fa-3x" style="color: var(--primary); margin-bottom: 20px;"></i>
            <h3>Live Activity Log</h3>
            <p style="color: var(--text-dim)">Tracking all admin and user actions... Logs are refreshed every 60 seconds.</p>
            <div id="logBox" style="text-align:left; background: #020617; padding: 20px; border-radius: 10px; font-family: monospace; font-size: 12px; color: #22c55e; margin-top: 20px; border: 1px solid #1e293b;">
                > System initialized...<br>
                > Admin authenticated: diasamratbarusz@gmail.com<br>
                > Monitoring incoming M-Pesa hooks...
            </div>
        </div>
    `;
}

/* --- ACTIONS --- */
async function adjustBalance(userId, email) {
    const amount = prompt(`Enter new absolute balance for ${email}:`);
    if (amount === null || amount === "" || isNaN(amount)) return;
    
    const confirmAction = confirm(`Set ${email} balance to KES ${amount}?`);
    if (confirmAction) {
        const res = await adminFetch("/admin/update-balance", "POST", { userId, amount: parseFloat(amount) });
        if (res.success) {
            alert("Balance Updated Successfully");
            loadUsers();
        } else {
            alert("Error: " + (res.error || "Failed to update"));
        }
    }
}

async function approveDeposit(id) {
  if (confirm("Confirming this will instantly add funds to the user's wallet. Proceed?")) {
    const res = await adminFetch("/admin/approve-deposit", "POST", { depositId: id });
    alert(res.error ? "Failed: " + res.error : "Transaction Approved & Capital Injected.");
    loadDeposits();
    loadStats();
  }
}

async function cancelDeposit(id) {
  if (confirm("Reject this deposit? User will not receive funds.")) {
      await adminFetch("/admin/cancel-deposit", "POST", { depositId: id });
      loadDeposits();
  }
}

async function forceSyncServices() {
    const btn = document.querySelector(".btn-balance");
    const oldText = btn.innerHTML;
    btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Syncing...";
    btn.disabled = true;
    
    try {
        const res = await fetch(`${API}/services?refresh=true`, { headers: { "Authorization": "Bearer " + token } });
        const data = await res.json();
        alert(data.success ? "Provider Services Synced Successfully!" : "Sync Error: " + data.error);
    } catch(e) { alert("Network error during sync."); }
    finally { 
        btn.innerHTML = oldText;
        btn.disabled = false;
    }
}

/* --- UTILS --- */
function filterTable() {
    let input = document.querySelector(".search-bar");
    let filter = input.value.toUpperCase();
    let tr = document.getElementById("dataTable").getElementsByTagName("tr");

    for (let i = 1; i < tr.length; i++) {
        let td = tr[i].getElementsByTagName("td")[0];
        if (td) {
            let textValue = td.textContent || td.innerText;
            tr[i].style.display = textValue.toUpperCase().indexOf(filter) > -1 ? "" : "none";
        }
    }
}

function switchActive(id, title) {
    document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById("pageTitle").innerText = title;
}

function logout() {
    localStorage.removeItem("token");
    location.href = "index.html";
}
</script>
</body>
</html>
