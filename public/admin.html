<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard | Unasemeje SMM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #0f172a;
  color: white;
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  height: 100vh;
  position: fixed;
  background: #020617;
  padding: 25px;
  box-sizing: border-box;
  border-right: 1px solid #1e293b;
  z-index: 100;
}

.sidebar h2 {
  color: #38bdf8;
  font-size: 1.1rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 30px;
}

.sidebar a {
  display: flex;
  align-items: center;
  margin: 18px 0;
  cursor: pointer;
  color: #94a3b8;
  text-decoration: none;
  font-weight: 500;
  transition: 0.3s;
}

.sidebar a i { margin-right: 10px; width: 20px; }
.sidebar a:hover { color: #38bdf8; transform: translateX(5px); }
.sidebar a.active { color: #38bdf8; background: rgba(56, 189, 248, 0.1); border-radius: 5px; padding: 5px; }

/* MAIN CONTENT */
.main {
  margin-left: 240px;
  padding: 30px;
}

.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.card {
  background: #111827;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
  border: 1px solid #1e293b;
}

.stat-card { text-align: center; border-bottom: 3px solid #38bdf8; }
.stat-card h3 { font-size: 0.8rem; color: #94a3b8; margin: 0; }
.stat-card p { font-size: 1.5rem; font-weight: bold; margin: 10px 0 0; color: #38bdf8; }

h1 { font-size: 1.5rem; margin-bottom: 25px; color: #f8fafc; }

/* SEARCH BAR */
.search-box {
    width: 100%;
    padding: 12px;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 8px;
    color: white;
    margin-bottom: 20px;
}

/* TABLE STYLING */
.table-container {
  overflow-x: auto;
  background: #111827;
  border-radius: 8px;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 800px;
}

th {
  background: #1e293b;
  text-align: left;
  padding: 15px;
  color: #38bdf8;
  font-size: 0.85rem;
}

td {
  padding: 15px;
  border-bottom: 1px solid #1e293b;
  font-size: 0.9rem;
  color: #cbd5e1;
}

/* STATUS DOTS */
.online-dot { height: 8px; width: 8px; background: #22c55e; border-radius: 50%; display: inline-block; margin-right: 5px; }
.offline-dot { height: 8px; width: 8px; background: #64748b; border-radius: 50%; display: inline-block; margin-right: 5px; }

/* BUTTONS */
button {
  padding: 8px 14px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  font-size: 0.75rem;
  transition: 0.2s;
  margin-right: 5px;
}

.btn-approve { background: #22c55e; color: #052e16; }
.btn-balance { background: #38bdf8; color: #082f49; }
.btn-danger { background: #ef4444; color: white; }
.btn-warn { background: #f59e0b; color: white; }

button:hover { filter: brightness(1.2); }

.status-badge {
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 0.75rem;
  text-transform: uppercase;
  font-weight: bold;
}
.pending { background: rgba(251, 191, 36, 0.1); color: #fbbf24; border: 1px solid #fbbf24; }
.completed { background: rgba(34, 197, 94, 0.1); color: #22c55e; border: 1px solid #22c55e; }
.canceled { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444; }

@media (max-width: 768px) {
    .sidebar { width: 60px; padding: 10px; }
    .sidebar h2, .sidebar span { display: none; }
    .main { margin-left: 60px; padding: 15px; }
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>Admin</h2>
  <a onclick="loadStats()" id="nav-stats"><i class="fas fa-chart-line"></i> <span>Overview</span></a>
  <a onclick="loadUsers()" id="nav-users"><i class="fas fa-users"></i> <span>Users</span></a>
  <a onclick="loadDeposits()" id="nav-deposits"><i class="fas fa-wallet"></i> <span>Deposits</span></a>
  <a onclick="loadOrders()" id="nav-orders"><i class="fas fa-shopping-cart"></i> <span>Orders</span></a>
  <hr style="border: 0; border-top: 1px solid #1e293b; margin: 20px 0;">
  <a onclick="logout()" style="color: #ef4444;"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></a>
</div>

<div class="main">
  <h1 id="pageTitle">Dashboard Overview</h1>
  
  <div id="statsSection" class="stats-grid">
      <div class="card stat-card"><h3>Total Users</h3><p id="stat-users">0</p></div>
      <div class="card stat-card"><h3>Total Balances</h3><p id="stat-money">KES 0</p></div>
      <div class="card stat-card"><h3>Pending Deposits</h3><p id="stat-deposits" style="color:#fbbf24">0</p></div>
  </div>

  <div id="content">
      <!-- Content loaded via JS -->
  </div>
</div>

<script>
const API = "https://unasemeje-backend-3.onrender.com/api";
const token = localStorage.getItem("token");

/* --- SECURITY: ADMIN ONLY --- */
function checkAdmin() {
  if (!token) { location.href = "index.html"; return; }
  try {
    const payload = JSON.parse(atob(token.split(".")[1]));
    const isAdmin = payload.email === "diasamratbarusz@gmail.com" || payload.phone === "0715509440";
    if (!isAdmin) { location.href = "dashboard.html"; }
  } catch (e) { location.href = "index.html"; }
}
checkAdmin();

async function adminFetch(endpoint, method = "GET", body = null) {
  try {
    const options = {
      method,
      headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" }
    };
    if (body) options.body = JSON.stringify(body);
    const res = await fetch(API + endpoint, options);
    return await res.json();
  } catch (err) { return { error: "Network Connection Failed" }; }
}

/* --- OVERVIEW STATS --- */
async function loadStats() {
    setActiveNav('nav-stats');
    document.getElementById("pageTitle").innerText = "System Overview";
    const users = await adminFetch("/admin/users");
    const deposits = await adminFetch("/admin/deposits");
    
    if(!users.error) {
        document.getElementById("stat-users").innerText = users.length;
        const totalBal = users.reduce((sum, u) => sum + (u.balance || 0), 0);
        document.getElementById("stat-money").innerText = "KES " + totalBal.toLocaleString();
    }
    if(!deposits.error) {
        const pending = deposits.filter(d => d.status === "pending").length;
        document.getElementById("stat-deposits").innerText = pending;
    }
}

/* --- USER MANAGEMENT --- */
async function loadUsers() {
  setActiveNav('nav-users');
  document.getElementById("pageTitle").innerText = "User Management";
  const content = document.getElementById("content");
  content.innerHTML = "<p>Loading users...</p>";

  const users = await adminFetch("/admin/users");
  let html = `<input type="text" class="search-box" placeholder="Search by email or phone..." onkeyup="filterTable(0)">
    <div class="table-container"><table id="adminTable">
    <tr><th>User Details</th><th>Balance</th><th>Status</th><th>Action</th></tr>`;

  users.forEach(u => {
    const isOnline = (new Date() - new Date(u.lastSeen)) < 300000; // 5 mins
    html += `<tr>
        <td>${u.email}<br><small>${u.phone || 'No Phone'}</small></td>
        <td><b>KES ${u.balance.toFixed(2)}</b></td>
        <td>${isOnline ? '<span class="online-dot"></span>Online' : '<span class="offline-dot"></span>Offline'}</td>
        <td>
          <button class="btn-balance" onclick="adjustBalance('${u._id}', '${u.email}')">Add/Sub KES</button>
        </td>
      </tr>`;
  });
  content.innerHTML = html + `</table></div>`;
}

/* --- DEPOSIT MANAGEMENT --- */
async function loadDeposits() {
  setActiveNav('nav-deposits');
  document.getElementById("pageTitle").innerText = "Deposit Requests";
  const content = document.getElementById("content");
  const deposits = await adminFetch("/admin/deposits");

  let html = `<div class="table-container"><table>
    <tr><th>User</th><th>Amount</th><th>M-Pesa Message</th><th>Action</th></tr>`;

  deposits.reverse().forEach(d => {
    if (d.status === "pending") {
        html += `<tr>
            <td>${d.userEmail}<br><small>${d.phone}</small></td>
            <td>KES ${d.amount}</td>
            <td><small style="color:#94a3b8">${d.message}</small></td>
            <td>
              <button class="btn-approve" onclick="approveDeposit('${d._id}')">Approve</button>
              <button class="btn-danger" onclick="cancelDeposit('${d._id}')">Reject</button>
            </td>
        </tr>`;
    }
  });
  content.innerHTML = html + `</table></div>`;
}

/* --- ORDER MANAGEMENT --- */
async function loadOrders() {
    setActiveNav('nav-orders');
    document.getElementById("pageTitle").innerText = "Recent Orders";
    const orders = await adminFetch("/admin/orders");
    const content = document.getElementById("content");

    let html = `<div class="table-container"><table>
        <tr><th>User</th><th>Service ID</th><th>Qty</th><th>Link</th><th>Status</th></tr>`;

    orders.reverse().slice(0, 50).forEach(o => {
        html += `<tr>
            <td>${o.userEmail}</td>
            <td>${o.serviceId}</td>
            <td>${o.quantity}</td>
            <td><a href="${o.link}" target="_blank" style="color:#38bdf8">Link</a></td>
            <td><span class="status-badge ${o.status.toLowerCase()}">${o.status}</span></td>
        </tr>`;
    });
    content.innerHTML = html + `</table></div>`;
}

/* --- ACTIONS --- */
async function approveDeposit(id) {
  if (!confirm("Verify payment and add money to user?")) return;
  const res = await adminFetch("/admin/approve-deposit", "POST", { depositId: id });
  alert(res.error ? "Error: " + res.error : "Credited Successfully!");
  loadDeposits(); loadStats();
}

async function cancelDeposit(id) {
  if (!confirm("Reject this deposit request?")) return;
  const res = await adminFetch("/admin/cancel-deposit", "POST", { depositId: id });
  loadDeposits();
}

async function adjustBalance(userId, email) {
    const amount = prompt(`Add/Subtract money for ${email}\n(e.g., 500 to add, -500 to deduct):`);
    if (!amount || isNaN(amount)) return;
    const res = await adminFetch("/admin/update-balance", "POST", { userId, amount: parseFloat(amount) });
    if (!res.error) { alert("Updated!"); loadUsers(); loadStats(); }
}

function filterTable(colIndex) {
    let input = document.querySelector(".search-box");
    let filter = input.value.toUpperCase();
    let table = document.getElementById("adminTable");
    let tr = table.getElementsByTagName("tr");
    for (let i = 1; i < tr.length; i++) {
        let td = tr[i].getElementsByTagName("td")[colIndex];
        if (td) {
            let txtValue = td.textContent || td.innerText;
            tr[i].style.display = txtValue.toUpperCase().indexOf(filter) > -1 ? "" : "none";
        }
    }
}

function setActiveNav(id) {
    document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function logout() { localStorage.removeItem("token"); location.href = "index.html"; }

// Initialize
loadStats();
</script>
</body>
</html>
