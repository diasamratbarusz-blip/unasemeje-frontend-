<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Select Platform | UNASEMEJE ø DIA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7c3aed;
            --secondary: #10b981;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; 
            background: var(--bg-dark); 
            color: var(--text-main); 
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
        }

        /* SIDEBAR */
        .sidebar { 
            width: 260px; background: #111827; padding: 25px; border-right: 1px solid #1f2937; 
            position: fixed; height: 100vh; display: flex; flex-direction: column; 
        }
        .sidebar h2 { color: var(--primary); font-size: 20px; margin-bottom: 30px; text-align: center; font-weight: 800; }
        .sidebar a { 
            display: flex; align-items: center; padding: 12px 15px; color: var(--text-dim); 
            text-decoration: none; border-radius: 10px; margin-bottom: 5px; transition: 0.2s; 
        }
        .sidebar a:hover, .sidebar a.active { background: var(--primary); color: white; }

        /* MAIN CONTENT */
        .main { margin-left: 260px; padding: 40px; width: calc(100% - 260px); min-height: 100vh; }
        
        .header-section { margin-bottom: 30px; }
        .header-section h1 { font-weight: 800; font-size: 28px; margin: 0; }
        .header-section p { color: var(--text-dim); margin-top: 5px; }

        /* PLATFORM GRID */
        .platform-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .platform-card {
            background: var(--card-bg);
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .platform-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 25px rgba(124, 58, 237, 0.2);
        }

        .platform-card i {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .platform-card span {
            font-weight: 700;
            font-size: 16px;
        }

        /* BRAND COLORS FOR ICONS */
        .fa-tiktok { color: #ff0050; }
        .fa-instagram { color: #e1306c; }
        .fa-facebook { color: #1877f2; }
        .fa-youtube { color: #ff0000; }
        .fa-telegram { color: #0088cc; }
        .fa-twitter { color: #1da1f2; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { margin-left: 0; padding: 20px; }
            .platform-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>unasemeje ø dia</h2>
        <a href="home.html"><i class="fas fa-home"></i> Home</a>
        <a href="select-platform.html" class="active"><i class="fas fa-plus-circle"></i> New Order</a>
        <a href="my-orders.html"><i class="fas fa-history"></i> My Orders</a>
        <a href="add-funds.html"><i class="fas fa-wallet"></i> Add Funds</a>
        <a href="referrals.html"><i class="fas fa-users"></i> Referrals</a>
    </div>

    <div class="main">
        <div class="header-section">
            <h1>Select Platform</h1>
            <p>Which social media platform do you want to boost today?</p>
        </div>

        <div class="platform-grid" id="platformGrid">
            <a href="new-order.html?platform=TikTok" class="platform-card">
                <i class="fab fa-tiktok"></i>
                <span>TikTok</span>
            </a>

            <a href="new-order.html?platform=Instagram" class="platform-card">
                <i class="fab fa-instagram"></i>
                <span>Instagram</span>
            </a>

            <a href="new-order.html?platform=Facebook" class="platform-card">
                <i class="fab fa-facebook"></i>
                <span>Facebook</span>
            </a>

            <a href="new-order.html?platform=YouTube" class="platform-card">
                <i class="fab fa-youtube"></i>
                <span>YouTube</span>
            </a>

            <a href="new-order.html?platform=Telegram" class="platform-card">
                <i class="fab fa-telegram"></i>
                <span>Telegram</span>
            </a>

            <a href="new-order.html?platform=Twitter" class="platform-card">
                <i class="fab fa-twitter"></i>
                <span>Twitter / X</span>
            </a>
        </div>
    </div>

    <script>
        // Check for authentication
        if (!localStorage.getItem("token")) {
            window.location.href = "index.html";
        }

        // Logic to dynamically handle service loading can be added here
        // If you want to fetch platforms directly from your Delixgains API integration:
        async function loadDynamicPlatforms() {
            try {
                const response = await fetch("https://unasemeje-backend-3.onrender.com/api/services");
                const result = await response.json();
                const platforms = Object.keys(result.data);
                
                // You could use this to rebuild the grid if the API adds new platforms
                console.log("Platforms available:", platforms);
            } catch (e) {
                console.log("Using static platform list");
            }
        }
        loadDynamicPlatforms();
    </script>
</body>
</html>
