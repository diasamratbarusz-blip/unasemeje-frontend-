<!DOCTYPE html>
<html lang="en-KE">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Order | UNASEMEJE ø DIA</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --brand-primary: #10b981; /* Neon Emerald */
            --bg-main: #020617; /* Deep Navy */
            --card-bg: #0f172a;
            --text-dim: #94a3b8;
        }

        body {
            background-color: var(--bg-main);
            color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .order-card {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            border: 1px solid #1e293b;
        }

        h2 { 
            font-family: 'Outfit';
            margin-top: 0; 
            color: white; 
            font-size: 1.6rem;
            margin-bottom: 20px;
        }

        .service-info {
            background: #1e293b;
            padding: 18px;
            border-radius: 16px;
            margin-bottom: 25px;
            border-left: 4px solid var(--brand-primary);
        }

        .service-info h3 { margin: 0; font-size: 12px; color: var(--brand-primary); text-transform: uppercase; letter-spacing: 1px; }
        .service-info p { margin: 8px 0 0 0; font-weight: 700; color: #f8fafc; line-height: 1.4; }

        label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 8px; font-weight: 600; }

        input {
            width: 100%;
            padding: 14px;
            box-sizing: border-box;
            margin-bottom: 22px;
            border-radius: 12px;
            border: 1px solid #334155;
            background: #020617;
            color: white;
            font-size: 15px;
            transition: 0.3s;
        }

        input:focus { border-color: var(--brand-primary); outline: none; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }

        .amount-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .amount-grid button {
            background: #1e293b;
            color: #cbd5e1;
            padding: 12px;
            border: 1px solid #334155;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.2s;
        }

        .amount-grid button:hover { 
            background: var(--brand-primary); 
            color: #020617; 
            border-color: var(--brand-primary);
        }

        .price-box {
            background: rgba(16, 185, 129, 0.05);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 30px;
            border: 1px solid rgba(16, 185, 129, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price-label { color: var(--brand-primary); font-weight: 700; font-size: 14px; }
        .price-value { font-size: 1.3rem; color: white; font-weight: 800; font-family: 'Outfit'; }

        .order-btn {
            width: 100%;
            padding: 18px;
            background: var(--brand-primary);
            border: none;
            border-radius: 14px;
            font-weight: 800;
            cursor: pointer;
            color: #020617;
            font-size: 16px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .order-btn:hover { background: #34d399; transform: translateY(-2px); }
        .order-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover { color: var(--brand-primary); }
    </style>
</head>
<body>

<div class="order-card">
    <h2>Place New Order</h2>

    <div class="service-info">
        <h3>Selected Service</h3>
        <p id="serviceName">Loading details...</p>
    </div>

    <label for="link">Target Link (Profile/Post URL)</label>
    <input type="text" id="link" placeholder="Paste link here..." autocomplete="off">

    <label for="quantity">Quantity</label>
    <input type="number" id="quantity" placeholder="Enter amount" oninput="updatePrice()">

    <div class="amount-grid">
        <button type="button" onclick="setQty(100)">100</button>
        <button type="button" onclick="setQty(500)">500</button>
        <button type="button" onclick="setQty(1000)">1k</button>
    </div>

    <div class="price-box">
        <span class="price-label">ESTIMATED COST:</span>
        <span class="price-value">KES <span id="priceDisplay">0.00</span></span>
    </div>

    <button class="order-btn" id="submitBtn" onclick="placeOrder()">Confirm & Start</button>
    
    <a href="/services" class="back-link"><i class="fas fa-arrow-left"></i> Back to Services</a>
</div>

<script>
    // Extract Service Details from URL
    const urlParams = new URLSearchParams(window.location.search);
    const serviceId = urlParams.get('id');
    const serviceRate = parseFloat(urlParams.get('rate')) || 0;
    const name = urlParams.get('name') || "SMM Service";

    // Setup Display
    document.getElementById('serviceName').innerText = name;

    function setQty(val) {
        document.getElementById('quantity').value = val;
        updatePrice();
    }

    function updatePrice() {
        const qty = document.getElementById('quantity').value || 0;
        // Calculation: (Rate per 1000) * Quantity
        const total = (serviceRate / 1000) * qty;
        document.getElementById('priceDisplay').innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
    }

    async function placeOrder() {
        const link = document.getElementById('link').value;
        const quantity = document.getElementById('quantity').value;
        const btn = document.getElementById('submitBtn');
        const token = localStorage.getItem("token");

        if (!token) {
            alert("Your session has expired. Please log in again.");
            window.location.href = "/";
            return;
        }

        if (!link || !quantity || quantity <= 0) {
            alert("Please enter a valid link and quantity.");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Processing...";

        try {
            const response = await fetch('/api/order', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    serviceId: serviceId,
                    link: link,
                    quantity: parseInt(quantity)
                })
            });

            const result = await response.json();

            if (result.success) {
                alert("Order successfully placed! Redirecting to tracking...");
                window.location.href = "/my-orders"; 
            } else {
                alert("Order Failed: " + (result.error || "Please check your balance."));
                btn.disabled = false;
                btn.innerText = "Confirm & Start";
            }
        } catch (error) {
            console.error("Order Error:", error);
            alert("A network error occurred. Please try again.");
            btn.disabled = false;
            btn.innerText = "Confirm & Start";
        }
    }
</script>

</body>
</html>
