<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Select Package | UNASEMEJE ø DIA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific tweaks for the package selection flow */
        .header-nav { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        
        .back-circle { 
            width: 45px; height: 45px; background: var(--card-bg); border: 1px solid var(--border); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            color: white; text-decoration: none; transition: 0.3s;
        }
        .back-circle:hover { background: var(--primary); border-color: var(--primary); transform: scale(1.1); }

        .package-container { display: grid; grid-template-columns: 1fr; gap: 15px; }
        
        .package-link { text-decoration: none; display: block; }
        
        .package-card {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 22px; border-radius: 18px; transition: all 0.3s ease;
        }

        .package-card:hover {
            border-color: var(--primary);
            background: rgba(124, 58, 237, 0.05);
            transform: translateX(8px);
        }

        .package-info h3 { margin: 0; font-size: 17px; font-weight: 800; color: var(--text-main); }
        .package-info p { margin: 4px 0 0; font-size: 13px; color: var(--text-dim); }

        .count-badge {
            background: rgba(16, 185, 129, 0.1); color: var(--secondary);
            padding: 6px 12px; border-radius: 10px; font-size: 12px; font-weight: 800;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        @media (max-width: 768px) {
            .package-card { padding: 18px; }
            .package-info h3 { font-size: 15px; }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="sidebar">
        <h2>unasemeje ø dia</h2>
        <div class="sidebar-nav">
            <a href="dashboard.html"><i class="fas fa-home"></i> <span>Home</span></a>
            <a href="platform.html" class="active"><i class="fas fa-plus-circle"></i> <span>New Order</span></a>
            <a href="my-orders.html"><i class="fas fa-history"></i> <span>My Orders</span></a>
            <a href="services.html"><i class="fas fa-list"></i> <span>Services</span></a>
            <a href="add-funds.html"><i class="fas fa-wallet"></i> <span>Add Funds</span></a>
            <a href="referrals.html"><i class="fas fa-users"></i> <span>Referrals</span></a>
        </div>
    </div>

    <div class="main">
        <div class="header-nav">
            <a href="platform.html" class="back-circle"><i class="fas fa-arrow-left"></i></a>
            <div>
                <h1 id="platformTitle" style="margin:0; font-size: 24px; font-weight: 800;">---</h1>
                <p style="color: var(--text-dim); margin: 2px 0 0; font-size: 14px;">Select a category to see services</p>
            </div>
        </div>

        <div class="package-container" id="packageList">
            <div style="text-align: center; padding: 60px 20px;">
                <i class="fas fa-circle-notch fa-spin fa-2x" style="color: var(--primary);"></i>
                <p style="margin-top: 15px; color: var(--text-dim);">Syncing global services...</p>
            </div>
        </div>
    </div>
</div>

<script>
    const API = "https://unasemeje-backend-3.onrender.com/api";
    const token = localStorage.getItem("token");
    const urlParams = new URLSearchParams(window.location.search);
    const platform = urlParams.get('platform');

    // Security Check
    if (!token) window.location.href = "index.html";
    if (!platform) window.location.href = "platform.html";

    // Set Title
    document.getElementById('platformTitle').innerText = platform + " Boosts";

    async function fetchCategories() {
        try {
            const res = await fetch(`${API}/services`);
            const json = await res.json();
            
            const categories = json.data[platform];
            const list = document.getElementById('packageList');
            list.innerHTML = "";

            if (!categories) {
                list.innerHTML = `<div class="card" style="text-align:center;">No services found for this platform.</div>`;
                return;
            }

            Object.keys(categories).forEach(catName => {
                const serviceCount = categories[catName].length;
                
                const link = document.createElement('a');
                link.href = `new-order.html?platform=${encodeURIComponent(platform)}&category=${encodeURIComponent(catName)}`;
                link.className = 'package-link';
                
                link.innerHTML = `
                    <div class="package-card">
                        <div class="package-info">
                            <h3>${catName}</h3>
                            <p>Premium high-speed delivery</p>
                        </div>
                        <div class="count-badge">
                            ${serviceCount} Options
                        </div>
                    </div>
                `;
                list.appendChild(link);
            });

        } catch (error) {
            console.error("Package Load Error:", error);
            document.getElementById('packageList').innerHTML = `
                <div class="card" style="text-align:center; border-color: var(--danger);">
                    <i class="fas fa-exclamation-triangle" style="color: var(--danger); font-size: 30px;"></i>
                    <p style="margin-top:10px;">Failed to load services. Please check your internet.</p>
                    <button onclick="location.reload()" class="btn-primary" style="margin-top:15px; width:auto; padding: 10px 20px;">Retry</button>
                </div>
            `;
        }
    }

    // Run
    fetchCategories();
</script>

</body>
</html>
